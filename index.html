<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pflegias Prüfungsquiz</title>
<style>
:root{--r:#C8341A;--rl:#FAF0ED;--g:#2D7A3A;--gl:#EBF5EC;--t:#1a1a1a;--tm:#666;--tl:#999;--bg:#fff;--bgs:#F7F6F3;--bd:#E0DDD8;--bds:#C8C4BC;--rad:14px;--rads:9px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bgs);color:var(--t);max-width:480px;margin:0 auto;min-height:100vh;font-size:16px;}
.sc{display:none;flex-direction:column;min-height:100vh;}
.sc.on{display:flex;}
.hd{background:var(--r);padding:48px 18px 14px;position:sticky;top:0;z-index:9;}
.hr{display:flex;align-items:center;gap:10px;}
.bk{background:rgba(255,255,255,.2);border:none;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:16px;flex-shrink:0;}
.ht{font-size:16px;font-weight:600;color:#fff;}
.hs{font-size:12px;color:rgba(255,255,255,.72);margin-top:1px;}
.pb{height:3px;background:rgba(255,255,255,.25);margin-top:10px;border-radius:2px;}
.pf{height:100%;background:#fff;border-radius:2px;transition:width .35s;}
.hero{background:var(--r);padding:0 18px 24px;text-align:center;}
.bi{width:64px;height:64px;background:rgba(255,255,255,.18);border-radius:16px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:30px;}
.hero h1{font-size:24px;font-weight:700;color:#fff;}
.hero p{font-size:13px;color:rgba(255,255,255,.78);margin-top:6px;}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;padding:16px 16px 4px;}
.sc-card{background:var(--bg);border-radius:var(--rads);border:.5px solid var(--bd);padding:12px 8px;text-align:center;}
.sn{font-size:22px;font-weight:700;color:var(--r);}
.sl{font-size:10px;color:var(--tm);margin-top:2px;}
.stitle{font-size:11px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.05em;padding:10px 16px 6px;}
.cl{padding:0 16px 20px;display:flex;flex-direction:column;gap:8px;}
.cc{background:var(--bg);border-radius:var(--rad);border:.5px solid var(--bd);overflow:hidden;cursor:pointer;transition:transform .1s;}
.cc:active{transform:scale(.98);}
.ch{display:flex;align-items:center;gap:12px;padding:14px 16px;}
.cd{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.k1{background:#EDE9FE;}.k2{background:#FAF0ED;}.k3{background:#EBF5EC;}.k4{background:#FEF5E8;}
.ci{flex:1;}.ct{font-size:14px;font-weight:600;}.cs{font-size:11px;color:var(--tm);margin-top:2px;}.ca{font-size:14px;color:var(--tl);}
.ts{flex:1;overflow-y:auto;padding-bottom:20px;}
.tg{font-size:10px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;padding:14px 16px 5px;}
.tl{padding:0 16px;display:flex;flex-direction:column;gap:6px;}
.tc{background:var(--bg);border-radius:var(--rads);border:.5px solid var(--bd);padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:transform .1s;}
.tc:active{transform:scale(.98);}
.ti{font-size:16px;flex-shrink:0;}.tni{flex:1;}.tt{font-size:13px;font-weight:600;}.th{font-size:11px;color:var(--tm);margin-top:2px;line-height:1.4;}.ta{font-size:12px;color:var(--tl);}
.qb{flex:1;overflow-y:auto;padding:18px;}
.qc{font-size:11px;font-weight:600;color:var(--tl);text-transform:uppercase;letter-spacing:.05em;margin-bottom:9px;}
.qx{background:var(--rl);border-radius:var(--rads);border-left:3px solid var(--r);padding:11px 13px;font-size:12px;color:#6B2D1A;line-height:1.5;margin-bottom:14px;}
.qq{font-size:17px;font-weight:600;line-height:1.45;margin-bottom:18px;}
.opts{display:flex;flex-direction:column;gap:9px;margin-bottom:18px;}
.op{background:var(--bg);border-radius:var(--rads);border:1.5px solid var(--bd);padding:13px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;text-align:left;width:100%;min-height:50px;transition:all .15s;}
.op:active{transform:scale(.99);}
.op.sel{border-color:var(--r);background:var(--rl);}
.op.cor{border-color:var(--g);background:var(--gl);}
.op.wrg{border-color:#DC2626;background:#FEF2F2;}
.op.rcor{border-color:var(--g);background:var(--gl);}
.ol{width:25px;height:25px;border-radius:50%;background:var(--bgs);border:1.5px solid var(--bds);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;color:var(--tm);}
.op.sel .ol{background:var(--r);border-color:var(--r);color:#fff;}
.op.cor .ol{background:var(--g);border-color:var(--g);color:#fff;}
.op.wrg .ol{background:#DC2626;border-color:#DC2626;color:#fff;}
.op.rcor .ol{background:var(--g);border-color:var(--g);color:#fff;}
.ot{font-size:13px;line-height:1.45;color:var(--t);flex:1;}
.ar{background:var(--bg);border-radius:var(--rad);border:.5px solid var(--bd);padding:14px;margin-bottom:16px;display:none;}
.ar.vis{display:block;}
.al{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.al.c{color:var(--g);}.al.w{color:#DC2626;}
.ae{font-size:13px;line-height:1.55;color:var(--t);}
.qa{display:flex;flex-direction:column;gap:9px;padding-bottom:28px;}
.bp{background:var(--r);color:#fff;border:none;padding:15px 20px;border-radius:100px;font-size:15px;font-weight:600;cursor:pointer;width:100%;transition:opacity .1s;}
.bp:active{opacity:.85;}.bp:disabled{background:var(--bds);cursor:default;}
.bs{background:var(--bg);color:var(--t);border:1.5px solid var(--bds);padding:13px 20px;border-radius:100px;font-size:14px;font-weight:600;cursor:pointer;width:100%;}
.bs:active{background:var(--bgs);}
.rh{background:var(--r);padding:36px 18px 26px;text-align:center;}
.sr{width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.15);border:3px solid rgba(255,255,255,.35);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 14px;}
.sn2{font-size:28px;font-weight:700;color:#fff;}.sd{font-size:12px;color:rgba(255,255,255,.65);}
.rh h2{font-size:20px;font-weight:700;color:#fff;}.rh p{font-size:13px;color:rgba(255,255,255,.78);margin-top:5px;}
.rr{padding:16px;display:flex;flex-direction:column;gap:10px;}
.ri{background:var(--bg);border-radius:var(--rads);border:.5px solid var(--bd);padding:13px;}
.rq{font-size:12px;font-weight:600;margin-bottom:5px;line-height:1.4;}
.ra{font-size:11px;line-height:1.5;color:var(--tm);}
.rb{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:100px;margin-bottom:5px;}
.rb.c{background:var(--gl);color:var(--g);}.rb.w{background:#FEF2F2;color:#DC2626;}
.ract{padding:14px 16px 32px;display:flex;flex-direction:column;gap:9px;}
</style>
</head>
<body>
<div id="toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 22px;border-radius:100px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;"></div>
<input type="file" id="fimp" accept=".json" style="display:none" onchange="doImport(this)">

<div class="sc on" id="s-home">
  <div class="hero" style="padding-top:52px;">
    <div class="bi">📚</div>
    <h1>Pflegias Quiz</h1>
    <p>Prüfungstraining · offline · 150 Fragen</p>
  </div>
  <div class="stats">
    <div class="sc-card"><div class="sn">4</div><div class="sl">Kapitel</div></div>
    <div class="sc-card"><div class="sn">30</div><div class="sl">Themen</div></div>
    <div class="sc-card"><div class="sn">150</div><div class="sl">Fragen</div></div>
  </div>
  <div class="stitle">Kapitel wählen</div>
  <div class="cl" id="clist"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 14px 4px;">
    <button onclick="doExport()" style="background:#1A4D8C;color:#fff;border:none;padding:12px 8px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;">📤 Exportieren</button>
    <button onclick="document.getElementById('fimp').click()" style="background:#fff;color:#1A4D8C;border:2px solid #1A4D8C;padding:11px 8px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;">📥 Importieren</button>
  </div>
</div>

<div class="sc" id="s-topics">
  <div class="hd">
    <div class="hr">
      <button class="bk" onclick="goHome()">←</button>
      <div><div class="ht" id="tt2"></div><div class="hs" id="ts2"></div></div>
    </div>
  </div>
  <div class="ts" id="tcon"></div>
</div>

<div class="sc" id="s-quiz">
  <div class="hd">
    <div class="hr">
      <button class="bk" onclick="exitQ()">✕</button>
      <div style="flex:1;overflow:hidden;">
        <div class="ht" id="qt" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
        <div class="hs" id="qs2"></div>
      </div>
    </div>
    <div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
  </div>
  <div class="qb" id="qb"></div>
</div>

<div class="sc" id="s-results">
  <div style="flex:1;overflow-y:auto;">
    <div class="rh">
      <div class="sr"><div class="sn2" id="rscore">0</div><div class="sd" id="rden">von 5</div></div>
      <h2 id="rtitle"></h2><p id="rmsg"></p>
    </div>
    <div id="notebox" style="display:none;margin:14px;border-radius:12px;padding:14px 16px;text-align:center;">
      <div id="note-n" style="font-size:28px;font-weight:700;"></div>
      <div id="note-l" style="font-size:14px;font-weight:600;margin-top:3px;"></div>
    </div>
    <div class="rr" id="rrev"></div>
    <div class="ract">
      <button class="bp" id="rretry">Nochmal üben (neue Reihenfolge)</button>
      <button class="bs" onclick="goHome()">Anderes Thema wählen</button>
    </div>
  </div>
</div>

<script>
const DB={
  aufruhr:[
    {q:"Welche Buchstaben stehen im SBAR-Schema für die Handlungsempfehlung?",x:"",o:["S = Situation","B = Background","A = Assessment","R = Recommendation"],c:3,e:"R steht für Recommendation (Empfehlung). Im SBAR-Schema strukturiert man die Übergabe: Situation → Background → Assessment → Recommendation. Die Empfehlung benennt konkrete Maßnahmen, die die übernehmende Pflegekraft umsetzen soll."},
    {q:"Sophie (14 J.) klagt über hämmernde Kopfschmerzen, Übelkeit und Lichtempfindlichkeit. Welche Pflegediagnose ist am wahrscheinlichsten?",x:"Fallkontext: Sophie hat seit 2 Tagen Kopfschmerzen, kann keine Flüssigkeiten bei sich behalten und erbricht sich häufig.",o:["Chronischer Schmerz (NANDA)","Akuter Schmerz (NANDA)","Pflegediagnose: Übelkeit (NANDA)","Mangelernährung (NANDA)"],c:1,e:"Die Pflegediagnose 'Akuter Schmerz' ist korrekt, da die Migräne episodisch und nicht chronisch ist. Die Symptome (plötzlicher Beginn, intensive Schmerzcharakterstik) sprechen für einen akuten Verlauf."},
    {q:"Welches Assessmentinstrument ist zur Schmerzerfassung bei Jugendlichen besonders geeignet?",x:"",o:["Waterlow-Skala","Numerische Rating-Skala (NRS)","Braden-Skala","Glasgow Coma Scale"],c:1,e:"Die Numerische Rating-Skala (NRS 0–10) ist einfach anwendbar und bei Jugendlichen und Erwachsenen validiert. Patienten benennen ihre Schmerzintensität selbst, was dem Grundsatz der subjektiven Schmerzerfassung entspricht."},
    {q:"Was bedeutet 'Dehydratationsgefahr' als Pflegeproblem bei Sophie?",x:"",o:["Sophies Körpergewicht ist zu hoch","Sophie nimmt zu wenig Flüssigkeit zu sich und erbricht sich – Flüssigkeitsmangel droht","Sophie trinkt zu viel Wasser","Sophies Nierenwerte sind erhöht"],c:1,e:"Dehydratation bedeutet einen Flüssigkeitsmangel im Körper. Da Sophie kaum trinken kann und sich häufig erbricht, verliert sie Flüssigkeit und Elektrolyte. Mögliche Maßnahmen: Infusionstherapie, Protokollierung der Ein- und Ausfuhr, Mundpflege."},
    {q:"Pflegekraft Ingrid Rust äußert bei der Übergabe, Sophie 'gehöre eigentlich auf die Kinderstation'. Wie ist diese Aussage ethisch zu bewerten?",x:"",o:["Sie ist fachlich korrekt und hilfreich","Sie zeigt professionelle Distanz","Sie verletzt Sophies Würde und ist nicht professionell","Sie ist irrelevant für die Übergabe"],c:2,e:"Die Aussage ist ethisch problematisch, da sie Sophies Würde verletzt und Vorurteile gegenüber Jugendlichen ausdrückt. Professionelle Pflege erfordert Wertschätzung und Respekt gegenüber allen Patienten unabhängig von Alter oder Hintergrund (Pflege-Charta, Berufsethik)."}
  ],
  paul:[
    {q:"Was bedeutet die Abkürzung ALL in Pauls Diagnose?",x:"",o:["Allgemeine lymphatische Leukopenie","Akute lymphatische Leukämie","Ambulante Langzeitliche Laboruntersuchung","Allergische Lungenläsion"],c:1,e:"ALL steht für Akute Lymphatische Leukämie – eine bösartige Erkrankung des blutbildenden Systems. Bei Kindern ist sie die häufigste Krebsart. Die Behandlung erfolgt durch Chemotherapie, die das Immunsystem stark schwächt."},
    {q:"Paul (10 J.) liegt im 2. Chemozyklus. Seine Leukozyten sind sehr niedrig. Welche Maßnahme hat höchste Priorität?",x:"",o:["Paul täglich wiegen","Paul zu Gruppenaktivitäten einladen","Infektionsschutzmaßnahmen einhalten – Paul vor Keimen schützen","Paul zu Besuchen von Freunden ermutigen"],c:2,e:"Niedrige Leukozyten (Leukopenie) bedeuten ein stark geschwächtes Immunsystem. Der Schutz vor Infektionen hat höchste Priorität: Schutzkleidung, Händedesinfektion, Besuchsregelung, keine frischen Blumen/Früchte."},
    {q:"Was ist das Ziel des Nutritional Risk Screening (NRS)?",x:"",o:["Körpergröße und -gewicht messen","Das Mangelernährungsrisiko eines Patienten systematisch einzuschätzen","Den Blutzucker zu kontrollieren","Die Flüssigkeitsbilanz zu erfassen"],c:1,e:"Das NRS 2002 ist ein validiertes Screeninginstrument zur Erfassung des Mangelernährungsrisikos. Es berücksichtigt BMI, Gewichtsverlust, Nahrungsaufnahme und Erkrankungsschwere. Ein erhöhtes Risiko leitet Maßnahmen der Ernährungstherapie ein."},
    {q:"Was regelt die EACH-Charta speziell für Kinder im Krankenhaus?",x:"",o:["Die Hygieneanforderungen auf Kinderstationen","Die Rechte von Kindern bei Krankenhausaufenthalten, z. B. Anwesenheit der Eltern","Den Medikamentenplan für Kinder","Die Personalschlüssel für Kinderstationen"],c:1,e:"Die EACH-Charta (European Association for Children in Hospital) sichert Kinderrechte im Krankenhaus: Eltern sollen jederzeit anwesend sein können, Kinder sollen altersgerecht informiert und ihre Entwicklung gefördert werden."},
    {q:"Paul weint und sagt er will nicht mehr da sein. Welche Reaktion ist pflegerisch angemessen?",x:"",o:["Das Thema ignorieren und ablenken","Paul sagen, er soll positiv denken","Empathisch zuhören, Gefühle ernst nehmen und das Team informieren","Sofort die Eltern anrufen ohne mit Paul zu sprechen"],c:2,e:"Empathisches Zuhören und das Ernstnehmen seiner Gefühle sind essenziell. Anschließend ist die Information des multiprofessionellen Teams (Arzt, Psychologe, Sozialarbeit) wichtig, um Paul angemessen zu unterstützen. Suizidgedanken bei Kindern müssen immer ernst genommen werden."}
  ],
  max:[
    {q:"Max kollabiert beim Training mit einer schweren Hypoglykämie. Was ist die sofortige Erstmaßnahme?",x:"",o:["Insulin spritzen","Traubenzucker oder zuckerhaltiges Getränk geben, wenn Patient ansprechbar","Blutdruck messen","Patient schlafen lassen"],c:1,e:"Bei leichter Hypoglykämie und ansprechbarem Patienten: orale Gabe von schnell wirksamen Kohlenhydraten (Traubenzucker, Fruchtsaft). Bei Bewusstlosigkeit: keine orale Gabe! → Rettungsdienst, i.v.-Glukose durch Arzt."},
    {q:"Was versteht man unter Bulimia nervosa?",x:"",o:["Essen verweigern und extrem wenig Kalorien aufnehmen","Anfälle von Essattacken mit anschließendem Erbrechen oder anderen Gegenmaßnahmen","Nur bestimmte Lebensmittel essen","Ständig zu viel essen ohne Gegenmaßnahmen"],c:1,e:"Bulimia nervosa ist durch wiederkehrende Essanfälle (unkontrolliertes Essen großer Mengen) und kompensatorisches Verhalten (Erbrechen, Abführmittel, Sport) gekennzeichnet. Anders als Anorexie haben Betroffene meist Normalgewicht."},
    {q:"Max' Eltern möchten wissen, welche Behandlungen geplant sind. Was gilt laut Patientenrechtegesetz?",x:"",o:["Eltern haben kein Auskunftsrecht bei volljährigen Kindern ohne Einwilligung","Alle Familienangehörigen dürfen automatisch informiert werden","Der Arzt entscheidet allein, wer informiert wird","Die Krankenakte muss immer an die Eltern herausgegeben werden"],c:0,e:"Max ist 19 Jahre und volljährig. Ohne seine ausdrückliche Zustimmung darf das Team seinen Eltern keine Informationen geben (§ 203 StGB, Schweigepflicht, Patientenrechtegesetz). Der Patient bestimmt selbst, wer informiert wird."},
    {q:"Pflegefachmann Linus dokumentiert kaum, weil 'Pflege Zuwendung ist'. Was ist daran problematisch?",x:"",o:["Gar nichts – Dokumentation ist überbewertet","Fehlende Dokumentation verletzt die Berufspflicht und gefährdet die Patientensicherheit","Dokumentation ist nur für Abrechnungszwecke wichtig","Nur Ärzte müssen dokumentieren"],c:1,e:"Die Pflegedokumentation ist rechtlich verpflichtend. Sie sichert die Kontinuität der Versorgung, ermöglicht Nachvollziehbarkeit, schützt Pflegende rechtlich und ist Grundlage der Qualitätssicherung. Fehlende Dokumentation = Behandlungsfehler."},
    {q:"Welche Maßnahme fördert die Autonomie von Max bei seinem Diabetes-Management?",x:"",o:["Alle Insulingaben vom Pflegepersonal durchführen lassen","Max bei allen Entscheidungen übergehen","Max in die Therapieplanung einbeziehen und Selbstmanagement-Schulungen anbieten","Max täglich kontrollieren ohne Erklärung"],c:2,e:"Autonomieförderung bedeutet, den Patienten als Experten seiner eigenen Erkrankung einzubeziehen. Selbstmanagement-Schulungen (Insulindosierung, Blutzuckermessung, Ernährung) befähigen Max, seinen Alltag selbstständig zu gestalten."}
  ],
  emilia:[
    {q:"Was versteht man unter einem Schütteltrauma?",x:"",o:["Ein Trauma durch Sturz aus großer Höhe","Eine Hirnverletzung durch heftiges Schütteln eines Säuglings oder Kleinkindes","Eine Verletzung durch sportlichen Unfall","Eine psychische Traumatisierung durch Lärm"],c:1,e:"Das Schütteltrauma (Shaken Baby Syndrome) entsteht durch heftiges Schütteln eines Kindes. Die schwachen Nackenmuskeln und das noch nicht vollständig entwickelte Gehirn machen Kleinkinder extrem anfällig für Scherverletzungen mit schweren Folgen (Hirnblutungen, Nervenschäden)."},
    {q:"Emilia (8 J.) leidet an Neurodermitis. Welche Pflegemaßnahme ist bei der Hautpflege besonders wichtig?",x:"",o:["Täglich mit Seife und heißem Wasser waschen","Alkohol zur Desinfektion verwenden","Regelmäßig rückfettende Pflegeprodukte verwenden und Kratzen vermeiden","Hautpflege ist nicht notwendig"],c:2,e:"Bei Neurodermitis (atopische Dermatitis) ist die gestörte Hautbarriere das zentrale Problem. Regelmäßige rückfettende Pflege (Emollentien) stärkt die Hautbarriere, reduziert Juckreiz und Entzündungen. Auf auslösende Substanzen und heißes Wasser sollte verzichtet werden."},
    {q:"Was versteht man unter Kindeswohlgefährdung im Sinne des § 8a SGB VIII?",x:"",o:["Wenn ein Kind schlechte Schulnoten hat","Wenn eine erhebliche Beeinträchtigung des körperlichen, geistigen oder seelischen Wohls des Kindes vorliegt","Wenn Eltern streng erziehen","Wenn ein Kind unglücklich ist"],c:1,e:"§ 8a SGB VIII verpflichtet Fachkräfte, bei gewichtigen Anhaltspunkten für eine Kindeswohlgefährdung aktiv zu werden. Die Pflegekraft hat eine Meldepflicht und muss im Team Risikoabschätzungen vornehmen. Vernachlässigung, Misshandlung und Missbrauch sind Formen der Kindeswohlgefährdung."},
    {q:"Erzieher Ronald Hippe sagt zu Emilia: 'Du riechst wie ein Stinktier!' Wie ist dieses Verhalten einzuordnen?",x:"",o:["Er ist ehrlich und das ist gut für Emilia","Es ist eine Form psychischer Gewalt / verbaler Misshandlung","Es ist eine pädagogische Methode","Es ist übliche Sprache unter Erziehern und Kindern"],c:1,e:"Abwertende, beschämende Aussagen gegenüber Kindern sind psychische Gewalt. Sie verletzen die Würde des Kindes, schädigen das Selbstbild und können langfristige psychische Folgen haben. Als Pflegekraft besteht die Pflicht, dies dem Vorgesetzten zu melden."},
    {q:"Was gehört zur Pflegeanamnese bei einem Kind wie Emilia?",x:"",o:["Nur die aktuellen Pflegeprobleme","Nur die Medikamente","Biografie, Gewohnheiten, soziales Umfeld, Entwicklungsstand, aktuelle und potenzielle Pflegeprobleme","Nur die Diagnosen des Arztes"],c:2,e:"Die Pflegeanamnese erfasst umfassend: Biografie, Gewohnheiten, Ressourcen, soziales Umfeld, Entwicklungsstand, aktuelle Pflegeprobleme und potenzielle Risiken. Sie bildet die Grundlage für den Pflegeprozess und eine individuell angepasste Pflege."}
  ],
  mazur:[
    {q:"Frau Mazur hat MS mit progredientem Verlauf. Was bedeutet 'progredienter Verlauf'?",x:"",o:["Die Erkrankung heilt sich langsam selbst","Die Erkrankung verschlechtert sich fortlaufend ohne deutliche Remissionen","Die Erkrankung bleibt stabil","Die Erkrankung tritt nur episodisch auf"],c:1,e:"Bei der primär-progredienten MS (PPMS) schreitet die Erkrankung kontinuierlich fort ohne klar abgrenzbare Schübe und Remissionen. Symptome wie Spastik, Schmerzen und eingeschränkte Mobilität nehmen stetig zu. Dies unterscheidet sich von der schubförmigen MS."},
    {q:"Was ist das Ziel der Kurzzeitpflege nach § 42 SGB XI?",x:"",o:["Die pflegende Person dauerhaft zu entlasten","Vorübergehend die Versorgung zu sichern, wenn die häusliche Pflege nicht möglich ist (max. 8 Wochen/Jahr)","Den Pflegegrad zu erhöhen","Den Patienten dauerhaft in die stationäre Pflege zu überführen"],c:1,e:"Kurzzeitpflege (§ 42 SGB XI) ermöglicht vorübergehende vollstationäre Versorgung – z. B. nach Krankenhausaufenthalt oder bei Urlaub der Pflegeperson – bis zu 8 Wochen und ca. 1.774 € pro Jahr. Sie sichert die häusliche Versorgung langfristig."},
    {q:"Welches Assessmentinstrument nutzte die Pflegefachfrau bei Frau Mazur zur Schmerzeinschätzung?",x:"Fallkontext: Die Pflegefachfrau führte eine Schmerzeinschätzung mit Frau Mazur durch.",o:["Braden-Skala","Waterlow-Skala","Numerische Rating-Skala (NRS)","Glasgow Coma Scale"],c:2,e:"Die Numerische Rating-Skala (NRS 0–10) ist ein einfaches, validiertes Selbstbeurteilungsinstrument zur Schmerzeinschätzung. Der Patient bewertet seinen Schmerz auf einer Skala von 0 (kein Schmerz) bis 10 (stärkster vorstellbarer Schmerz)."},
    {q:"Frau Mazur hat Pflegegrad 4. Was bedeutet das?",x:"",o:["Leichte Beeinträchtigungen der Selbstständigkeit","Erhebliche Beeinträchtigungen der Selbstständigkeit","Schwerste Beeinträchtigungen der Selbstständigkeit mit besonderen Anforderungen","Sie ist vollständig selbstständig"],c:1,e:"Pflegegrad 4 bedeutet 'schwerste Beeinträchtigungen der Selbstständigkeit'. Im Begutachtungsinstrument werden 64–79 von 100 Punkten erreicht. Die Versorgung umfasst umfangreiche Leistungen der Pflegeversicherung (SGB XI)."},
    {q:"Was ist bei der Pflegeprozessgestaltung nach Fiechter & Meier zu beachten?",x:"",o:["Es gibt nur 4 Schritte im Pflegeprozess","Der Pflegeprozess umfasst 6 Schritte: Informationssammlung, Erkennen der Pflegeprobleme, Formulieren der Pflegeziele, Planung, Durchführung, Evaluation","Der Pflegeprozess beginnt immer mit der Pflege","Ziele werden vom Arzt formuliert"],c:1,e:"Der Pflegeprozess nach Fiechter & Meier umfasst 6 Schritte: 1. Informationssammlung, 2. Erkennen von Ressourcen und Pflegeproblemen, 3. Pflegeziele festlegen, 4. Pflegemaßnahmen planen, 5. Maßnahmen durchführen, 6. Wirksamkeit beurteilen (Evaluation)."}

  sommer:[
    {q:"Was ist ein Transversostoma?",x:"",o:["Ein künstlicher Darmausgang am Querkolon","Ein künstlicher Harnausgang","Eine Magensonde","Ein Katheter"],c:0,e:"Ein Transversostoma ist ein künstlicher Darmausgang (Stoma) am Querkolon (Colon transversum). Es wird z. B. bei Morbus Crohn angelegt, wenn der betroffene Darmabschnitt ausgeleitet werden muss. Stuhl wird über den Beutel abgeleitet."},
    {q:"Herr Sommer ekelt sich vor seinem Stoma. Wie gehen Sie professionell damit um?",x:"",o:["Ihm sagen, er soll sich zusammenreißen","Seinen Ekel ignorieren","Seinen Ekel als normale Reaktion anerkennen, Beratung/Anleitung schrittweise anbieten, Selbsthilfegruppen empfehlen","Das Stoma vor ihm verbergen"],c:2,e:"Ekel und Scham sind normale Reaktionen auf ein Stoma. Professionelle Pflege anerkennt diese Gefühle empathisch. Schrittweise Anleitung (erst beobachten, dann assistieren, dann selbst durchführen) fördert die Akzeptanz. Selbsthilfegruppen und Stomaberater bieten langfristige Unterstützung."},
    {q:"Was beschreibt das Kommunikationsmodell nach Schulz von Thun (4-Ohren-Modell)?",x:"",o:["3 Kommunikationsstufen im Pflegegespräch","Jede Nachricht hat 4 Aspekte: Sachinhalt, Selbstoffenbarung, Beziehungsaspekt, Appell","2 Kommunikationsphasen","Ein Modell zur Konfliktlösung im Team"],c:1,e:"Das 4-Ohren-Modell besagt, dass jede Botschaft 4 Seiten hat: 1. Sachinhalt (Information), 2. Selbstoffenbarung (etwas über den Sender), 3. Beziehungsaspekt (wie Sender den Empfänger sieht), 4. Appell (was Sender will). Missverständnisse entstehen, wenn Sender und Empfänger verschiedene Seiten betonen."},
    {q:"Was ist Morbus Crohn?",x:"",o:["Eine Lebererkrankung","Eine chronisch-entzündliche Darmerkrankung, die den gesamten Magen-Darm-Trakt befallen kann","Eine akute Darminfektionskrankheit","Eine Erkrankung der Bauchspeicheldrüse"],c:1,e:"Morbus Crohn ist eine chronisch-entzündliche Darmerkrankung (CED), die diskontinuierlich alle Wandschichten des gesamten Magen-Darm-Trakts befallen kann. Typische Symptome: Bauchschmerzen, Durchfall, Gewichtsverlust, Erschöpfung."},
    {q:"Was beschreibt das Modell der fördernden Prozesspflege nach Monika Krohwinkel?",x:"",o:["Einen Lernplan für Pflegeauszubildende","Ein Pflegemodell mit 13 AEDL (Aktivitäten und existenzielle Erfahrungen des Lebens) als Grundlage der Pflegeplanung","Ein Modell zur Qualitätsmessung","Einen Organisationsplan für Krankenhäuser"],c:1,e:"Das AEDL-Modell nach Krohwinkel umfasst 13 Aktivitäten und existenzielle Erfahrungen des Lebens (z.B. Kommunizieren, Bewegen, Essen/Trinken, Ausscheiden, Sich beschäftigen, Mit existenziellen Erfahrungen umgehen). Es bildet die Grundlage vieler Pflegeplanungen in Deutschland."}

  aslan:[
    {q:"Aslan (8 J.) hat Asthma bronchiale. Was ist ein typischer Auslöser für einen Asthmaanfall?",x:"",o:["Schlafen","Tierhaare, Pollen, Hausstaub oder körperliche Anstrengung","Ruhiges Sitzen","Trinken von Wasser"],c:1,e:"Typische Asthma-Trigger sind Allergene (Tierhaare, Pollen, Hausstaub), Infekte, Kälte, körperliche Belastung, Rauchen und Stress. Bei Aslan ist der Hund 'Tobi' ein Trigger (Tierhaare). Das Meiden der Auslöser ist zentraler Bestandteil des Asthmamanagements."},
    {q:"Was ist EBN (Evidence-Based Nursing)?",x:"",o:["Ein neues Pflegesystem aus England","Die Integration von bestem verfügbarem Forschungswissen, klinischer Expertise und Patientenpräferenzen in Pflegeentscheidungen","Ein Bewertungssystem für Pflegequalität","Ein Dokumentationssystem"],c:1,e:"EBN (Evidence-Based Nursing / Evidenzbasierte Pflege) bedeutet, Pflegeentscheidungen auf der Grundlage von: 1. bestem aktuellem Forschungswissen, 2. klinischer Expertise der Pflegenden, und 3. Werten/Präferenzen der Patienten zu treffen."},
    {q:"Was versteht man unter Transitional Care (Übergangspflege)?",x:"",o:["Pflege im Notarztwagen","Koordinierte Versorgung beim Übergang zwischen verschiedenen Versorgungsbereichen (z.B. Krankenhaus → häusliche Pflege)","Pflege für Transitreisende","Die Einarbeitung neuer Pflegekräfte"],c:1,e:"Transitional Care beschreibt die strukturierte Begleitung von Patienten beim Wechsel zwischen Versorgungssettings (z.B. stationär → ambulant). Ziel: Versorgungskontinuität, Vermeidung von Rehospitalisierung, Sicherstellung, dass Patienten und Familien gut vorbereitet sind."},
    {q:"Das transaktionale Stressmodell nach Lazarus & Folkman beschreibt:",x:"",o:["Einen Lernplan für Studierende","Wie Menschen Stress bewerten und bewältigen (primäre und sekundäre Bewertung)","Die Beziehung zwischen Pflegenden und Patienten","Eine Methode zur Teamführung"],c:1,e:"Nach Lazarus & Folkman bewertet eine Person zuerst, ob eine Situation bedrohlich ist (primäre Bewertung), dann ob sie Bewältigungsressourcen hat (sekundäre Bewertung). Stress entsteht, wenn die Anforderung die Ressourcen übersteigt. Coping-Strategien sind problemfokussiert oder emotionsfokussiert."},
    {q:"Welche Maßnahme gehört zur Gesundheitsförderung und Primärprävention bei Asthma?",x:"",o:["Sofortige Gabe von Kortison bei jedem Atemwegsinfekt","Regelmäßige Allergietests für alle Kinder","Aufklärung über Auslöser, Meiden bekannter Allergene, kein Passivrauch","Hospitalisierung bei jeder Atemnot"],c:2,e:"Primärprävention bei Asthma zielt auf die Verhinderung der Erkrankung: Meiden von Allergenen, Rauchexposition vermeiden, Gesundheitsaufklärung der Familie. Für Betroffene gehört das Erkennen und Meiden individueller Trigger zur Sekundärprävention."}

  krueger:[
    {q:"Was bedeutet APGAR 9/10 bei der Geburt?",x:"Fallkontext: Frau Krügers Sohn Max kam mit APGAR 9/10 zur Welt.",o:["Der Säugling ist in einem kritischen Zustand","Der Säugling ist in einem sehr guten Zustand mit minimalen Anpassungsschwierigkeiten","Der Säugling benötigt sofortige Reanimation","Der Säugling hat eine angeborene Erkrankung"],c:1,e:"Der APGAR-Score bewertet 5 Vitalzeichen (Atmung, Puls, Grundtonus, Aussehen, Reflexe) je 0–2 Punkte. 9/10 nach 1 und 5 Minuten zeigt eine sehr gute Anpassung. 7–10 = guter Zustand, <7 = Handlungsbedarf."},
    {q:"Was sichert der Expertenstandard 'Entlassungsmanagement in der Pflege'?",x:"",o:["Eine schnelle Entlassung aller Patienten","Eine strukturierte, rechtzeitig begonnene Vorbereitung der Entlassung, um die Versorgungskontinuität zu gewährleisten","Die Übernahme der Pflegekosten nach der Entlassung","Ein standardisiertes Ernährungsprogramm nach Entlassung"],c:1,e:"Der Expertenstandard Entlassungsmanagement (DNQP) fordert: frühzeitiges Assessment des Entlassungsbedarfs, Einbeziehung von Patient und Angehörigen, Koordination mit nachversorgenden Diensten, strukturierte Informationsweitergabe. Ziel: Versorgungskontinuität nach Krankenhausaufenthalt."},
    {q:"Frau Krüger stillt, aber es klappt noch nicht. Was können Sie als Pflegefachperson tun?",x:"",o:["Sofort auf Flaschennahrung umstellen","Die Mutter beruhigen und zur Geduld ermahnen ohne zu helfen","Fachkundige Stillberatung anbieten, Anlegen zeigen, Ressourcen der Mutter stärken","Das Stillen sofort beenden lassen"],c:2,e:"Professionelle Stillunterstützung ist Teil der Wochenbettbetreuung: Korrekte Anlege-Technik zeigen, häufiges Anlegen empfehlen, Brustkontrolle, Wochenbettdepression beachten, bei Bedarf Stillberatung oder Hebamme einbeziehen. Die WHO empfiehlt ausschließliches Stillen für 6 Monate."},
    {q:"Was sind Arten der Prävention? Nennen Sie die 3 Stufen.",x:"",o:["Primär, Sekundär, Tertiär","Aktiv, Passiv, Assistiert","Kurz, Mittel, Langfristig","Medikamentös, Operativ, Konservativ"],c:0,e:"Primärprävention: Verhinderung von Erkrankungen (z.B. Impfung). Sekundärprävention: Früherkennung (z.B. Vorsorgeuntersuchungen). Tertiärprävention: Rückfallverhütung und Rehabilitation bei bestehender Erkrankung (z.B. Physiotherapie nach Schlaganfall)."},
    {q:"Frau Krügers Schwiegermutter gibt ungebetene Ratschläge. Was ist die angemessene Reaktion der Pflegefachperson?",x:"",o:["Die Schwiegermutter aus dem Zimmer weisen","Frau Krüger sagen sie soll die Ratschläge befolgen","Frau Krügers Wunsch nach Ruhe respektieren und neutral vermitteln – Patientenautonomie hat Vorrang","Die Ratschläge der Schwiegermutter bestätigen"],c:2,e:"Patientenautonomie und das Recht auf Selbstbestimmung haben Vorrang. Die Pflegefachperson unterstützt Frau Krügers Wünsche (keine Besucher in den ersten Tagen) und vermittelt verständnisvoll aber klar. Dabei bleibt sie professionell und vermeidet Parteinahme."}
