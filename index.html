  leben:[
    {q:"Was ist der Unterschied zwischen Herzinsuffizienz und arterieller Hypertonie?",x:"",o:["Das ist dasselbe","Hypertonie = dauerhaft erhöhter Blutdruck; Herzinsuffizienz = das Herz pumpt nicht ausreichend Blut","Hypertonie ist harmloser","Herzinsuffizienz bedeutet Herzstillstand"],c:1,e:"Arterielle Hypertonie (dauerhaft >140/90 mmHg) ist ein wichtiger Risikofaktor für die Herzinsuffizienz. Bei Herzinsuffizienz (NYHA-Klassifikation I–IV) kann das Herz den Körper nicht ausreichend mit Blut und Sauerstoff versorgen. Ödeme, Dyspnoe und Leistungsminderung sind typische Symptome."},
    {q:"Herr Beck (60 J., NYHA IV) hat ödematöse Beine. Was bedeutet das für seine Mobilität?",x:"",o:["Er kann problemlos Sport treiben","Ödeme schränken die Mobilität stark ein – Bettlägerigkeit und Dekubitusrisiko steigen","Ödeme sind harmlos und heilen von selbst","Ödeme erfordern sofortige Operation"],c:1,e:"Bei NYHA IV bestehen Beschwerden bereits in Ruhe. Beinödeme schränken Mobilität stark ein und erhöhen das Risiko für Dekubitus, Thrombose und Pneumonie. Die Waterlow-Skala oder Braden-Skala erfassen das Dekubitusrisiko. Positionswechsel und Mobilisierung sind essenziell."},
    {q:"Was beschreibt das Modell des Bettlägerigwerdens nach Abt-Zegelin?",x:"",o:["Ein Ernährungsplan für immobile Patienten","Ein Stufenmodell, das zeigt, wie Immobilität schrittweise entsteht (von gelegentlichem Zögern bis zur Bettlägerigkeit)","Ein Bewertungssystem für Pflegebedürftigkeit","Ein Modell zur Sturzprävention"],c:1,e:"Das Modell nach Abt-Zegelin beschreibt 5 Phasen: 1. Zögerer (gelegentliches Ausbleiben von Mobilisation), 2. Unsichere (brauchen Hilfe), 3. Heimsitzer, 4. Stubenhocker, 5. Bettlägerige. Frühzeitiges Erkennen und Gegensteuern verhindert den Fortschritt."},
    {q:"Was ist das Ziel gesundheitsförderlicher Beratung nach dem Modell von Schulz von Thun?",x:"",o:["Den Patienten zu zwingen, gesünder zu leben","Den Patienten mit dem Appell-Ohr zu überzeugen","Eine wertschätzende, verständnisvolle Kommunikation zu führen und Eigenverantwortung zu fördern","Informationen so einfach wie möglich zu halten"],c:2,e:"Gesundheitsförderliche Beratung basiert auf Empathie, Wertschätzung und Partnerschaftlichkeit. Sie ermächtigt den Patienten (Empowerment), eigene Entscheidungen zu treffen. Der Appell-Aspekt (Schulz von Thun) sollte nicht dominieren – Überredung mindert die Autonomie."},
    {q:"Die Waterlow-Skala erfasst das Dekubitusrisiko. Welche Faktoren werden bewertet?",x:"",o:["Nur das Körpergewicht","Gewicht/BMI, Hautbeschaffenheit, Geschlecht/Alter, Mobilität, Kontinenz, Ernährung, Neurologie, besondere Risiken (z.B. Medikamente)","Nur Alter und Mobilität","Nur Blutdruckwerte"],c:1,e:"Die Waterlow-Skala bewertet mehrere Risikofaktoren: Körperbau/Gewicht, Hauttyp, Geschlecht/Alter, Mobilität, Kontinenz, Appetit, neurologische Störungen und besondere Risikofaktoren (z.B. Zytotoxika, Rauchen). Ein Wert ≥10 = erhöhtes Risiko; ≥15 = hohes Risiko."}
  ],
  tom:[
    {q:"Tom (9 Monate) hat eine 'Plagiozephalie'. Was bedeutet das?",x:"",o:["Eine Schädeldeformität durch einseitige Lagerung (abgeflachter Hinterkopf)","Eine neurologische Erkrankung","Eine Allergiereaktion","Eine angeborene Herzerkrankung"],c:0,e:"Plagiozephalie ('flacher Kopf') entsteht durch einseitigen Druck auf den noch weichen Schädel, z.B. bei überwiegendem Rückenliegen. Maßnahmen: Lagerungswechsel, Tummy-Time, ggf. Physiotherapie oder Helm-Therapie. Bei Tom ist sie durch Rückenlage bei seiner pflegebedürftigen Mutter entstanden."},
    {q:"Was sind 'Grenzsteine der Entwicklung' bei einem 9 Monate alten Säugling?",x:"",o:["Meilensteine der motorischen, sprachlichen und sozialen Entwicklung, die ein Kind in einem bestimmten Alter erreicht haben sollte","Pflegerische Grenzen im Umgang mit Kindern","Gesetzliche Regelungen zur Kinderpflege","Ernährungsempfehlungen für Säuglinge"],c:0,e:"Grenzsteine der Entwicklung (nach Michaelis) sind Entwicklungsziele für bestimmte Altersgruppen: motorisch (z.B. freies Sitzen mit 8–9 Monaten), sprachlich (Lallen), sozial (Fremdeln). Werden sie nicht erreicht, besteht Beratungs- und ggf. Therapiebedarf."},
    {q:"Bei Tom wird Dekubitusprophylaxe durchgeführt. Was ist das Ziel?",x:"",o:["Sturz zu verhindern","Druckgeschwüre (Dekubitus) durch Druckentlastung und Positionswechsel zu verhindern","Das Gewicht zu kontrollieren","Infektionen zu verhindern"],c:1,e:"Dekubitusprophylaxe umfasst: regelmäßige Positionswechsel (mindestens alle 2 Stunden), druckverteilende Hilfsmittel (Spezialmatratzen), Hautpflege, Ernährungsoptimierung und Mobilisation. Der Expertenstandard Dekubitusprophylaxe (DNQP) gibt detaillierte Empfehlungen."},
    {q:"Tom hat Schluckprobleme. Wer ist im interprofessionellen Team zuständig für die Schlucktherapie?",x:"",o:["Die Pflegefachkraft allein","Nur der Kinderarzt","Die Logopädin / der Logopäde, koordiniert durch das Pflegeteam","Nur die Eltern"],c:2,e:"Schluckstörungen (Dysphagie) werden von der Logopädie behandelt. Die Pflegefachkraft koordiniert, setzt Empfehlungen der Logopädin im Alltag um (Nahrungskonsistenz, Haltung beim Essen) und dokumentiert Beobachtungen. Interprofessionelle Zusammenarbeit ist essenziell."},
    {q:"Welche NANDA-Pflegediagnose ist bei Toms Mangelernährung passend?",x:"",o:["Chronischer Schmerz","Untergewicht/Mangelernährung: 'Ernährungsdefizit' oder 'untergewichtige Körpermasse'","Sehbehinderung","Schlafstörung"],c:1,e:"Die NANDA-Pflegediagnose 'Untergewichtige Körpermasse' oder 'Ernährungsimbalance: weniger als der Körperbedarf' ist bei Tom zutreffend. Sie beschreibt die Situation, dass Nährstoffaufnahme unter dem metabolischen Bedarf liegt. Ziele und Maßnahmen fokussieren auf Kalorienaufnahme und Schlucken."}
  ],
  enttaeuschung:[
    {q:"Was ist die Theorie der interpersonalen Beziehungen nach Hildegard Peplau?",x:"",o:["Eine Pflegetheorie, die die heilsame Bedeutung der Pflegebeziehung betont und 4 Phasen beschreibt","Ein Kommunikationsmodell für Teams","Eine Theorie zur Krankheitsentstehung","Ein Qualitätsmessinstrument"],c:0,e:"Peplaus Pflegetheorie (1952) sieht Pflege als therapeutische interpersonale Beziehung. 4 Phasen: 1. Orientierung (Kennenlernen, Problemdefinition), 2. Identifikation (Patient identifiziert sich mit Pflegeperson), 3. Nutzung (Patient nutzt Pflegeangebote), 4. Ablösung (Beziehung endet, Patient wird selbstständig)."},
    {q:"Was ist der Expertenstandard Sturzprophylaxe in der Pflege?",x:"",o:["Ein Pflegestandard zur Verhinderung von Stürzen durch Risikobewertung und gezielte Maßnahmen","Ein allgemeines Sicherheitskonzept","Ein Medikamentenplan","Eine gesetzliche Regelung"],c:0,e:"Der Expertenstandard Sturzprophylaxe (DNQP) fordert: Sturzrisikoerfassung (z.B. Morse Fall Scale), individuelle Maßnahmenplanung (Umgebungsanpassung, Hilfsmittel, Schulung), Evaluation. Ziel: Sturzrate senken und Sturzfolgen minimieren."},
    {q:"Frau Amsel hat MS und einen Dauerkatheter. Was ist ein wichtiger Aspekt der Katheterpflege?",x:"",o:["Den Katheter täglich wechseln","Strikte Asepsis beim Umgang, regelmäßige Meatal-Pflege, Urinableitung beobachten, auf Infektionszeichen achten","Den Katheter 1x pro Woche spülen","Den Katheter nur bei Schmerzen wechseln"],c:1,e:"Katheterpflege umfasst: aseptischen Umgang, tägliche Meatal-Pflege, Drainagesystem geschlossen halten, ausreichende Flüssigkeitszufuhr, Beobachtung auf Infektionszeichen (Fieber, trüber/riechender Urin, Schmerzen). Ziel: katheterassoziierte Harnwegsinfekte (CAUTI) verhindern."},
    {q:"Was bedeutet Gesundheitsförderung im Berufsalltag für Pflegende?",x:"",o:["Nur die eigene körperliche Fitness","Maßnahmen, die Pflegende vor berufsbedingten Erkrankungen schützen: ergonomisches Arbeiten, Stressmanagement, psychische Gesundheit, betriebliche Angebote","Das Rauchen aufzuhören","Ausschließlich Obst und Gemüse zu essen"],c:1,e:"Betriebliche Gesundheitsförderung für Pflegende umfasst: Rückenschule, ergonomische Hilfsmittel, Stressprävention, Supervision, psychische Gesundheitsangebote. Pflegeberufe haben hohes Belastungspotenzial – Eigenverantwortung und betriebliche Strukturen sind gleichermaßen wichtig."},
    {q:"Welche Pflegetheorie beschreibt das Konzept der 'caring'?",x:"",o:["Das Krohwinkel-Modell (AEDL)","Das Modell nach Jean Watson, das Pflege als zwischenmenschliche Fürsorge und Caring-Beziehung versteht","Das Roper-Logan-Tierney-Modell","Die Salutogenese nach Antonovsky"],c:1,e:"Jean Watson (Theory of Human Caring) betrachtet Pflege als Fürsorgebeziehung mit 10 Caritas-Prozessen. Kernpunkt: echtes, empathisches Interesse am Menschen, Förderung des Wohlbefindens auf allen Ebenen (körperlich, geistig, spirituell). Wird in Deutschland zunehmend diskutiert."}
  ],
  weitergehen:[
    {q:"Was bedeutet pAVK?",x:"",o:["Periphere arterielle Verschlusskrankheit – Durchblutungsstörung in den Extremitäten","Pneumonie mit aVersorgung und Komplikationen","Partieller abdominaler Venenverschluss","Primäre Arthritis mit Vaskulitis"],c:0,e:"pAVK = periphere arterielle Verschlusskrankheit: Verengung der Arterien der Extremitäten durch Arteriosklerose. Symptome: Claudicatio intermittens (Schaufensterkrankheit), Ruheschmerzen, Nekrosen. Risikofaktoren: Rauchen, Diabetes, Hypertonie, Dyslipidämie."},
    {q:"Was beschreibt die Ottawa-Charta zur Gesundheitsförderung?",x:"",o:["Eine Ernährungsempfehlung der WHO","Ein internationales Dokument (WHO 1986), das Gesundheitsförderung als Prozess zur Verbesserung der Gesundheitskontrolle definiert","Ein Pflegestandard für chronische Erkrankungen","Ein europäisches Gesundheitsgesetz"],c:1,e:"Die Ottawa-Charta (WHO 1986) definiert 5 Handlungsfelder: 1. Entwicklung gesundheitsfördernder Gesamtpolitik, 2. Unterstützende Lebenswelten schaffen, 3. Gesundheitsbezogene Gemeinschaftsaktionen, 4. Persönliche Kompetenzen entwickeln, 5. Gesundheitsdienste neu orientieren."},
    {q:"Was unterscheidet Salutogenese von Pathogenese?",x:"",o:["Salutogenese fragt nach der Entstehung von Gesundheit, Pathogenese nach der Entstehung von Krankheit","Sie sind dasselbe","Salutogenese ist eine Therapieform","Pathogenese ist ein Pflegemodell"],c:0,e:"Aaron Antonovsky (1979) entwickelte das salutogenetische Modell: 'Was hält Menschen gesund?' (Salutogenese) vs. 'Was macht krank?' (Pathogenese). Das Kohärenzgefühl (Verstehbarkeit, Handhabbarkeit, Bedeutsamkeit) ist das Kernkonzept der Salutogenese."},
    {q:"Herr Paulsen soll Blutdruckselbstmessung erlernen. Was ist bei der Schulung besonders wichtig?",x:"",o:["Ihm einfach das Gerät geben ohne Erklärung","Ihn einmalig schriftlich informieren","Ihn schrittweise anleiten, üben lassen, Rückfragen ermöglichen und Protokollführung erklären","Den Arzt die Messung machen lassen"],c:2,e:"Patientenschulung zur Blutdruckselbstmessung: Gerät erklären, korrekte Anlagetechnik zeigen, Ruhephase vor Messung, beide Arme messen, Dokumentation im Blutdrucktagebuch. Teach-back-Methode: Patient wiederholt, was er verstanden hat. Schriftliches Material ergänzend."},
    {q:"Was umfasst die Tertiärprävention bei pAVK?",x:"",o:["Verhinderung der Erkrankung durch gesunde Lebensweise","Früherkennung durch Screening","Verhinderung von Komplikationen und Rehabilitation: Gehtraining, Rauchstopp, Fußpflege, Medikamente, Wundversorgung","Impfungen gegen Gefäßkrankheiten"],c:2,e:"Tertiärprävention zielt darauf ab, Verschlechterung und Komplikationen einer bestehenden Erkrankung zu verhindern. Bei pAVK: strukturiertes Gehtraining (verbessert Kollateralkreislauf), Rauchstopp, Fußinspektion, optimale Einstellung von Risikofaktoren, Wundversorgung bei Ulzera."}
  ],
  festival:[
    {q:"Was ist ein Grand-mal-Anfall (generalisierter tonisch-klonischer Anfall)?",x:"",o:["Kurze Bewusstseinspause ohne Zuckungen","Ein Anfall mit plötzlichem Bewusstseinsverlust, Tonuserhöhung (tonisch) gefolgt von rhythmischen Zuckungen (klonisch) der gesamten Muskulatur","Ein einseitiger Krampf des Arms","Ein Anfall mit nur optischen Phänomenen"],c:1,e:"Der generalisierte tonisch-klonische Anfall (früher 'Grand mal') umfasst: tonische Phase (Muskelsteifheit, Atemstillstand, Zyanose) → klonische Phase (rhythmische Zuckungen) → postiktale Erschöpfungsphase. Erstmaßnahmen: Verletzungsschutz, Zeit stoppen, keine Gegenstände in den Mund."},
    {q:"Was regelt § 203 StGB in Bezug auf die Weitergabe von Patientendaten?",x:"",o:["Die Pflicht zur Dokumentation","Das Verbot, Patientendaten ohne Einwilligung weiterzugeben (Schweigepflicht für Heil- und Pflegeberufe)","Die Datenspeicherdauer","Die Patientenaufklärung vor Operationen"],c:1,e:"§ 203 StGB schützt das Patientengeheimnis. Ärzte, Pflegepersonal und andere Heilberufe dürfen ohne Einwilligung des Patienten keine vertraulichen Informationen an Dritte (auch Eltern Volljähriger, Medien) weitergeben. Ausnahmen: gesetzliche Meldepflichten, Notwehr."},
    {q:"Was ist ein EEG (Elektroenzephalogramm)?",x:"",o:["Ein Verfahren zur Messung der Herzströme","Ein Verfahren zur Messung der elektrischen Hirnaktivität – wichtig bei Epilepsie-Diagnostik","Ein Verfahren zur Darstellung der Hirnstruktur","Ein Laborwert im Blut"],c:1,e:"Das EEG misst die elektrische Aktivität des Gehirns über Elektroden auf der Kopfhaut. Bei Epilepsie zeigen sich charakteristische Muster (Spikes, Sharp waves). Es hilft bei Diagnostik, Klassifikation von Anfallstypen und Therapieplanung."},
    {q:"Niklas' Vater reagiert wütend in der Notaufnahme. Wie reagieren Sie professionell?",x:"",o:["Ihn ignorieren","Ihn anbrüllen","Ruhig bleiben, Verständnis zeigen, sachlich informieren, Eskalation deeskalieren","Sofort Sicherheitsdienst rufen"],c:2,e:"In Krisensituationen empfiehlt sich die de-eskalierende Kommunikation: ruhige Stimme, Sicherheitsabstand, Verständnis für Sorge zeigen, klare sachliche Informationen geben, eigene Ruhe bewahren. Wut entsteht oft aus Angst – Empathie hilft mehr als Konfrontation."},
    {q:"Was sind gesetzliche Bestimmungen zur Informationsweitergabe an Minderjährige bzw. ihre Eltern?",x:"",o:["Eltern minderjähriger Kinder haben immer uneingeschränktes Auskunftsrecht","Bei Minderjährigen entscheiden die Sorgeberechtigten im Rahmen der elterlichen Sorge mit; ab einem bestimmten Reifegrad werden die Wünsche des Jugendlichen berücksichtigt","Minderjährige haben keine Rechte","Nur der Arzt entscheidet, wer informiert wird"],c:1,e:"Eltern haben bei Minderjährigen das Sorgerecht und damit Auskunftsrecht. Bei zunehmendem Reifegrad (ab ca. 14–16 Jahren) sind auch die Wünsche der Jugendlichen zu berücksichtigen. Die Einwilligungsfähigkeit ist individuell zu prüfen – sie ist keine reine Altersfrage."}
  ],
  notaufnahme:[
    {q:"Was bedeutet das Manchester Triage System (MTS)?",x:"",o:["Ein Behandlungsprotokoll für Herzinfarkt","Ein standardisiertes Ersteinschätzungssystem in der Notaufnahme – Patienten werden nach Dringlichkeit in 5 Kategorien eingeteilt","Eine Bewertungsskala für Schmerzen","Ein Dokumentationssystem"],c:1,e:"Das MTS klassifiziert Patienten in 5 Dringlichkeitsstufen: 1. Sofort (rot), 2. Sehr dringend (orange, 10 Min.), 3. Dringend (gelb, 30 Min.), 4. Normal (grün, 90 Min.), 5. Nicht dringend (blau, 120 Min.). Ziel: Priorisierung der Behandlungsreihenfolge in der Notaufnahme."},
    {q:"Was sind typische Symptome einer akuten Pankreatitis?",x:"",o:["Kopfschmerzen und Schwindel","Gürtelf örmige Oberbauchschmerzen, Übelkeit, Erbrechen, Druckschmerz, erhöhte Pankreas-Enzyme (Lipase, Amylase)","Brustschmerzen und Atemnot","Rückenschmerzen ohne Ausstrahlung"],c:1,e:"Akute Pankreatitis: starke gürtelförmige Bauchschmerzen (Oberbauch mit Ausstrahlung in den Rücken), Übelkeit, Erbrechen, Meteorismus. Labor: stark erhöhte Lipase (>3-fache Norm), Amylase. Ursachen: Alkohol, Gallensteine, Medikamente."},
    {q:"Was versteht man unter einem septischen Schock?",x:"",o:["Einen Schock durch starken Blutverlust","Einen lebensbedrohlichen Zustand mit Organversagen als Folge einer unkontrollierten Infektion mit Kreislaufversagen","Einen anaphylaktischen Schock durch Allergie","Einen Schock durch Herzversagen"],c:1,e:"Septischer Schock = schwerste Form der Sepsis mit persistierendem Blutdruckabfall trotz Flüssigkeitsgabe und Vasopressorbedarf. Ursache: unkontrollierte Immunantwort auf Infektion → Organversagen (Lunge, Niere, Leber). Behandlung: sofortige Intensivtherapie, Antibiotika."},
    {q:"Welche Bedeutung hat die Händedesinfektion in der Notaufnahme?",x:"",o:["Hygiene ist in der Notaufnahme nicht so wichtig","Händedesinfektion ist die wichtigste Maßnahme zur Verhinderung nosokomialer Infektionen","Händewaschen reicht vollständig aus","Handschuhe ersetzen die Händedesinfektion"],c:1,e:"Händedesinfektion ist die effektivste Maßnahme zur Prävention nosokomialer Infektionen. Die WHO-Empfehlung 'My 5 Moments for Hand Hygiene' definiert 5 Zeitpunkte (vor/nach Patientenkontakt, nach Kontakt mit Körperflüssigkeiten etc.). Händedesinfektion ist effektiver als Händewaschen."},
    {q:"Herr Becker (46 J.) trinkt täglich Alkohol. Wovon können Sie bei Alkoholabhängigkeit ausgehen?",x:"",o:["Er kann jederzeit einfach aufhören","Ein Alkoholentzug ohne medizinische Begleitung kann lebensbedrohlich sein","Alkohol ist kein medizinisches Problem","Er braucht nur mehr Willenskraft"],c:1,e:"Alkoholentzug kann lebensbedrohlich sein: Entzugssyndrom (Zittern, Schwitzen, Halluzinationen, Krampfanfälle, Delirium tremens). Medizinisch begleiteter Entzug ist notwendig. Pflege: sicheres Umfeld, regelmäßige Überwachung der Vitalzeichen, empathische, nicht wertende Haltung."}
  ],
  kovac:[
    {q:"Was ist eine Thrombose und welche Prophylaxemaßnahmen gibt es?",x:"",o:["Blutung in einem Gewebe; Prophylaxe: viel trinken","Blutgerinnsel in einem Blutgefäß; Prophylaxe: Bewegung, Kompression, Heparin, Frühmobilisation","Entzündung der Haut; Prophylaxe: Salben","Infektionskrankheit; Prophylaxe: Impfung"],c:1,e:"Thromboseprophylaxe nach der Virchow-Trias (Verlangsamung des Blutflusses, Gefäßwandschäden, Gerinnungsveränderungen): Frühmobilisation, Kompressionsstrümpfe, Thromboseprophylaxestrümpfe, medikamentöse Prophylaxe (NMH-Heparin), ausreichende Flüssigkeitszufuhr."},
    {q:"Herr Kovac (70 J.) ist alkoholabhängig und traurig. Welche Sterbephasen nach Kübler-Ross gibt es?",x:"",o:["Verleugnung – Zorn – Verhandeln – Depression – Akzeptanz","Trauer – Wut – Akzeptanz – Stille","Schock – Trauer – Heilung – Frieden","Verneinung – Aggression – Panik – Gleichmut"],c:0,e:"Elisabeth Kübler-Ross beschrieb 5 Phasen: 1. Verleugnung (Nein, das kann nicht sein), 2. Zorn (Warum ich?), 3. Verhandeln (Wenn ich…, dann…), 4. Depression (Rückzug, Traurigkeit), 5. Akzeptanz (Frieden finden). Die Phasen sind nicht linear – Herr Kovac zeigt Züge aus mehreren Phasen."},
    {q:"Was bedeutet Fixierung in der Pflege und wann ist sie erlaubt?",x:"",o:["Das Befestigen von Verbänden","Die freiheitsentziehende Maßnahme (z.B. Bauchgurt, Bettgitter) – nur mit richterlichem Beschluss oder in akuten Notsituationen erlaubt","Eine Massagetechnik","Das Fixieren von Kathetern"],c:1,e:"Freiheitsentziehende Maßnahmen (FEM) wie Gurte oder Bettgitter sind schwere Grundrechtseingriffe. Sie bedürfen eines richterlichen Beschlusses (§ 1906 BGB) außer in akuten Notsituationen (Selbst- oder Fremdgefährdung). Alternativen müssen immer zuerst geprüft werden."},
    {q:"Was sind Prinzipien der trockenen Wundversorgung?",x:"",o:["Wunde täglich mit Wasserstoffperoxid behandeln","Wunde austrocknen lassen ohne Abdeckung","Schutz vor Austrocknung und Infektionen bei einfachen, heilenden Wunden","Feuchtes Milieu für alle Wunden"],c:2,e:"Trockene Wundversorgung: sterile Wundabdeckung, Schutz vor mechanischer Belastung und Infektionen. Sie ist bei einfachen, oberflächlichen Wunden ohne Wundheilungsstörung indiziert. Bei chronischen oder komplexen Wunden wird dagegen feuchte Wundversorgung (z.B. Hydrokolloid) bevorzugt."},
    {q:"Was sind Zeichen einer alkoholabhängigen Person, auf die Pflegende achten sollten?",x:"",o:["Kein erkennbares Verhalten","Zittern, Schwitzen, Reizbarkeit, Geruch nach Alkohol, Verharmlosung des Konsums, soziale Isolation","Nur körperliche Symptome wie Gelbsucht","Immer offensichtliche Trunkenheit"],c:1,e:"Zeichen der Alkoholabhängigkeit: körperlich (Zittern, Schwitzen, gerötetes Gesicht, Leberveränderungen) und psychisch (Verharmlosung, Reizbarkeit, soziale Isolation). Pflegende begegnen Betroffenen empathisch und nicht wertend, und sprechen das Thema offen aber einfühlsam an."}
  ],
  augenblick:[
    {q:"Was bedeutet Querschnittslähmung (Paraplegie) im Alltag?",x:"",o:["Nur vorübergehende Schwäche der Beine","Vollständiger oder teilweiser Verlust der Motorik und Sensibilität unterhalb der Läsionshöhe – dauerhaft","Lähmung nur eines Arms","Nur Taubheitsgefühl in den Beinen"],c:1,e:"Bei Querschnittslähmung (Paraplegie = Beine, Tetraplegie = alle 4 Extremitäten) besteht dauerhafter Ausfall von Motorik, Sensibilität und vegetativer Funktionen (Blase, Darm) unterhalb der Schädigungsstelle. Pflege: Dekubitusprophylaxe, Blasenmanagement, Mobilisation, psychische Unterstützung."},
    {q:"Was sind die 4 biomedizinischen Prinzipien nach Beauchamp & Childress?",x:"",o:["Reinlichkeit, Ordnung, Disziplin, Fürsorge","Autonomie, Nicht-Schaden, Fürsorge (Benefizienz), Gerechtigkeit","Ehrlichkeit, Kompetenz, Empathie, Respekt","Diagnose, Therapie, Prävention, Rehabilitation"],c:1,e:"Die 4 Prinzipien nach Beauchamp & Childress (Principism): 1. Autonomie (Selbstbestimmungsrecht), 2. Nicht-Schaden (non-maleficence), 3. Fürsorge/Wohltun (beneficence), 4. Gerechtigkeit (justice). Sie sind weltweit das meistgenutzte Rahmenwerk der Medizinethik."},
    {q:"Was ist eine PTBS (Posttraumatische Belastungsstörung)?",x:"",o:["Eine vorübergehende Traurigkeit nach einer schwierigen Situation","Eine psychische Erkrankung nach traumatischen Ereignissen mit Symptomen wie Flashbacks, Vermeidungsverhalten, Übererregung","Eine Persönlichkeitsstörung","Eine Angststörung ohne erkennbaren Auslöser"],c:1,e:"PTBS entsteht nach extrem belastenden Ereignissen. Kernsymptome: Wiedererleben (Flashbacks, Albträume), Vermeidung (trauma-assoziierter Reize), kognitive/emotionale Veränderungen, Übererregung. Behandlung: traumafokussierte KVT, EMDR, ggf. Pharmakotherapie."},
    {q:"Was ist ein suprapubischer Blasenkatheter und was sind seine Vorteile?",x:"",o:["Ein Katheter durch die Harnröhre","Ein durch die Bauchdecke in die Blase eingeführter Katheter – weniger Infektionsrisiko, mehr Komfort","Ein Katheter für die Niere","Ein kurzzeitiger Notfallkatheter"],c:1,e:"Suprapubischer Katheter (SPK): wird durch die Bauchdecke direkt in die Blase gelegt. Vorteile: geringeres Harnwegsinfektrisiko als transurethraler Katheter, bessere Körperhygiene, komfortabler für Langzeitversorgung. Nachteile: Anlage ist ein kleiner operativer Eingriff, Einstichstelle muss gepflegt werden."},
    {q:"Was versteht man unter Pflege in Katastrophensituationen ('Pflege unter besonderen Bedingungen')?",x:"",o:["Pflege in einem modernen Krankenhaus","Pflege bei Massenunfällen, Naturkatastrophen, Pandemien mit begrenzten Ressourcen und schwierigen Bedingungen","Pflege an Wochenenden","Pflege von besonders schwierigen Patienten"],c:1,e:"Pflege unter Katastrophenbedingungen erfordert besondere Kompetenzen: Triage (Priorisierung nach Überlebenschance und Ressourcen), psychische Belastbarkeit, Teamarbeit, adaptiertes Handeln bei Ressourcenmangel. Rechtlich und ethisch gelten besondere Regeln (Triage-Entscheidungen, Katastrophenschutz)."}
  ],
  seifert:[
    {q:"Matteo (8 J.) hat nach einem Badeunfall eine Mehrfachbehinderung. Er leidet unter starken Schmerzen. Welches Assessmentinstrument ist bei ihm geeignet?",x:"",o:["Numerische Rating-Skala (NRS)","Paediatric Pain Profile (PPP) – geeignet für Menschen, die sich nicht verbal äußern können","Wong-Baker FACES Skala","Glasgow Coma Scale"],c:1,e:"Der Paediatric Pain Profile (PPP) ist ein Beobachtungsinstrument für Kinder und Jugendliche mit schwerer neurologischer Beeinträchtigung. Es bewertet 20 Verhaltensweisen (Gesichtsausdruck, Körperhaltung, etc.) die auf Schmerz hinweisen. Es wird eingesetzt, wenn verbale Selbstauskunft nicht möglich ist."},
    {q:"Was beschreibt das WHO-Schmerzschema (Stufenschema)?",x:"",o:["Ein Stufenschema mit 3 Stufen zur medikamentösen Schmerztherapie (Nicht-Opioide → schwache Opioide → starke Opioide)","Ein Bewertungssystem für Schmerzen","Ein chirurgisches Verfahren","Ein pflegerisches Assessmentinstrument"],c:0,e:"Das WHO-Stufenschema (1986) empfiehlt eine schrittweise Schmerztherapie: Stufe 1: Nicht-Opioide (Paracetamol, NSAR). Stufe 2: schwache Opioide (Tramadol) ± Nicht-Opioid. Stufe 3: starke Opioide (Morphin) ± Nicht-Opioid. Bei starken Schmerzen beginnt man direkt auf Stufe 3."},
    {q:"Was ist ein Tracheostoma und warum wird es angelegt?",x:"",o:["Ein künstlicher Magenausgang","Eine operative Öffnung in der Luftröhre zur Sicherung der Atemwege bei langzeitbeatmeten oder beatmungsabhängigen Patienten","Eine Magensonde","Ein Nierenkatheter"],c:1,e:"Das Tracheostoma ist eine chirurgisch angelegte Öffnung in der Luftröhre (Trachea). Indikationen: Langzeitbeatmung, Atemwegsverlegung, schwere neurologische Erkrankungen. Pflege: Kanülenpflege, Sekretabsaugung, Befeuchtung der Atemluft, Stoma-Hautpflege."},
    {q:"Was sind die Grundsätze der Krisenphasen (Arten und Phasen einer Krise)?",x:"",o:["Es gibt nur eine Krisenart","Krisen werden unterschieden in: traumatische Krisen (durch akutes Ereignis) und Veränderungskrisen (durch Entwicklung); mit Phasen wie Schockphase, Reaktionsphase, Bearbeitungsphase, Neuorientierung","Krisen enden immer in Heilung","Krisen brauchen keine professionelle Begleitung"],c:1,e:"Nach Cullberg: traumatische Krisen (plötzliches Ereignis) und Entwicklungskrisen (Lebensübergänge). Phasen: 1. Schockphase (Betäubung), 2. Reaktionsphase (intensive Gefühle), 3. Bearbeitungsphase (Aufarbeitung), 4. Neuorientierung (neues Gleichgewicht). Professionelle Krisenintervention ist essenziell."},
    {q:"Was ist eine PEG-Sonde und was sind ihre Pflegeaspekte?",x:"",o:["Eine Nasensonde zur kurzfristigen Ernährung","Eine perkutan endoskopisch gelegte Magensonde zur Langzeiternährung – Pflege: Eintrittsstelle täglich inspizieren, Sonde spülen, Lage kontrollieren","Eine intravenöse Ernährungssonde","Eine Sonde zur Flüssigkeitsableitung"],c:1,e:"PEG (Perkutane Endoskopische Gastrostomie): Magensonde durch die Bauchdecke für Langzeiternährung. Pflege: tägliche Inspektion der Eintrittsstelle auf Infektionszeichen, Scheibenrotation, Spülung vor/nach Nutzung, Lage/Ballon-Kontrolle, Dokumentation. Enterale Ernährung bevorzugt gegenüber parenteraler."}
  ],
  sandkastenliebe:[
    {q:"Was ist ein Apoplex (Schlaganfall) und was sind typische Symptome?",x:"",o:["Eine Erkrankung des Herzens","Eine plötzliche Durchblutungsstörung des Gehirns mit Symptomen wie Gesichtslähmung, Arm-/Beinschwäche, Sprachstörungen, Sehstörungen (FAST-Schema)","Eine Erkrankung der Lunge","Ein Krampfanfall"],c:1,e:"FAST: Face (Gesichtsschiefe), Arm (einseitige Schwäche), Speech (Sprachstörung), Time (sofort Notruf 112). Ursachen: Ischämie (80%, Gefäßverschluss) oder Hämorrhagie (20%, Blutung). Sofortiger Notarztruf und Behandlung (Lysetherapie binnen 4,5 Stunden) verbessern die Prognose."},
    {q:"Was ist Person-zentrierte Pflege bei Demenz nach Tom Kitwood?",x:"",o:["Das Reduzieren von Verhaltensauffälligkeiten durch Medikamente","Ein Ansatz, der die Person mit Demenz als vollwertigen Menschen respektiert und ihre Würde, Identität, Wohlbefinden ins Zentrum stellt","Eine rein aktivierende Pflegeform","Ein Trainingsansatz für Gedächtnisleistung"],c:1,e:"Tom Kitwoods Person-Centred Care (1997) betont: Demenzbetroffene sind vollwertige Personen mit Gefühlen, Bedürfnissen und Biografie. VIPS-Modell: Values (Wertschätzung), Individualized care (individuelle Pflege), Perspective (Perspektive der Person), Social environment (soziales Umfeld)."},
    {q:"Frau Kaufmann hat Demenz und wird aggressiv, wenn ihr Mann sie berührt. Was könnte die Ursache sein?",x:"",o:["Sie mag ihren Mann nicht mehr","Die Demenz hat ihre Persönlichkeit verändert – Aggression kann Ausdruck von Angst, Schmerz oder Überforderung sein","Sie ist eingebildet","Sie braucht stärkere Medikamente"],c:1,e:"Aggressives Verhalten bei Demenz ist oft ein Ausdruck von Bedürfnissen oder Belastungen: Schmerz, Angst, Überforderung, Gefühl der Würdeverletzung. Analyse: Was geschah vorher? (TANDEM-Methode). Maßnahmen: ruhige Umgebung, Validation, Biografie berücksichtigen."},
    {q:"Herr Kaufmann hatte einen Sturz mit Platzwunde. Was gehört zur Wundbeobachtung?",x:"",o:["Nur die Größe der Wunde","Lokalisation, Größe, Tiefe, Rand, Umgebung, Exsudat (Menge, Farbe, Geruch), Granulationsgewebe, Schmerz, Infektionszeichen","Nur ob die Wunde blutet","Nur das Datum der Verletzung"],c:1,e:"Systematische Wundbeobachtung (MEASURE oder TIME-Konzept): Lokalisation, Ausdehnung (Länge, Breite, Tiefe), Rand, Umgebung, Exsudat-Beurteilung, Infektionszeichen (Rötung, Schwellung, Wärme, Schmerz, Eiter), Granulationsgrad. Dokumentation mit Wunddokumentation/Foto."},
    {q:"Was ist Sturzprophylaxe und warum ist sie bei Herrn Kaufmann (91 J.) besonders wichtig?",x:"",o:["Sturzprophylaxe ist nur in der Klinik wichtig","Ältere Menschen haben erhöhtes Sturzrisiko durch Gleichgewichtsstörungen, Muskelschwäche, Medikamente, Demenz – Folgen können lebensbedrohlich sein (Fraktur, Immobilität)","Stürze bei alten Menschen sind normal und unvermeidlich","Sturzprophylaxe ist nur Aufgabe der Physiotherapie"],c:1,e:"Mit dem Alter steigt das Sturzrisiko (intrinsische Faktoren: Muskelschwäche, Gleichgewichtsstörung, Demenz; extrinsische: rutschige Böden, Hindernisse). Sturzfolgen: Hüftfraktur, Immobilität, Pflegebedürftigkeit, Tod. Maßnahmen: Risikoerfassung (Morse Scale), Hilfsmittel, Umgebungsanpassung, Kraft-/Gleichgewichtstraining."}
  ],
  klara:[
    {q:"Was versteht man unter einem ethischen Dilemma in der Pflege?",x:"",o:["Ein technisches Problem in der Pflegedokumentation","Eine Situation, in der zwei oder mehrere moralisch gleichwertige, aber unvereinbare Handlungsoptionen vorliegen","Ein Konflikt zwischen zwei Kollegen","Eine rechtliche Frage"],c:1,e:"Ein ethisches Dilemma entsteht, wenn zwei Werte oder Pflichten in Konflikt geraten (z.B. Autonomie vs. Fürsorge, Ehrlichkeit vs. Schutz). Für die Entscheidungsfindung nutzt man ethische Fallbesprechungen, das 4-Säulen-Modell (Beauchamp & Childress) oder die Methode der kasuistischen Fallanalyse."},
    {q:"Was ist die Pflege-Charta und was regelt sie?",x:"",o:["Ein Gehaltsreglement für Pflegende","Eine Charta der Rechte von Menschen, die auf Pflege und Betreuung angewiesen sind – sichert Würde, Selbstbestimmung, Privatheit","Eine interne Krankenhausrichtlinie","Ein Ausbildungsvertrag"],c:1,e:"Die Pflege-Charta (BMFSFJ 2003) formuliert 8 Artikel zu Rechten pflegebedürftiger Menschen: Würde, Selbstbestimmung, Privat- und Intimsphäre, Wahl des Wohnortes, Zugang zu Versorgung, Kompetenz der Pflegenden, Teilhabe an Gesellschaft, religiöse Begleitung/Sterbebegleitung."},
    {q:"Was beschreibt die Konfliktanalyse im Team (KB III)?",x:"",o:["Die Analyse von Pflegefehlern","Ein strukturiertes Verfahren zur Identifikation von Konfliktursachen, Beteiligten und Lösungsoptionen im Team","Ein Bewertungssystem für Teammitglieder","Ein Verfahren zur Mitarbeiterbeurteilung"],c:1,e:"Konfliktanalyse umfasst: Konfliktart bestimmen (Sachkonflikt, Beziehungskonflikt, Rollenkonflikt, Wertekonflikt), Beteiligte identifizieren, Eskalationsstufe bestimmen (Glasl), Lösungsoptionen entwickeln. Ziel: konstruktive Konfliktbearbeitung und Teamstabilität."},
    {q:"Was bedeutet elterliche Sorge (Sorgerecht) im medizinischen Kontext?",x:"",o:["Eltern dürfen alles entscheiden bis zum 18. Lebensjahr des Kindes ohne Einschränkung","Eltern haben Entscheidungsrecht über medizinische Maßnahmen bei Minderjährigen – jedoch begrenzt durch das Kindswohl","Pflegende entscheiden allein","Ärzte entscheiden ohne Einbeziehung der Eltern"],c:1,e:"Eltern mit Sorgerecht entscheiden bei Minderjährigen über medizinische Maßnahmen. Grenze: das Kindeswohl. Wenn Elternentscheidungen dem Wohl des Kindes widersprechen, kann das Familiengericht eingreifen (§ 1666 BGB). Mit zunehmendem Reifegrad sind auch die Wünsche des Jugendlichen zu berücksichtigen."},
    {q:"Wie verhält man sich bei sozialen Konflikten im Pflegeteam professionell?",x:"",o:["Konflikte ignorieren und weitermachen","Sofort Vorgesetzte informieren ohne das Gespräch zu suchen","Konflikte direkt und respektvoll ansprechen, aktives Zuhören, Ich-Botschaften nutzen, ggf. Supervision oder Mediation einbeziehen","Kollegen bei Patienten kritisieren"],c:2,e:"Professioneller Umgang mit Teamkonflikten: Konflikte direkt und zeitnah ansprechen (nicht hinter dem Rücken), Ich-Botschaften statt Vorwürfe, aktives Zuhören, gemeinsam Lösungen suchen. Bei eskalierenden Konflikten: Führungskraft einbeziehen, Supervision, Mediation anbieten."}
  ],
  sander:[
    {q:"Holger Sander hat Parkinson. Was ist das Kernsymptom des Morbus Parkinson?",x:"",o:["Gedächtnisverlust","Akinese (Bewegungsarmut/Bewegungsverlangsamung) zusammen mit Rigor, Tremor und posturaler Instabilität","Lähmung aller Extremitäten","Sehverlust"],c:1,e:"Parkinson-Kardinalsymptome: 1. Akinese/Bradykinese (Bewegungsarmut), 2. Rigor (Muskelsteifheit), 3. Ruhetremor (Zittern in Ruhe), 4. Posturale Instabilität (Gleichgewichtsstörung). Ursache: Dopaminmangel in der Substantia nigra."},
    {q:"Was ist Medikamentenmanagement in der Pflege?",x:"",o:["Medikamente aufbewahren","Sicherstellen, dass richtige Medikamente zur richtigen Zeit in richtiger Dosis korrekt verabreicht werden (5-R- oder 6-R-Regel)","Medikamente bestellen","Medikamente verbilligen"],c:1,e:"Medikamentenmanagement nach der 6-R-Regel: Richtiger Patient, Richtiges Medikament, Richtige Dosis, Richtiger Weg (Route), Richtiger Zeitpunkt, Richtige Dokumentation. Besonderes Augenmerk bei: L-Dopa (Einnahmezeitpunkt!), Polymedikation, Schluckschwierigkeiten, Verwechslungsgefahr."},
    {q:"Was ist Entlassungsmanagement und wann beginnt es?",x:"",o:["Es beginnt am Tag der Entlassung","Es ist nicht Aufgabe der Pflege","Es beginnt möglichst früh nach Aufnahme und sichert die Versorgungskontinuität nach dem Krankenhausaufenthalt","Es ist nur für chronisch kranke Patienten"],c:2,e:"Entlassungsmanagement (Expertenstandard DNQP) beginnt am Tag der Aufnahme: Entlassungsbedarf einschätzen, Patienten/Angehörige einbeziehen, externe Dienste koordinieren, Informationsweitergabe sicherstellen. Ziel: nahtlose Überleitung in die Weiterversorgung (ambulante Pflege, Rehaklinik, Pflegeeinrichtung)."},
    {q:"Was fördert Resilienz bei Pflegenden?",x:"",o:["Mehr Überstunden zu machen","Alles alleine zu bewältigen","Soziale Unterstützung, positive Selbstwahrnehmung, Problemlösekompetenzen, Pausen und gute Work-Life-Balance","Alle Probleme zu ignorieren"],c:2,e:"Resilienz = psychische Widerstandsfähigkeit. Fördernde Faktoren: soziale Netzwerke, positive Emotionen, Selbstwirksamkeitsüberzeugung, Stressbewältigungsstrategien, Humor, Sinnhaftigkeit der Arbeit. Supervision, Teamgespräche und Stressmanagementkurse unterstützen Resilienz in der Pflege."},
    {q:"Warum sind interprofessionelle Zusammenarbeit und Kommunikation bei Herrn Sander wichtig?",x:"",o:["Sie sind nicht notwendig","Sie erhöhen unnötig den Aufwand","Sie sichern eine ganzheitliche Versorgung: Arzt, Pflege, Physiotherapie, Sozialdienst und Ergotherapie ergänzen sich, planen gemeinsam und handeln koordiniert","Nur der Arzt entscheidet"],c:2,e:"Interprofessionelle Zusammenarbeit verbessert Behandlungsergebnisse, reduziert Fehler und steigert die Patientenzufriedenheit. Bei komplexen Erkrankungen wie Parkinson: gemeinsame Zielplanung, regelmäßige Fallbesprechungen, klare Kommunikation und strukturierte Informationsweitergabe (SBAR) sind essenziell."}
  ],
  patienten:[
    {q:"Was ist MRSA und welche Pflegemaßnahmen sind bei MRSA-Patienten erforderlich?",x:"",o:["Ein Antibiotikum","Methicillin-resistenter Staphylococcus aureus – eine antibiotikaresistente Bakterie; Isolierung, Schutzkleidung, Desinfektion","Ein Virus","Eine Pilzinfektion"],c:1,e:"MRSA ist ein gegen viele Antibiotika resistenter Staphylococcus aureus. Maßnahmen: Einzelzimmer-Isolierung, Schutzkittel, Handschuhe, Mund-Nasen-Schutz, Händedesinfektion, Oberflächendesinfektion. Ziel: Ausbreitung verhindern. MRSA-Patienten sind zu informieren und psychisch zu unterstützen."},
    {q:"Was regelt das Arbeitsrecht in Bezug auf Pflegende?",x:"",o:["Nur die Urlaubsregelungen","Arbeitsbedingungen, Arbeitszeiten, Kündigungsschutz, Betriebsverfassungsrecht, Arbeitsschutz, Mutterschutz, Betriebsvereinbarungen","Nur das Gehalt","Nur die Weiterbildungspflicht"],c:1,e:"Arbeitsrecht umfasst: Arbeitszeitgesetz (max. 8h/Tag, Pausen), Arbeitsschutzgesetz, Mutterschutz, Betriebsverfassungsgesetz (Mitbestimmung des Betriebsrats), Tarifvertrag, Kündigungsschutzgesetz. Pflegende sollten ihre Rechte kennen."},
    {q:"Was bedeutet Pflegequalität und wie wird sie gemessen?",x:"",o:["Die Freundlichkeit der Pflegeperson","Strukturqualität (Ausstattung), Prozessqualität (Durchführung der Pflege) und Ergebnisqualität (Pflegeergebnisse) nach Donabedian","Nur die Schnelligkeit der Pflege","Die Anzahl der Patienten pro Pflegekraft"],c:1,e:"Donabedians Qualitätsmodell: Strukturqualität (Personal, Ausstattung, Organisation), Prozessqualität (Pflegeprozess, Standards, Hygiene), Ergebnisqualität (Patientenzufriedenheit, Komplikationsraten, Pflegeziele erreicht). Messung durch interne Audits, MDK-Prüfungen, Pflegeindikatoren."},
    {q:"Was versteht man unter Berufspolitik in der Pflege?",x:"",o:["Parteipolitik im Krankenhaus","Das politische Engagement von Pflegenden für bessere Rahmenbedingungen, Professionalisierung und Anerkennung des Pflegeberufs","Das interne Krankenhaus-Management","Regeln für die Dienstplanerstellung"],c:1,e:"Berufspolitik in der Pflege umfasst: Engagement in Berufsverbänden (DBfK, DPR), Mitwirkung an Gesetzgebungsprozessen (z.B. Pflegeberufegesetz 2020), Öffentlichkeitsarbeit, Weiterentwicklung von Pflegestandards, Einsatz für bessere Personalschlüssel und Vergütung."},
    {q:"Was sind Hygienemanagement und Standardhygiene in der Pflege?",x:"",o:["Nur das Tragen von Handschuhen","Umfassendes System von Maßnahmen zur Infektionsprophylaxe: Händedesinfektion, Schutzkleidung, Flächendesinfektion, Abfallentsorgung, aseptisches Arbeiten nach RKI-Empfehlungen","Nur regelmäßiges Putzen","Nur Patientendusche"],c:1,e:"Standardhygiene gilt für ALLE Patienten: 5-Momente-Händehygiene (WHO), korrekte Schutzkleidung, Entsorgung kontaminierter Materialien, Flächendesinfektion. Erweiterte Hygiene bei multiresistenten Erregern. RKI-Empfehlungen und Hygienepläne des Hauses sind verbindlich."}
  ],
  nika:[
    {q:"Was ist Muskeldystrophie Duchenne und was ist pflegerisch besonders wichtig?",x:"",o:["Eine Erkrankung der Nieren","Eine genetische Muskelerkrankung mit progredientem Muskelschwund – Beatmungsunterstützung, Mobilisation, Kontrakturprophylaxe, Atemtherapie sind essenziell","Eine Erkrankung des Nervensystems","Eine Herzerkrankung"],c:1,e:"Duchenne-Muskeldystrophie: X-chromosomal, betrifft fast ausschließlich Jungen. Progredienter Muskelschwund → Rollstuhlabhängigkeit, Ateminsuffizienz, Herzbefall. Pflege: Atemtherapie, Beatmungsunterstützung (NIV/Tracheostoma), Kontrakturprophylaxe, Dekubitusprophylaxe, Kommunikationsunterstützung."},
    {q:"Was regelt das Infektionsschutzgesetz (IfSG)?",x:"",o:["Die Behandlung von Infektionskrankheiten","Meldepflichten bei bestimmten Infektionskrankheiten, Schutzmaßnahmen und Verhütungsmaßnahmen zum Schutz der Bevölkerung","Die Impfpflicht für Pflegende","Die Quarantäne bei jeder Erkältung"],c:1,e:"Das IfSG regelt: namentliche und nichtnamentliche Meldepflichten (z.B. Tuberkulose, EHEC, COVID-19), Tätigkeitsverbote, Schutzmaßnahmen der Gesundheitsämter, Impfempfehlungen. Krankenhäuser und Pflegeeinrichtungen haben besondere Meldepflichten."},
    {q:"Was ist beim endotrachealen Absaugen zu beachten?",x:"",o:["Es kann ohne besondere Vorbereitung durchgeführt werden","Steriles/aseptisches Vorgehen, geeigneter Katheter, Absaugdauer max. 15 Sek., O2-Gabe vorher, Beobachtung von SpO2 und Herzfrequenz, Dokumentation","Man absaugt so oft wie möglich","Handschuhe reichen als Schutz"],c:1,e:"Endotracheales Absaugen (ETA): Indikation prüfen, Patienteninformation, Hände desinfizieren, sterile Handschuhe/Katheter, O2-Gabe vor Absaugung, Absaugdauer ≤15 Sek., SpO2 und HF monitoren, Sekret dokumentieren (Farbe, Konsistenz). Komplikationen: Hypoxie, Herzrhythmusstörungen, Schleimhautverletzungen."},
    {q:"Warum ist das Thema Kindeswohlgefährdung bei Nika relevant?",x:"",o:["Weil Nika schulische Probleme hat","Weil schwerstkranke Kinder besonders vulnerabel sind und ihr Wohl besonders geschützt werden muss – auch gegenüber gut meinenden Entscheidungen gegen ihren Willen","Weil ihre Eltern nachlässig sind","Weil Nika gefährliche Aktivitäten macht"],c:1,e:"Nika hat das Recht auf Selbstbestimmung und Teilhabe. Kindeswohlgefährdung kann auch durch Überprotektion entstehen. Pflegende achten darauf, dass Nikos Wünsche und Bedürfnisse respektiert werden und sie trotz schwerer Erkrankung ein normales Leben führen kann."},
    {q:"Was bedeutet Immunsuppression und welche Pflegekonsequenzen hat sie?",x:"",o:["Eine Stärkung des Immunsystems","Eine Unterdrückung des Immunsystems (z.B. durch Medikamente) – erhöhte Infektionsgefahr erfordert konsequente Hygiene und Infektionsschutz","Eine Allergie","Eine Autoimmunerkrankung"],c:1,e:"Immunsuppression = geschwächtes Immunsystem (durch Erkrankung, Medikamente wie Kortison, Chemotherapie). Konsequenzen: erhöhte Infektionsanfälligkeit, unspezifische Infektionszeichen. Maßnahmen: konsequente Händedesinfektion, Isolierung, Meiden von Keimquellen, frühzeitiges Erkennen von Infektionszeichen."}
  ],
  einmalwar:[
    {q:"Was ist eine Tracheotomie und was ist die Pflege eines Tracheostomas?",x:"",o:["Eine Herzoperation","Eine chirurgische Öffnung der Luftröhre – Pflege: Kanülenpflege, Absaugen, Befeuchtung, Stomagepflege","Eine Augenoperation","Eine Magenoperation"],c:1,e:"Tracheotomie (Luftröhrenschnitt) sichert den Atemweg dauerhaft. Tracheostomapflege: regelmäßiges Absaugen von Sekret, Kanülenwechsel, Befeuchtung der Atemluft, Stomarandpflege, Fixierung der Kanüle, Sprechventil-Versorgung. Komplikationen: Infektion, Blutung, Kanülenverlegung."},
    {q:"Was ist Qualitätsmanagement in der Pflege?",x:"",o:["Eine Bewertung der Pflegepersonen","Ein systematisches Verfahren zur Sicherung und Verbesserung der Pflegequalität (Standards, Leitlinien, Audits, Pflegeindikatoren, Beschwerdemanagement)","Ein Dokumentationssystem","Nur für Krankenhäuser relevant"],c:1,e:"Qualitätsmanagement (QM) in der Pflege umfasst: Qualitätsstandards definieren, Pflegeprozesse standardisieren, interne Audits, externe Prüfungen (MDK), Pflegeindikatoren erfassen, Ergebnisse auswerten und Maßnahmen ableiten. Ziel: kontinuierliche Qualitätsverbesserung."},
    {q:"Welche Leistungsarten bietet die ambulante Langzeitpflege?",x:"",o:["Nur Körperpflege","Körperpflege, Behandlungspflege, hauswirtschaftliche Versorgung, Beratungsbesuche, Pflegesachleistungen (SGB XI), Beratungsbesuche nach § 37 SGB XI, Verhinderungspflege","Nur stationäre Versorgung","Nur medizinische Leistungen"],c:1,e:"Ambulante Pflegedienste bieten: Grundpflege (Körperpflege, Mobilisation), Behandlungspflege (Medikamente, Verbände, Injektionen), hauswirtschaftliche Hilfen, Pflegegeldberatung. Finanzierung über SGB XI (Pflegekassen) und SGB V (Krankenkassen)."},
    {q:"Was bedeutet interprofessionelle Zusammenarbeit in der Kinderpflege?",x:"",o:["Nur Arzt und Pflege arbeiten zusammen","Das Zusammenspiel von Pflege, Medizin, Therapie (Physio, Ergo, Logo), Sozialdienst, Schule und Familie zur ganzheitlichen Versorgung des Kindes","Pflegende arbeiten allein","Nur Eltern sind zuständig"],c:1,e:"Interprofessionelle Zusammenarbeit in der Kinderpflege: Gemeinsame Ziele formulieren, regelmäßige Fallbesprechungen, klare Kommunikation, Schnittstellenmanagement (z.B. Überleitung in Schule/Kita), Familie als Teil des Teams betrachten. Dokumentation muss allen Beteiligten zugänglich sein."},
    {q:"Was beschreibt der Begriff 'Finanzierung der Pflege' in Deutschland?",x:"",o:["Pflege ist vollständig kostenlos","Pflege wird durch Pflegeversicherung (SGB XI), Krankenversicherung (SGB V), Sozialhilfe (SGB XII) und Eigenmittel der Pflegebedürftigen finanziert","Pflege zahlt nur der Staat","Pflegebedürftige zahlen alles selbst"],c:1,e:"Finanzierung: SGB XI (Pflegekassen) = Leistungen nach Pflegegrad. SGB V (Krankenversicherung) = Behandlungspflege. Eigenbeteiligung = Unterkunft, Verpflegung, Investitionskosten in Heimen. Bei Bedürftigkeit: SGB XII (Sozialhilfe). Pflegekosten können die eigenen Mittel übersteigen."}
  ],
  muell:[
    {q:"Was ist Wundmanagement nach dem TIME-Konzept?",x:"",o:["Ein einfaches Wundpflaster","Ein systematischer Ansatz: T=Tissue (Wundgrund), I=Infection/Inflammation, M=Moisture (Feuchtigkeit), E=Edge (Wundrand)","Ein chirurgisches Verfahren","Nur für chronische Wunden relevant"],c:1,e:"TIME-Konzept für chronische Wunden: T = Tissue (Debridement nekrotischen Gewebes), I = Infection/Inflammation (Infektionskontrolle), M = Moisture balance (Feuchtigkeitsmanagement), E = Edge (Wundrandpflege, Förderung der Epithelisierung). Systematische Wundversorgung verbessert die Heilungsrate."},
    {q:"Herr Johansson hat Diabetes Typ 2 und eine schlecht eingestellte Blutzuckerkontrolle. Welches Risiko hat er für Wundheilungsstörungen?",x:"",o:["Kein Risiko","Erhöhtes Risiko durch Polyneuropathie, Mikro-/Makroangiopathie und geschwächtes Immunsystem","Verringertes Risiko","Nur wenn er Insulin spritzt"],c:1,e:"Diabetes erhöht das Wundheilungsrisiko massiv: Polyneuropathie (fehlende Schmerzwahrnehmung), Mikro-/Makroangiopathie (schlechte Durchblutung), Immunsuppression (erhöhte Infektanfälligkeit). Regelmäßige Fußinspektion, gute Blutzuckereinstellung und frühzeitige Wundbehandlung sind essenziell."},
    {q:"Was ist EBN und wie wird es in der Wundversorgung angewendet?",x:"",o:["Eigenblut-Nährsubstrat","Evidence-Based Nursing: Wundversorgungsmaßnahmen auf Basis aktueller Forschungsevidenz, angepasst an Patientenpräferenzen und klinische Expertise wählen","Ein Wundpflaster","Ein Verband-Standard"],c:1,e:"EBN in der Wundversorgung: Leitlinien (z.B. ICW, AWMF) konsultieren, systematische Reviews nutzen, Erfahrungswissen einbeziehen, Patientenpräferenzen berücksichtigen. Beispiel: feuchte Wundversorgung ist evidenzbasiert besser als Austrocknen bei chronischen Wunden."},
    {q:"Was bedeutet Entlassungsmanagement bei Herrn Johansson mit seiner komplexen Wundversorgung?",x:"",o:["Er wird einfach nach Hause entlassen","Strukturierte Vorbereitung: ambulanten Wundversorger organisieren, Patienten und Angehörige schulen, Hilfsmittel beschaffen, Nachsorgetermine vereinbaren, Pflegedienst informieren","Er muss das selbst organisieren","Der Arzt macht die Entlassung allein"],c:1,e:"Entlassungsmanagement bei komplexer Wundversorgung: frühzeitig ambulante Wundversorgung (Pflegedienst/Wundexperte) organisieren, Wunddokumentation mitgeben, Patient und Angehörige in Verbandswechsel einweisen, Versorgungsmaterialien rezeptieren lassen, Nachsorgetermine sicherstellen."},
    {q:"Was ist 'professionelles Pflegehandeln' im Sinne von EBN und beruflicher Reflexion?",x:"",o:["Nach Gewohnheit und Erfahrung allein handeln","Pflegeentscheidungen auf Basis von Forschungswissen, klinischer Expertise und Patientenwünschen treffen sowie das eigene Handeln kritisch reflektieren","Nur tun, was der Arzt sagt","So schnell wie möglich arbeiten"],c:1,e:"Professionelles Pflegehandeln integriert: Forschungswissen (EBN), klinische Erfahrung, Patientenpräferenzen und ethische Grundsätze. Kritische Reflexion des eigenen Handelns (Selbstreflexion), Fehlerkultur und lebenslanges Lernen sind Merkmale professioneller Pflege."}
  ],
  fruehstueck:[
    {q:"Was ist Amyotrophe Lateralsklerose (ALS)?",x:"",o:["Eine Herzerkrankung","Eine progrediente neurodegenerative Erkrankung mit Untergang der Motoneuronen – führt zu zunehmendem Muskelschwund und Lähmungen","Eine Demenzerkrankung","Eine Rückenmarkserkrankung"],c:1,e:"ALS: Degeneration der oberen und unteren Motoneuronen. Symptome: zunehm. Muskelschwund, Lähmungen, Schluck-/Sprachstörungen, Ateminsuffizienz. Kognition bleibt meist erhalten. Pflege: Atemtherapie, Tracheostoma-Versorgung, Kommunikationshilfen, PEG, psychische Unterstützung."},
    {q:"Marie Bader (18 J.) führt endotracheale Absaugung durch – zum ersten Mal alleine. Was ist rechtlich zu beachten?",x:"",o:["Auszubildende dürfen alles selbstständig tun","Auszubildende dürfen Vorbehaltsaufgaben nur unter Aufsicht durchführen; die Praxisanleiterin ist für die Anleitung und Aufsicht verantwortlich","Es gibt keine Regeln für Auszubildende","Die Absaugung ist keine Vorbehaltstätigkeit"],c:1,e:"Vorbehaltstätigkeiten (PflBG § 4): dürfen nur von examinierten Pflegepersonen oder unter deren Aufsicht durchgeführt werden. Praxisanleitende sind verantwortlich für Anleitung, Begleitung und Überwachung von Auszubildenden. Kompetenzübergabe erfolgt schrittweise."},
    {q:"Was sind die Grundsätze des biomedizinischen Prinzips 'Nicht-Schaden' (non-maleficence) nach Beauchamp & Childress?",x:"",o:["Alles tun, was dem Patienten nützt","Handlungen unterlassen, die dem Patienten schaden könnten; bei unvermeidlichen Risiken: Nutzen-Risiko-Abwägung","Immer die teurere Therapie wählen","Patientenwünsche immer ablehnen"],c:1,e:"Non-maleficence: Schadensvermeidung als ethisches Grundprinzip. In der Pflege: keine unnötig schmerzhaften Maßnahmen, Risikomanagement, korrekte Medikamentengabe. Nutzen-Risiko-Abwägung bei Maßnahmen mit Nebenwirkungen oder Komplikationsrisiko. Fehler müssen gemeldet werden (Fehlerkultur)."},
    {q:"Was beschreibt die rechtliche Verantwortlichkeit in der Pflege?",x:"",o:["Pflegende haften für alles was im Krankenhaus passiert","Pflegende sind für ihr eigenverantwortliches Handeln strafrechtlich, zivilrechtlich und berufsrechtlich verantwortlich","Nur Ärzte tragen rechtliche Verantwortung","Pflegende haben keine Eigenverantwortung"],c:1,e:"Pflegende tragen für ihr Handeln eigenständige rechtliche Verantwortung: Strafrecht (§ 223 ff. StGB bei Körperverletzung, Unterlassen), Zivilrecht (Schadensersatz), Berufsrecht (Berufsordnung). Delegation begründet keine vollständige Verantwortungsabgabe. Dokumentation schützt vor ungerechtfertigten Anschuldigungen."},
    {q:"Was sind Prinzipien der Praxisanleitung in der Pflegeausbildung?",x:"",o:["Auszubildende beobachten nur","Systematische Anleitung: Handlungssituation erläutern, Demonstration, begleitetes Üben, selbstständiges Durchführen mit Reflexion (Vier-Stufen-Methode)","Auszubildende lernen nur durch Fehler","Praxisanleitung ist nicht geregelt"],c:1,e:"Praxisanleitung (PflBG § 6): Vier-Stufen-Methode: 1. Erläutern (Vorgespräch), 2. Vormachen (Demonstration), 3. Nachmachen lassen (begleitet), 4. Üben lassen (selbstständig mit Nachbesprechung). Praxisanleitende müssen qualifiziert sein (Weiterbildung) und haben Förder- und Beurteilungsaufgaben."}
  ],
  heisser:[
    {q:"Welche Auswirkungen hat der Klimawandel auf das Gesundheitssystem und die Pflege?",x:"",o:["Keine Auswirkungen","Mehr Hitzewellen erhöhen das Sterberisiko älterer Menschen; Zeckenkrankheiten nehmen zu; Pflegende müssen hitzebedingte Erkrankungen erkennen und präventiv handeln","Nur die Umwelt ist betroffen","Klimawandel betrifft nur Länder mit Extremklima"],c:1,e:"Klimawandel und Pflege: Hitzewellen erhöhen Mortalität bei Älteren und Chronischkranken (Dehydration, Kreislaufkollaps). Pflege muss: Hitzewarnsysteme kennen, Flüssigkeitsversorgung sicherstellen, Medikamentensicherheit bei Hitze beachten (Lagerung), Kühlmaßnahmen durchführen."},
    {q:"Was ist kollegiale Beratung (Intervision)?",x:"",o:["Ein Gespräch mit dem Vorgesetzten","Eine strukturierte Form der Selbstreflexion und Problemlösung im Team ohne externe Leitung – Kollegen beraten sich gegenseitig","Eine Supervision durch externe Fachkraft","Ein Feedbackgespräch mit dem Patienten"],c:1,e:"Kollegiale Beratung (Intervision): strukturiertes Format, bei dem Kollegen sich gegenseitig bei beruflichen Problemen beraten (Rollen: Fallgeberin, Beratergruppe, Moderator). Vorteile: kein Vorgesetzter, offene Atmosphäre, praxisnah. Fördert Reflexionsfähigkeit und Teamentwicklung."},
    {q:"Wie ist professionell mit pflegenden Angehörigen zusammenzuarbeiten?",x:"",o:["Angehörige werden aus der Pflege ausgeschlossen","Angehörige als Partner einbeziehen: Ressourcen anerkennen, entlasten (Beratung, Kurzzeitpflege), informieren, schulen und psychisch unterstützen","Angehörige sollen alle Pflege übernehmen","Angehörige haben keine Kompetenz"],c:1,e:"Pflegende Angehörige übernehmen einen Großteil der Versorgung und sind oft belastet. Professionelle Zusammenarbeit: Ressourcen anerkennen, bei Überforderung entlasten (Kurzzeitpflege, Schulung), emotionale Unterstützung anbieten, über Pflegeleistungen und Angebote informieren."},
    {q:"Was beschreibt 'Pflege im gesellschaftlichen Wandel'?",x:"",o:["Pflege hat sich in den letzten 50 Jahren nicht verändert","Demographischer Wandel, Fachkräftemangel, Digitalisierung, Migration, veränderte Familienstrukturen und steigende Pflegebedürftigkeit prägen die Pflege der Zukunft","Pflege wird einfacher","Nur die Technik verändert die Pflege"],c:1,e:"Gesellschaftlicher Wandel in der Pflege: Demographischer Wandel (mehr Pflegebedürftige), Fachkräftemangel, Akademisierung der Pflege, Digitalisierung (Pflegeroboter, Telemedizin), zunehmende kulturelle Vielfalt der Patienten und Pflegenden, veränderte Familien-/Rollenstrukturen."},
    {q:"Was sind Faktoren, die zu Stress in der Pflegearbeit führen?",x:"",o:["Nur schwierige Patienten","Zeitdruck, Personalmangel, emotionale Belastung, ethische Konflikte, körperliche Belastung, schlechte Work-Life-Balance, mangelnde Wertschätzung","Nur Nachtdienste","Nur die Pflegedokumentation"],c:1,e:"Berufsstress in der Pflege: Zeitdruck durch Personalmangel, emotionale Belastung (Tod, Leid), Körperliche Belastung (Heben), moralischer Distress (ethische Konflikte), schlechte Vereinbarkeit von Familie und Beruf. Betriebliche Gesundheitsförderung, Supervision und gutes Führungsverhalten mindern den Stress."}
  ],
  koerper:[
    {q:"Kai (18 J.) spritzt sich heimlich Insulin ohne Absprache. Was ist der ethische Kern des Problems?",x:"",o:["Er darf das als Volljähriger ohne Einschränkung","Es besteht ein Konflikt zwischen Autonomie (Selbstbestimmungsrecht) und Fürsorge/Nicht-Schaden","Er bricht nur eine Hausordnung","Das ist ein rein medizinisches Problem"],c:1,e:"Ethischer Konflikt: Autonomieprinzip (Kai darf über seinen Körper entscheiden) vs. Fürsorge und Nicht-Schaden (falsche Insulingabe ist lebensgefährlich). Lösung: offenes, respektvolles Gespräch, Kai einbeziehen, Risiken besprechen, gemeinsam Therapiemöglichkeiten suchen, keine Zwangsmaßnahmen ohne rechtliche Grundlage."},
    {q:"Was ist Delegation in der Pflege?",x:"",o:["Eine Pflegeperson führt alles selbst durch","Die Übertragung einer Aufgabe von einer verantwortlichen Pflegeperson auf eine andere Person – mit Anleitung und Kontrolle","Aufgaben werden einfach abgegeben ohne Kontrolle","Nur Ärzte können delegieren"],c:1,e:"Delegation: Examinierte Pflegefachkraft überträgt Aufgaben an Pflegehilfskräfte oder Auszubildende. Voraussetzungen: Aufgabe ist delegierbar (keine Vorbehaltstätigkeit), Person ist geeignet/geschult, Anleitung erfolgt, Kontrolle bleibt bei der Delegierenden. Verantwortung verbleibt beim Delegierenden."},
    {q:"Was versteht man unter Kindeswohlgefährdung bei einem 18-Jährigen?",x:"",o:["Mit 18 Jahren gibt es keine Kindeswohlgefährdung mehr","Mit 18 Jahren endet die Minderjährigkeit – dennoch können junge Erwachsene noch schutzbedürftig sein; Kindeswohlgefährdung gilt bis 18 Jahre","Kindeswohlgefährdung betrifft nur Kleinkinder","Eltern bestimmen bis zum 21. Lebensjahr"],c:1,e:"Kindeswohlgefährdung im rechtlichen Sinne betrifft Minderjährige (bis 18 Jahre). Kai ist 18 und damit volljährig – sein Selbstbestimmungsrecht gilt vollständig. Trotzdem bleibt die Fürsorge wichtig, hier aber ohne Zwangsmaßnahmen. Vertrauensvolle Aufklärung und Motivation sind die Instrumente."},
    {q:"Was bedeutet inter- und intraprofessionelles Handeln in der Pflegewohngemeinschaft?",x:"",o:["Nur interne Teambesprechungen","Interprofessionell: Zusammenarbeit mit anderen Berufsgruppen (Arzt, Psychologe, Sozialdienst). Intraprofessionell: Zusammenarbeit innerhalb der Pflegeberufe (Pflegefachkräfte, Pflegehelfer)","Nur Aufgaben des Arztes","Pflege arbeitet allein"],c:1,e:"Interprofessionell: Pflege, Medizin, Psychologie, Sozialdienst, Therapie arbeiten gemeinsam. Intraprofessionell: verschiedene Pflegequalifikationen (examiniert, Helfer, Azubi) koordinieren sich. Beide Formen verbessern die Versorgungsqualität durch komplementäres Fachwissen."},
    {q:"Was sind ethische Reflexionsprozesse in schwierigen Pflegesituationen?",x:"",o:["Intuitives Entscheiden ohne Begründung","Strukturierte Auseinandersetzung mit ethischen Fragen: Situationserfassung, Werteabwägung, Prinzipienabwägung (Beauchamp & Childress), Konsensfindung im Team","Entscheidung des Arztes abwarten","Alles mit dem Patienten allein besprechen"],c:1,e:"Ethische Reflexion: Situation beschreiben, Beteiligte identifizieren, Werte und Interessen erfassen, Handlungsoptionen abwägen (Prinzipien Beauchamp & Childress), Konsequenzen bedenken, Entscheidung im Team/mit Patient besprechen. Ethikkomitees und klinische Ethikberatung unterstützen."}
  ],
  konrad:[
    {q:"Was sind professionelle Verhaltensweisen im Umgang mit Alkohol im Pflegeheim?",x:"",o:["Alkohol ist im Pflegeheim grundsätzlich verboten","Maßvoller Alkoholgenuss kann im individuellen Rahmen akzeptiert sein; bei Missbrauch/Abhängigkeit: empathisches Ansprechen, Arzt einbeziehen, kein Moralisieren","Man gibt immer so viel Alkohol wie gewünscht","Das ist keine Aufgabe der Pflege"],c:1,e:"Pflegerischer Umgang mit Alkohol: individuelle Abwägung (Lebensqualität vs. Gesundheitsschäden), bewertungsfreie Haltung, Hausarzt einbeziehen, Grenzwerte besprechen, Angehörige informieren (mit Einwilligung). Bei Abhängigkeit: Beratung und Suchtberatungsstellen anbieten, keine Zwangsmaßnahmen ohne rechtliche Grundlage."},
    {q:"Was regelt die gesetzliche Betreuung (§ 1896 BGB)?",x:"",o:["Eine freiwillige Unterstützung durch die Familie","Die gerichtlich angeordnete Unterstützung von Personen, die ihre Angelegenheiten nicht mehr selbst regeln können – Betreuer handelt im Interesse der betreuten Person","Die Zwangsunterbringung in einem Pflegeheim","Die Entmündigung einer Person"],c:1,e:"Gesetzliche Betreuung (§ 1896 BGB) wird vom Gericht angeordnet, wenn eine Person aufgrund psychischer Erkrankung oder geistiger Behinderung ihre Angelegenheiten nicht mehr regeln kann. Betreuer handelt im Wohl der betreuten Person, nicht gegen ihren Willen. Selbstbestimmung bleibt soweit möglich erhalten."},
    {q:"Was versteht man unter Konfliktbewältigung in der Pflege?",x:"",o:["Konflikte ignorieren","Konflikte durch aktives Kommunizieren, Deeskalation, Mediation und konstruktive Lösungsfindung bearbeiten","Konflikte immer an die Leitung delegieren","Nur Gespräche zwischen Kollegen"],c:1,e:"Konfliktbewältigung: früh intervenieren, direktes Ansprechen (Ich-Botschaften), aktives Zuhören, Perspektivwechsel, gemeinsame Lösungen suchen. Bei Eskalation: Führungskraft, Mediation oder Supervision einbeziehen. Konstruktive Fehler- und Konfliktkultur verbessert das Arbeitsklima."},
    {q:"Was ist 'persönliche Gesunderhaltung' für Pflegende?",x:"",o:["Nur das Tragen von Schutzkleidung","Aktive Maßnahmen zur Erhaltung der eigenen physischen und psychischen Gesundheit: Ergonomie, Stressmanagement, regelmäßige Bewegung, Pausen, soziale Kontakte, gesunde Ernährung","Nur die Einhaltung von Arbeitszeiten","Nur das regelmäßige Händewaschen"],c:1,e:"Gesunderhaltung in der Pflege: körperlich (ergonomisches Heben, Schutzimpfungen, ausreichend Schlaf), psychisch (Stressmanagement, Supervision, Pausen nutzen, Abgrenzung zwischen Beruf und Privatleben), sozial (Kollegenunterstützung, persönliche Interessen pflegen). Resilienz schützt vor Burnout."},
    {q:"Stefan Arndt (19 J.) denkt daran, ob Herrn Konrads Trinken erlaubt sein sollte. Mit welchem ethischen Prinzip ist das am besten vereinbar?",x:"",o:["Non-maleficence (Nicht-Schaden): man muss das Trinken verbieten","Autonomie: Herr Konrad hat das Recht, solche Entscheidungen über sein eigenes Leben selbst zu treffen","Gerechtigkeit: alle Bewohner müssen gleich behandelt werden","Benefizienz: man soll immer das Maximum an Wohlbefinden herstellen"],c:1,e:"Das Autonomieprinzip gibt Herrn Konrad das Recht, Entscheidungen über sein eigenes Leben selbst zu treffen – auch wenn sie nicht optimal gesund sind. Voraussetzung: einwilligungsfähig. Aufgabe der Pflege: informieren, beraten, aber nicht bevormunden. Grenze: wenn Dritte gefährdet werden."}
  ],
  team:[
    {q:"Was bedeutet SGB XI (Pflegeversicherungsgesetz) für die Pflege?",x:"",o:["Es regelt nur die Krankenversicherung","Es definiert Pflegegrade, Leistungsansprüche und Finanzierung der Pflegeversicherung in Deutschland","Es ist ein Tarifvertrag","Es regelt die Ausbildung"],c:1,e:"SGB XI (Sozialgesetzbuch XI) regelt die soziale Pflegeversicherung: Pflegegrade 1–5, Leistungsbeträge (Geld- und Sachleistungen), Begutachtung durch den MDK/Medicproof, Finanzierung (Beiträge Arbeitnehmer/Arbeitgeber), Pflegepflichtversicherung als Teilkaskoversicherung."},
    {q:"Was umfasst interne und externe Qualitätsprüfung in der Pflege?",x:"",o:["Nur interne Prüfungen durch Leitungskräfte","Intern: Audits, Pflegeprozessüberprüfung, Mitarbeiterbefragungen. Extern: MDK-Prüfungen, Heimaufsicht, Zertifizierungen (z.B. ISO, KTQ)","Nur externe Prüfungen durch Behörden","Qualitätsprüfungen sind nicht vorgeschrieben"],c:1,e:"Interne Qualitätssicherung: Pflegevisiten, Mitarbeiterbefragungen, Fallbesprechungen, interne Audits. Externe Qualitätssicherung: MDK/Medicproof-Prüfungen (§ 114 SGB XI), Heimaufsicht, externe Zertifizierungen. Ergebnisse werden veröffentlicht (Transparenzberichte)."},
    {q:"Was ist Teamentwicklung in der Pflege?",x:"",o:["Ein einmaliges Teambuilding-Event","Der kontinuierliche Prozess, in dem eine Gruppe zur effektiven Arbeitseinheit wird – Phasen: Forming, Storming, Norming, Performing (Tuckman)","Nur das Führen von Teamsitzungen","Das Auswechseln von Teammitgliedern"],c:1,e:"Teamentwicklung nach Tuckman: 1. Forming (Kennenlernen), 2. Storming (Konflikte, Positionskämpfe), 3. Norming (Normen und Regeln entstehen), 4. Performing (effektive Zusammenarbeit). Führungskräfte und Praxisanleitende begleiten diesen Prozess aktiv."},
    {q:"Was bedeutet 'lebenslanges Lernen' in der Pflege?",x:"",o:["Man lernt nur in der Ausbildung","Kontinuierliche Fortbildung und Weiterentwicklung der eigenen Kompetenzen über die gesamte Berufsbiografie – Pflicht nach PflBG","Fortbildung ist freiwillig","Man lernt nur durch Fehler"],c:1,e:"Lebenslanges Lernen in der Pflege: Pflicht zur Fortbildung (PflBG), jährlich ca. 48 Stunden Fort-/Weiterbildung. Formen: interne Schulungen, externe Fortbildungen, Fachtagungen, Selbststudium, E-Learning. Ziel: Fachkompetenz aktuell halten, neue Methoden einsetzen."},
    {q:"Was bedeutet Einarbeitung neuer Mitarbeitender in der Pflege?",x:"",o:["Neue Mitarbeitende müssen alles selbst herausfinden","Strukturierte Einarbeitung durch Praxisanleitende oder Mentoren: Orientierung, schrittweise Aufgabenübernahme, Feedbackgespräche, Reflexion – nach Einarbeitungsplan","Einarbeitung dauert einen Tag","Neue Mitarbeitende führen sofort alle Aufgaben eigenständig durch"],c:1,e:"Professionelle Einarbeitung: Einarbeitungsplan erstellen, feste Ansprechperson (Mentor/Praxisanleitende) zuweisen, Orientierungsphase (Räume, Team, Abläufe), schrittweise Aufgabenübernahme, regelmäßige Feedbackgespräche, Reflexion nach 1, 3 und 6 Monaten. Ziel: sichere Integration ins Team."}
