  dorf:[
    {q:"Was ist rheumatoide Arthritis und was sind typische Symptome?",x:"",o:["Eine Verschleißerkrankung der Gelenke","Eine chronisch-entzündliche Autoimmunerkrankung mit symmetrischer Gelenkentzündung, Morgensteifigkeit, Schwellung, Schmerzen","Eine Erkrankung der Wirbelsäule","Eine akute Infektionskrankheit der Gelenke"],c:1,e:"Rheumatoide Arthritis (RA): Autoimmunerkrankung mit synovialer Entzündung. Typisch: symmetrische Gelenkentzündung (Finger, Handgelenke, Knie), Morgensteifigkeit >60 Min., Schwellung, Schmerzen, systemische Zeichen (Müdigkeit, CRP erhöht). Therapie: Basistherapeutika (Methotrexat), Biologika, Physiotherapie."},
    {q:"Was sind Prinzipien des Expertenstandards Schmerzmanagement in der Pflege?",x:"",o:["Schmerzen sind normal und müssen ertragen werden","Regelmäßiges Schmerzassessment, individuelle Schmerztherapie, Patientenedukation, Evaluierung – nach aktueller Forschungsevidenz","Schmerzmanagement ist nur Aufgabe des Arztes","Schmerzmittel immer auf Anfrage geben"],c:1,e:"Expertenstandard Schmerzmanagement (DNQP, 2. Aktualisierung 2020): initiales Schmerzassessment, regelmäßige Verlaufskontrollen, multimodales Schmerzmanagement (medikamentös, nicht-medikamentös), Patientenschulung, Outcome-Messung. Pflege hat aktive, eigenständige Rolle im Schmerzmanagement."},
    {q:"Was beschreibt interprofessionelle Zusammenarbeit auf dem Land?",x:"",o:["Auf dem Land gibt es keine interprofessionelle Zusammenarbeit","Enge Zusammenarbeit von Pflegedienst, Hausarzt, Physiotherapeut, Sozialdienst und Angehörigen ist besonders wichtig, da die Versorgungsstruktur ländlicher Regionen lückenhafter ist","Nur Krankenhäuser arbeiten interprofessionell","Interprofessionelle Zusammenarbeit ist nur in der Klinik sinnvoll"],c:1,e:"In ländlichen Regionen ist die Versorgungsstruktur oft dünner (weniger Fachärzte, längere Wege). Interprofessionelle Vernetzung ist daher besonders wichtig: Regelmäßige Fallbesprechungen, klare Kommunikationswege, digitale Vernetzung (Telemedizin), Case-Management."},
    {q:"Frau Seidel (78 J.) hat starke Schmerzen. Menut Aydin bemerkt, dass kaum jemand die Schmerzen ernst nimmt. Was tut er?",x:"",o:["Er sagt nichts, da er neu ist","Er spricht die Stationsleitung an und macht auf das Problem aufmerksam – das ist Teil des professionellen Pflegehandelns","Er gibt eigenständig Schmerzmittel","Er verlegt Frau Seidel auf eine andere Station"],c:1,e:"Professionelles Handeln: Unzulänglichkeiten in der Versorgung ansprechen ist Berufsauftrag und ethische Pflicht (Advocacy = Patientenanwaltschaft). Menut sollte seine Beobachtung sachlich dokumentieren, ansprechen und ggf. über institutionelle Meldewege gehen. Schweigen ist keine Option."},
    {q:"Was umfasst gesellschaftliche Entwicklung als Thema für Pflegende?",x:"",o:["Nur das Lesen von Zeitungen","Kenntnisse über demographischen Wandel, Fachkräftemangel, Digitalisierung, kulturelle Vielfalt, Gesundheitspolitik und deren Auswirkungen auf die Pflege","Nur politische Diskussionen","Nur wirtschaftliche Fragen"],c:1,e:"Gesellschaftliche Entwicklung betrifft die Pflege direkt: Demographischer Wandel (mehr ältere Pflegebedürftige), Fachkräftemangel, Digitalisierung (Pflegetechnologien, KI), kulturelle Vielfalt (Migration), Gesundheitsversorgung im ländlichen Raum, Pflegepolitik (Pflegebonusgesetz, Personalbemessung)."}
  ],
  prob:[
    {q:"Was können Sie tun, wenn Sie Lernstoff einfach nicht behalten können?",x:"",o:["Aufgeben und nicht mehr lernen","Aktive Lernmethoden nutzen: Karteikarten, Erklären ohne Vorlage, Mind-Maps, Lerngruppen, spaced repetition (verteiltes Lernen)","Denselben Text immer wieder lesen","Nur Zusammenfassungen schreiben"],c:1,e:"Passives Wiederlesen ist wenig effektiv. Aktive Methoden sind besser: Karteikarten (aktives Abrufen), Elaboration (Stoff erklären), spaced repetition (über Zeit verteilt üben), Lerngruppen (Erklären festigt Wissen). Regelmäßige kurze Lerneinheiten sind effektiver als ein Marathon vor der Prüfung."},
    {q:"Was tun bei Motivationslosigkeit vor der Prüfung?",x:"",o:["Einfach Durchhalten ohne Pause","Kleine Ziele setzen, Erfolge feiern, Lernort wechseln, Lernpartnerschaften suchen, den Sinn der Ausbildung reflektieren, ggf. professionelle Hilfe suchen","Sofort aufhören zu lernen","Mehr Kaffee trinken"],c:1,e:"Motivationslosigkeit ist normal. Strategien: kleine, erreichbare Tagesziele setzen (Sinnhaftigkeit erfahren), Belohnungssysteme, Lernort- oder -methoden-Wechsel, mit Kommiliton:innen lernen, den eigenen 'Warum' reflektieren. Bei anhaltender Demotivation: Gespräch mit Vertrauensperson suchen."},
    {q:"Was ist ein Blackout in der Prüfung und was hilft?",x:"",o:["Ein technisches Problem mit dem Computer","Ein plötzliches Aussetzen des Abrufs von Wissen trotz vorhandenen Wissens – hilft: tief atmen, mit leichterer Frage beginnen, Körper beruhigen, zur nächsten Frage übergehen","Ein echtes Vergessen des Lernstoffs","Ein Zeichen dafür, dass man zu wenig gelernt hat"],c:1,e:"Blackout = blockierter Abruf durch Prüfungsangst/Stress. Strategien: tief atmen (Parasympathikus aktivieren), Körper locker schütteln, mit einer bekannten Frage beginnen, Zeitdruck mental reduzieren ('Ich kann das'). Das Wissen ist da – der Abruf ist blockiert, nicht verloren."},
    {q:"Was sind sinnvolle Maßnahmen zur Prüfungsvorbereitung, wenn wenig Zeit bleibt?",x:"",o:["Nichts tun – es ist zu spät","Priorisieren: wichtigste Themen zuerst, Zusammenfassungen lesen, Aufgabentypen üben, früh schlafen gehen vor der Prüfung","Die ganze Nacht durchlernen","Nur Karteikarten anschauen"],c:1,e:"Bei Zeitdruck: Pareto-Prinzip anwenden (20% des Stoffs deckt 80% der Prüfungsinhalte). Lernprioritäten setzen (Prüfungsschwerpunkte), aktives Üben mit Übungsaufgaben, mind. 7–8 Stunden Schlaf vor der Prüfung. Nachtlernen ist kontraproduktiv – Schlaf festigt Gedächtnisinhalte."},
    {q:"Was tun, wenn Sie die Prüfung nicht bestehen?",x:"",o:["Die Ausbildung sofort abbrechen","Ergebnis analysieren (was war schwach?), Beratung suchen (Schulleitung, Kommiliton:innen), Wiederholungsmöglichkeit nutzen, gezielt an Schwachstellen arbeiten","Sich schämen und nichts sagen","Die Note ignorieren"],c:1,e:"Nicht bestehen ist kein Versagen – es ist eine Information. Schritte: Prüfungsprotokoll analysieren, Feedback einholen, Schwachstellen identifizieren, gezielten Wiederholungsplan erstellen, Beratung in der Schule nutzen. Wiederholungsprüfungen sind rechtlich möglich (PflBG)."}
  ],
  selbst:[
    {q:"Warum ist ausreichend Schlaf in der Prüfungsphase so wichtig?",x:"",o:["Schlaf ist Zeitverschwendung","Im Schlaf werden Gedächtnisinhalte konsolidiert – mindestens 7–8 Stunden Schlaf verbessern Konzentration, Gedächtnisabruf und emotionale Stabilität","Mehr Schlaf bedeutet weniger Lernzeit","Nur am Tag vor der Prüfung schlafen"],c:1,e:"Schlaf ist essentiell für Lernen: Im Tiefschlaf werden Tagesinhalte ins Langzeitgedächtnis übertragen (Konsolidierung). Schlafentzug mindert Konzentration, Kreativität und Merkfähigkeit. Regelmäßiger Schlafrhythmus in der Prüfungsphase ist eine Lernstrategie, keine Schwäche."},
    {q:"Was ist 'work-life-balance' für Pflegeauszubildende?",x:"",o:["Man soll immer nur lernen","Eine ausgewogene Balance zwischen Lernen/Arbeit und Erholung, sozialen Kontakten, Hobbys – schützt vor Burnout und fördert langfristige Leistungsfähigkeit","Nur für Vollzeit-Berufstätige relevant","Ausbildende dürfen keine Freizeit haben"],c:1,e:"Work-Life-Balance in der Ausbildung: Lernzeiten planen (feste Zeiten), bewusste Erholungsphasen einbauen, Hobbys und soziale Kontakte pflegen, Grenzen ziehen (nicht permanent verfügbar sein). Langfristig hält gute Balance die Motivation aufrecht und verhindert Erschöpfung."},
    {q:"Warum ist ausreichende Flüssigkeitszufuhr beim Lernen wichtig?",x:"",o:["Sie ist nicht wichtig","Dehydration vermindert Konzentrations- und Denkfähigkeit – mindestens 1,5–2 Liter täglich, besser Wasser/ungesüßte Getränke","Man soll viel Kaffee trinken","Nur Sport erfordert Flüssigkeit"],c:1,e:"Bereits 2% Flüssigkeitsmangel beeinträchtigt kognitive Leistung (Konzentration, Kurzeitgedächtnis, Reaktionszeit). Empfehlung: 1,5–2 L täglich (bei Hitze mehr). Wasser, ungesüßter Tee bevorzugen. Kaffee in Maßen – zu viel Koffein erhöht Stresshormone."},
    {q:"Was sind sinnvolle Entspannungsmethoden in der Prüfungsphase?",x:"",o:["Kein Entspannen – nur lernen","Progressive Muskelentspannung, Atemübungen, kurze Spaziergänge, Yoga, Achtsamkeit, Sport – regelmäßige Pausen verbessern die Lernleistung","Entspannung ist ein Zeichen von Schwäche","Nur Schlafen ist Entspannung"],c:1,e:"Entspannungsmethoden: Progressive Muskelentspannung (PMR), Bauchatmung, Achtsamkeitsübungen (MBSR), kurze Naturpausen (Spaziergänge), Sport. Regelmäßige Erholungspausen (Pomodoro: 25 min. lernen, 5 min. Pause) steigern die Lerneffizienz."},
    {q:"Was verstärkt Prüfungsangst und was hilft dagegen?",x:"",o:["Gute Vorbereitung verstärkt Angst","Katastrophisierung, Vergleich mit anderen, Schlafmangel und mangelnde Vorbereitung verstärken Angst – helfen: realistische Gedanken, Atemtechniken, gute Vorbereitung, Gespräche","Pausen machen verstärkt Angst","Prüfungsangst ist immer krankhaft"],c:1,e:"Prüfungsangst: normale Reaktion bei Leistungssituationen. Verstärkend: Katastrophengedanken, Vergleiche, Schlafentzug. Hilfreich: kognitive Umstrukturierung ('Ich habe gut gelernt'), Atemübungen, realistische Erwartungen, Austausch mit Gleichgesinnten, Beratung bei starker Angst."}
  ],
  ptag:[
    {q:"Was sollten Sie am Prüfungstag morgens besonders beachten?",x:"",o:["Möglichst viel essen und trinken","Ausreichend essen (aber nicht zu schwer), pünktlich erscheinen, alle nötigen Materialien mitbringen, ruhig und fokussiert ankommen","Kurz vor der Prüfung nochmals intensiv lernen","Kaffee trinken und nichts essen"],c:1,e:"Prüfungstag-Vorbereitung: leichte, sättigende Mahlzeit (Hafer, Vollkorn), ausreichend Wasser, alle Unterlagen vorher packen, pünktlich (15 Min. vorher) erscheinen. Kein Intensivlernen kurz vorher (erhöht Stress). Bewusst tief einatmen, positive Selbstgespräche führen."},
    {q:"Wie liest man eine Prüfungsaufgabe am besten?",x:"",o:["Die Aufgabe nur einmal flüchtig lesen","Aufgabe zweimal lesen, Operator markieren (nennen, beschreiben, erklären…), Punktzahl beachten, Schlüsselwörter unterstreichen, dann planvoll antworten","Sofort mit Schreiben beginnen ohne die Aufgabe vollständig zu lesen","Nur den letzten Satz lesen"],c:1,e:"Aufgabenanalyse: 1. Operator identifizieren (was wird gefordert: nennen, beschreiben, ermitteln?), 2. Inhalt erfassen (worum geht es?), 3. Punktzahl beachten (Umfang der Antwort ableiten), 4. Schlüsselwörter unterstreichen, 5. Gliederung der Antwort planen. Diese Analyse spart Zeit und sichert vollständige Antworten."},
    {q:"Was ist der Unterschied zwischen den Operatoren 'nennen' und 'beschreiben'?",x:"",o:["Es gibt keinen Unterschied","Nennen = kurze Auflistung ohne Erklärung (AB I); Beschreiben = ausführliche Darstellung mit Merkmalen (AB II)","Nennen = ausführliche Erklärung; Beschreiben = kurze Liste","Beide fordern eine persönliche Meinung"],c:1,e:"Operatoren: NENNEN (AB I) = kurze Auflistung, keine Begründung nötig (z.B. 'Nennen Sie 3 Symptome'). BESCHREIBEN (AB II) = ausführliche Darstellung mit charakteristischen Merkmalen (z.B. 'Beschreiben Sie den Pflegeprozess'). ERKLÄREN (AB II) = mit Begründung und Zusammenhängen. STELLUNG BEZIEHEN (AB III) = eigene begründete Meinung."},
    {q:"Was bedeutet 'Nachkontrolle' nach Abgabe der Prüfungsarbeit?",x:"",o:["Alle Antworten vollständig neu schreiben","Kurz vor Abgabe: Vollständigkeit prüfen (alle Aufgaben beantwortet?), lesbare Schrift, Namen eingetragen, keine offensichtlichen Lücken","Die schlechtesten Antworten streichen","Die Prüfungsarbeit zehnmal lesen"],c:1,e:"Nachkontrolle: systematische Prüfung kurz vor Abgabe (5–10 Min.): Alle Aufgaben vollständig beantwortet? Name und Datum eingetragen? Leserlichkeit? Wichtige Fachbegriffe verwendet? Tipp: bei Unsicherheit erste Antwort behalten – spontane Antworten sind oft richtiger als 'überkorrigierte'."},
    {q:"Was ist Zeitmanagement in der Prüfung?",x:"",o:["Alles auf eine Aufgabe verwenden","Punkte auf Aufgaben verteilen, Zeit einteilen (z.B. 1 Punkt ≈ 1 Minute), mit bekannten Aufgaben beginnen, Zeit im Auge behalten, nicht zu lange bei einer Aufgabe bleiben","Immer die schwierigste Aufgabe zuerst","Zeit spielt keine Rolle"],c:1,e:"Prüfungs-Zeitmanagement: Gesamtzeit auf Aufgaben proportional zur Punktzahl verteilen (1 P ≈ 1 Min.). Mit bekannten Aufgaben starten (Erfolgserlebnis, Warm-up). Bei schwierigen Aufgaben: weiterblättern, später zurückkehren. 5–10 Min. für Nachkontrolle einplanen."}
  ],
  k1_k:[
    {q:"Welche 5 Kompetenzbereiche (KB) strukturieren die Pflegeausbildung nach PflBG?",x:"",o:["KB I: Pflegeprozess, KB II: Kommunikation, KB III: Organisation/Management, KB IV: Gesellschaft, KB V: Professionalität/Reflexion","KB I: Anatomie, KB II: Pharmakologie, KB III: Chirurgie, KB IV: Psychologie, KB V: Ethik","KB I: Körperpflege, KB II: Mobilisation, KB III: Ernährung, KB IV: Ausscheidung, KB V: Schlafen","KB I: Pädiatrie, KB II: Geriatrie, KB III: Chirurgie, KB IV: Neurologie, KB V: Psychiatrie"],c:0,e:"Die 5 Kompetenzbereiche (Anlage zu § 7 PflBG): KB I: Pflegeprozess und -wissen, KB II: Kommunikation und Beziehung, KB III: Organisation/Management/Personal, KB IV: Gesellschaft/Recht/Ethik, KB V: Professionalität/Eigenständigkeit. Alle 5 KB werden in der Prüfung berücksichtigt."},
    {q:"Was prüft der Anforderungsbereich III (AB III)?",x:"",o:["Das reine Wiedergeben von Fakten","Das Verstehen und Anwenden von Wissen","Das Urteilen, Bewerten und Begründen von Sachverhalten auf Basis von Fachkompetenz","Das Auswendiglernen von Definitionen"],c:2,e:"AB I = Reproduktion (Fakten nennen, definieren), AB II = Reorganisation/Anwendung (Zusammenhänge erklären, Fallbezug herstellen), AB III = Transfer/Wertung (beurteilen, Stellung beziehen, Begründen von Entscheidungen). Prüfungsfragen im 3. Prüfungstag haben mehr AB III-Anteile."},
    {q:"Was ist ein wesentlicher Unterschied zwischen Pflegegrad und Pflegebedürftigkeit?",x:"",o:["Sie bedeuten dasselbe","Pflegebedürftigkeit = dauerhafter Hilfebedarf; Pflegegrad = der administrative Bewertungswert 1–5 der Pflegeversicherung nach Begutachtung durch den MDK","Pflegegrad ist nur für Krankenhäuser relevant","Pflegebedürftigkeit gibt es erst ab Pflegegrad 3"],c:1,e:"Pflegebedürftigkeit (§ 14 SGB XI): dauerhafter Hilfebedarf durch Beeinträchtigung der Selbstständigkeit. Pflegegrad: Bewertungsergebnis des Begutachtungsassessments (0–100 Punkte → PG 1–5). PG 1 = geringe Beeinträchtigung, PG 5 = schwerste mit besonderem Bedarf."},
    {q:"Was sind Vorbehaltstätigkeiten nach § 4 PflBG?",x:"",o:["Alle Tätigkeiten in der Pflege","Spezifische Tätigkeiten (Pflegeprozess, Anleitung, Pflegediagnostik, Evaluation), die nur von examinierten Pflegefachkräften eigenverantwortlich durchgeführt werden dürfen","Nur das Injizieren von Medikamenten","Tätigkeiten, die an Ärzte vorbehalten sind"],c:1,e:"Vorbehaltstätigkeiten (§ 4 PflBG): Pflegeprozess eigenverantwortlich gestalten, Pflegediagnostik, Pflegeplanung, Anleitung von Auszubildenden und Pflegehilfspersonen. Diese Aufgaben dürfen nur examinierte Pflegefachkräfte eigenverantwortlich durchführen – nicht delegiert an Hilfskräfte."},
    {q:"Was bedeutet Eigenverantwortlichkeit im Pflegeberuf nach PflBG?",x:"",o:["Man tut, was man möchte","Pflegefachkräfte handeln auf Basis ihrer Fachkompetenz, wissenschaftlich fundiert und rechtlich sowie ethisch eigenständig verantwortlich","Man befolgt nur Anweisungen von Ärzten","Man ist nie für sein Handeln verantwortlich"],c:1,e:"Eigenverantwortlichkeit (§ 3 PflBG): Pflegefachkräfte handeln eigenverantwortlich im Bereich der Pflege. Sie sind nicht nur ausführende Kräfte, sondern kompetente Fachpersonen mit eigener Verantwortung für Pflegeprozess, Sicherheit und Qualität. Grundlage: wissenschaftliche Ausbildung und Berufserfahrung."}
  ],
  k1_o:[
    {q:"Der Operator 'ERMITTELN' erfordert welchen Arbeitsschritt?",x:"",o:["Nur Fakten aufzählen","Einen Sachverhalt durch Analyse, Vergleich oder Berechnung aus Informationen herausarbeiten (AB II)","Persönliche Meinung äußern","Einen Begriff definieren"],c:1,e:"ERMITTELN (AB II): Informationen aus dem Text/Fall analysieren und daraus einen Sachverhalt ableiten. Typisch: 'Ermitteln Sie das Dekubitusrisiko anhand der Waterlow-Skala.' Methode: Fakt aus dem Fall → Schlussfolgerung → Ergebnis. Keine pure Wiedergabe, sondern aktive Ableitung."},
    {q:"Welcher Operator gehört dem Anforderungsbereich I (AB I) an?",x:"",o:["Erklären","Entwickeln","Stellung nehmen","Nennen"],c:3,e:"AB I-Operatoren: NENNEN, AUFZÄHLEN, DEFINIEREN. Sie verlangen das reine Wiedergeben von Fakten ohne Begründung oder Analyse. AB II: Beschreiben, Ermitteln, Zuordnen. AB III: Erklären, Entwickeln, Stellung beziehen, Begründen. In der Prüfung nimmt der AB III-Anteil zu."},
    {q:"Was bedeutet 'STELLUNG BEZIEHEN' als Operator in der Prüfung?",x:"",o:["Fakten aufzählen","Die Pflegesituation zusammenfassen","Eine begründete eigene Meinung zu einem Sachverhalt formulieren, gestützt auf Fachwissen und ethische Grundsätze (AB III)","Einen Begriff definieren"],c:2,e:"STELLUNG BEZIEHEN (AB III): eigene, begründete Position einnehmen. Struktur: Behauptung + Begründung (weil + Fachbegriff) + Fallbezug. Beginne immer mit 'Ich finde/Ich bin der Meinung…' + Argument. Keine bloße Meinung ohne Fachbegründung akzeptiert."},
    {q:"Was verlangt der Operator 'ENTWICKELN' in der Prüfung?",x:"",o:["Einen Plan kreativ und begründet aus einer Situation heraus erarbeiten (AB III)","Fakten nennen","Einen Begriff erklären","Informationen sammeln"],c:0,e:"ENTWICKELN (AB III): Neue Ideen, Pläne, Maßnahmen oder Lösungen auf Basis des Falls erarbeiten. Beispiel: 'Entwickeln Sie einen Pflegeplan für Herrn X.' Erwartet wird eine begründete, fallbezogene und fachlich fundierte Planung – nicht nur aufgelistete Maßnahmen."},
    {q:"Was bedeutet 'Anforderungsbereich' (AB) in der Prüfung?",x:"",o:["Das Format der Prüfungsarbeit","Die Schwierigkeitsstufe der Prüfungsaufgabe: AB I = Reproduktion, AB II = Reorganisation, AB III = Transfer/Wertung","Die Anzahl der Punkte","Die Anzahl der Aufgaben"],c:1,e:"Anforderungsbereiche klassifizieren die kognitive Anforderung: AB I = Fakten reproduzieren (nennen, definieren), AB II = Verstehen und Anwenden (beschreiben, ermitteln, zuordnen), AB III = Beurteilen und Transferieren (erklären, entwickeln, Stellung beziehen). Prüfungsaufgaben markieren den jeweiligen AB."}
  ],
  k1_p:[
    {q:"Aus welchen 3 Teilen besteht die Abschlussprüfung zur Pflegefachkraft?",x:"",o:["Schriftlich, Mündlich, Praktisch","Theoretisch, Praktisch, Klinisch","Schriftlich, Klinisch, Mündlich","Fachlich, Sozial, Persönlich"],c:0,e:"Die Pflegefachkraft-Abschlussprüfung umfasst nach PflBG: 1. Schriftliche Prüfung (3 Prüfungstage mit je einer Aufgabe aus KB I–V), 2. Mündliche Prüfung (Fall mit Kompetenzaufgaben und Prüfergespräch), 3. Praktische Prüfung (Pflegesituation mit realen Patienten). Alle 3 Teile müssen bestanden werden."},
    {q:"Wie viele Tage umfasst die schriftliche Prüfung?",x:"",o:["1 Tag","2 Tage","3 Tage","5 Tage"],c:2,e:"Die schriftliche Prüfung erstreckt sich über 3 Prüfungstage. Jeder Tag hat eine andere thematische Ausrichtung entsprechend der Kompetenzbereiche. Für jede Prüfungsaufgabe stehen 120 Minuten zur Verfügung. Die Aufgaben sind fallbezogen und prüfen Analyse- und Anwendungskompetenz."},
    {q:"Wofür steht KB V in der Pflegeausbildung?",x:"",o:["Körperpflege und Vitalzeichen","Professionalität, Selbstreflexion, berufliche Entwicklung und Eigenständigkeit","Kommunikation und Visitendurchführung","Klinische Befunde und Vorgehen"],c:1,e:"KB V = Kompetenzbereich V: Professionelles Handeln im Pflegeprozess, Selbstreflexion, berufliche Identität, ethisches Handeln, Eigenständigkeit. Themen: berufspolitisches Handeln, lebenslanges Lernen, persönliche Gesunderhaltung, Umgang mit Belastung, Reflexionsfähigkeit."},
    {q:"Was wird in der praktischen Abschlussprüfung bewertet?",x:"",o:["Theoretisches Wissen durch Fragen","Die Pflegepraxis mit realen Patienten: Pflegeprozess planen, durchführen und evaluieren in einer realen Pflegesituation","Das Schreiben einer Pflegedokumentation","Das Lösen von Rechenfragen"],c:1,e:"Praktische Prüfung: An realen Patienten/Bewohnern wird der gesamte Pflegeprozess geprüft. Bewertet werden: Pflegeanamnese und -planung, Durchführung der Pflege (Fertigkeiten, Kommunikation, Hygienestandards), Dokumentation und Evaluation, Fachgespräch mit den Prüfenden."},
    {q:"Was bedeutet 'Kompetenzschwerpunkt' in einer Prüfungsaufgabe?",x:"",o:["Das Hauptthema des Buches","Der Kompetenzbereich (KB), dem eine Prüfungsaufgabe schwerpunktmäßig zugeordnet ist","Die Anzahl der Punkte","Die Art des Operators"],c:1,e:"Prüfungsaufgaben sind einem oder mehreren Kompetenzbereichen (KB I–V) zugeordnet. Der Kompetenzschwerpunkt zeigt, welche Kompetenzen hauptsächlich bewertet werden. Häufig werden mehrere KB in einer Aufgabe verknüpft – typisch für die Saarland-Prüfung: ANWENDEN steht im Vordergrund."}
  ],
  k1_l:[
    {q:"Was ist die Pomodoro-Technik beim Lernen?",x:"",o:["Ein italienisches Lernbuch","Eine Zeitmanagement-Methode: 25 Minuten fokussiert lernen, dann 5 Minuten Pause – nach 4 Runden eine längere Pause","Eine Ernährungsempfehlung","Ein Entspannungsverfahren"],c:1,e:"Pomodoro-Technik: 25 Min. fokussiertes Lernen (Ablenkungen ausschalten) → 5 Min. Pause. Nach 4 Pomodori: 15–30 Min. längere Pause. Vorteile: verhindert geistigen Erschöpfung, strukturiert den Lerntag, nutzt den 'Flow'-Zustand. Hilfreich besonders bei schwer motivierendem Stoff."},
    {q:"Warum ist 'Selbsterklären' eine effektive Lernmethode?",x:"",o:["Es dauert zu lange","Wenn man etwas erklären kann, hat man es wirklich verstanden – Lücken im Verständnis werden sichtbar","Es ist nur für Lehrer wichtig","Es ersetzt alle anderen Lernmethoden"],c:1,e:"'Explain-to-yourself'-Methode: Stoff laut erklären (ohne Vorlage) zeigt sofort, was man wirklich verstanden hat und wo Lücken sind. Besser als passives Lesen: aktives Abrufen stärkt neuronale Netzwerke. Auch als 'Teach-back' mit Lernpartner:in sehr effektiv."},
    {q:"Was ist ein persönlicher Lernplan und wozu dient er?",x:"",o:["Eine To-do-Liste für den Schultag","Eine strukturierte Übersicht über Lernziele, Zeitpläne und Prüfungsthemen zur Selbstorganisation der Prüfungsvorbereitung","Ein Stundenplan der Schule","Ein Notenprotokoll"],c:1,e:"Persönlicher Lernplan: Prüfungstermine eingetragen, Themen nach Wichtigkeit priorisiert, Lernziele für jede Einheit definiert, realistische Zeiten eingeplant (mit Puffern). Dient der Selbstorganisation, verhindert 'Lernstau' kurz vor der Prüfung und gibt Sicherheit."},
    {q:"Was kann bei Prüfungsangst helfen?",x:"",o:["Alles vermeiden, was an die Prüfung erinnert","Gute Vorbereitung, realistische Selbsteinschätzung, Atemübungen, positive Selbstgespräche, Austausch mit anderen und ggf. professionelle Unterstützung","Mehr Koffein trinken","Die Prüfung ignorieren"],c:1,e:"Prüfungsangst-Management: Grundlage ist gute Vorbereitung (reduziert Unsicherheit). Zusätzlich: kognitive Umstrukturierung ('Ich bin gut vorbereitet'), Atemübungen (4-7-8-Technik), progressive Muskelentspannung, Austausch mit Kommiliton:innen. Bei starker Angst: Schulberatung oder Psycholog:in."},
    {q:"Warum ist Pausen machen beim Lernen wichtig?",x:"",o:["Pausen verlangsamen das Lernen","Das Gehirn verarbeitet und festigt Informationen auch in Ruhephasen – ohne Pausen nimmt die Konzentration ab und die Fehlerrate zu","Nur Faulpelze machen Pausen","Pausen sollten mindestens 2 Stunden dauern"],c:1,e:"Pausen sind notwendig für effektives Lernen: In Ruhephasen konsolidiert das Gehirn neue Informationen ('offline learning'). Konzentration sinkt nach ca. 25–50 Min. stark ab. Regelmäßige kurze Pausen (Bewegung, frische Luft) erhöhen die Gesamtleistung. Optimal: 5–10 Min. nach 25–50 Min. Lernen."}
  ]
};

function shuffle(arr){let a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function showTopics(cid){
  curCh=CH.find(c=>c.id===cid);
  document.getElementById('tt2').textContent=curCh.label;
  document.getElementById('ts2').textContent=curCh.sub;
  const con=document.getElementById('tcon'); con.innerHTML='';
  curCh.groups.forEach(g=>{
    const gt=document.createElement('div'); gt.className='tg'; gt.textContent=g.name; con.appendChild(gt);
    const tl=document.createElement('div'); tl.className='tl';
    g.topics.forEach(t=>{
      const c=document.createElement('div'); c.className='tc';
      c.innerHTML=`<div class="ti">${t.emoji}</div><div class="tni"><div class="tt">${t.title}</div><div class="th">${t.themes}</div></div><div class="ta">›</div>`;
      c.onclick=()=>startQ(t); tl.appendChild(c);
    }); con.appendChild(tl);
  }); show('s-topics');
}

function startQ(topic){
  curTopic=topic;
  const raw=DB[topic.id];
  if(!raw||raw.length===0){alert('Keine Fragen für dieses Thema gefunden.');return;}
  allQ=shuffle(raw);
  qi=0;ans=[];
  document.getElementById('qt').textContent=topic.title;
  document.getElementById('qs2').textContent=topic.themes.split(' · ').slice(0,2).join(' · ');
  document.getElementById('pf').style.width='0%';
  show('s-quiz');
  renderQ();
}

let _corIdx=0; // global correct index — never passed through HTML attributes

function renderQ(){
  const q=allQ[qi]; sel=null; rev=false;
  document.getElementById('pf').style.width=(qi/allQ.length*100)+'%';
  const opts=shuffle(q.o.map((t,i)=>({t,orig:i})));
  _corIdx=opts.findIndex(o=>o.orig===q.c); // store globally

  // Build skeleton with empty text nodes — fill via textContent below
  const qb=document.getElementById('qb');
  qb.innerHTML=`
    <div class="qc">Frage ${qi+1} von ${allQ.length}</div>
    ${q.x?'<div class="qx"></div>':''}
    <div class="qq"></div>
    <div class="opts" id="oc">
      ${opts.map((_,i)=>`<button class="op" onclick="pick(${i})"><span class="ol">${'ABCD'[i]}</span><span class="ot"></span></button>`).join('')}
    </div>
    <div class="ar" id="ar"><div class="al" id="al"></div><div class="ae" id="ae"></div></div>
    <div class="qa"><button class="bp" id="cb" onclick="confirmAns()" disabled>Antwort bestätigen</button></div>`;

  // Set all text safely via textContent (prevents any HTML/quote issues)
  if(q.x) qb.querySelector('.qx').textContent=q.x;
  qb.querySelector('.qq').textContent=q.q;
  qb.querySelectorAll('.ot').forEach((el,i)=>el.textContent=opts[i].t);
  qb.scrollTop=0;
}

function pick(i){
  if(rev)return; sel=i;
  document.querySelectorAll('.op').forEach((e,j)=>e.classList.toggle('sel',j===i));
  document.getElementById('cb').disabled=false;
}

function confirmAns(){
  if(sel===null||rev)return; rev=true;
  const q=allQ[qi]; const correct=_corIdx; const isOk=(sel===correct);
  const opts=document.querySelectorAll('.op');
  const selText=opts[sel].querySelector('.ot').textContent;
  const corText=opts[correct].querySelector('.ot').textContent;
  ans.push({q:q.q,ok:isOk,selTxt:selText,corTxt:corText,exp:q.e});
  opts.forEach((e,i)=>{
    e.classList.remove('sel');
    if(i===correct) e.classList.add(isOk&&i===sel?'cor':'rcor');
    if(i===sel&&!isOk) e.classList.add('wrg');
  });
  const ar=document.getElementById('ar'); ar.classList.add('vis');
  const al=document.getElementById('al'); const ae=document.getElementById('ae');
  al.className='al '+(isOk?'c':'w');
  al.textContent=isOk?'✓ Richtig!':'✗ Falsch – Richtig: '+corText;
  ae.textContent=q.e; // textContent — safe for any character
  const cb=document.getElementById('cb'); cb.disabled=false;
  const last=(qi===allQ.length-1);
  cb.textContent=last?'Ergebnis ansehen →':'Nächste Frage →';
  cb.onclick=last?showRes:()=>{qi++;renderQ();};
}


function getNote(pct){
  if(pct>=92)return{n:1,lbl:'🏆 Sehr gut',   col:'#2D7A3A',bg:'#E8F5EA',bc:'#2D7A3A'};
  if(pct>=81)return{n:2,lbl:'⭐ Gut',          col:'#2D7A3A',bg:'#E8F5EA',bc:'#2D7A3A'};
  if(pct>=67)return{n:3,lbl:'👍 Befriedigend', col:'#B05D0A',bg:'#FEF5E8',bc:'#D4820E'};
  if(pct>=50)return{n:4,lbl:'📝 Ausreichend',  col:'#B05D0A',bg:'#FEF5E8',bc:'#D4820E'};
  if(pct>=30)return{n:5,lbl:'📖 Mangelhaft',   col:'#DC2626',bg:'#FEF2F2',bc:'#DC2626'};
  return       {n:6,lbl:'❌ Ungenügend',    col:'#DC2626',bg:'#FEF2F2',bc:'#DC2626'};
}

function showRes(){
  const tot=allQ.length; const sc=ans.filter(a=>a.ok).length; const pct=Math.round(sc/tot*100);
  const note=getNote(pct);

  document.getElementById('rscore').textContent=sc;
  document.getElementById('rden').textContent='von '+tot;

  // Note box
  const nb=document.getElementById('notebox');
  nb.style.cssText=`display:block;background:${note.bg};border:2px solid ${note.bc};border-radius:12px;margin:14px 14px 0;padding:14px 16px;text-align:center;`;
  document.getElementById('note-n').style.color=note.col;
  document.getElementById('note-n').textContent='Note '+note.n;
  document.getElementById('note-l').style.color=note.col;
  document.getElementById('note-l').textContent=note.lbl+' · '+pct+'% ('+sc+'/'+tot+' richtig)';

  // Title
  const msgs={1:['Ausgezeichnet! 🏆','Perfekte Leistung – du beherrschst dieses Thema!'],
    2:['Sehr gut! ⭐','Starke Leistung – nur noch Details festigen.'],
    3:['Befriedigend 👍','Grundlagen sitzen – übe noch die Schwachpunkte.'],
    4:['Ausreichend 📝','Bestanden, aber mehr Übung ist nötig.'],
    5:['Mangelhaft 📖','Wiederhole das Thema gründlich und versuche es nochmal.'],
    6:['Nicht bestanden ❌','Schau dir alle Erklärungen an und starte nochmal.']};
  document.getElementById('rtitle').textContent=msgs[note.n][0];
  document.getElementById('rmsg').textContent=msgs[note.n][1];

  // Review — all via DOM (no innerHTML with user data)
  const rrev=document.getElementById('rrev'); rrev.innerHTML='';
  ans.forEach((a,i)=>{
    const div=document.createElement('div'); div.className='ri';
    const badge=document.createElement('div'); badge.className='rb '+(a.ok?'c':'w');
    badge.textContent=a.ok?'✓ Richtig':'✗ Falsch'; div.appendChild(badge);
    const qd=document.createElement('div'); qd.className='rq';
    qd.textContent='F'+(i+1)+': '+a.q; div.appendChild(qd);
    const ad=document.createElement('div'); ad.className='ra';
    if(!a.ok){
      const s=document.createElement('span'); s.style.color='#DC2626';
      s.textContent='Deine Antwort: '+a.selTxt; ad.appendChild(s);
      ad.appendChild(document.createElement('br'));
    }
    const r=document.createElement('span'); r.style.color='#2D7A3A';
    r.textContent='Richtig: '+a.corTxt; ad.appendChild(r);
    ad.appendChild(document.createElement('br'));
    ad.appendChild(document.createElement('br'));
    const ex=document.createElement('span'); ex.textContent=a.exp; ad.appendChild(ex);
    div.appendChild(ad); rrev.appendChild(div);
  });

  document.getElementById('rretry').onclick=()=>startQ(curTopic);
  show('s-results');
}

/* STORAGE */
const _KEY='pflegias_v3';
function _load(){try{return JSON.parse(localStorage.getItem(_KEY))||{};}catch(e){return{};}}
function _save(d){try{localStorage.setItem(_KEY,JSON.stringify(d));}catch(e){}}

function doExport(){
  const d=_load();
  const blob=new Blob([JSON.stringify({version:3,date:new Date().toISOString().slice(0,10),progress:d},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='pflegias_'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(a.href);
  showToast('✅ Fortschritt exportiert!');
}
function doImport(input){
  const file=input.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      const data=parsed.progress||parsed;
      const existing=_load(); const merged={...existing};
      Object.keys(data).forEach(k=>{
        if(k==='_streak')merged._streak=Math.max(existing._streak||0,data[k]||0);
        else if(k==='_lastActive')merged[k]=data[k];
        else if(data[k]&&typeof data[k]==='object'){
          merged[k]=merged[k]?{
            best:Math.max(merged[k].best||0,data[k].best||0),
            attempts:(merged[k].attempts||0)+(data[k].attempts||0),
          }:data[k];
        }
      });
      _save(merged); showToast('✅ Importiert & zusammengeführt!');
    }catch(err){showToast('❌ Fehler: '+err.message);}
    input.value='';
  };
  r.readAsText(file);
}
function showToast(msg){
  const el=document.getElementById('toast'); el.textContent=msg;
  el.style.opacity='1'; clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.opacity='0',2800);
}
function goHome(){show('s-home');}

(function init(){
  const l=document.getElementById('clist');
  CH.forEach(ch=>{
    const tot=ch.groups.reduce((s,g)=>s+g.topics.length,0);
    const c=document.createElement('div'); c.className='cc';
    c.innerHTML=`<div class="ch"><div class="cd ${ch.cls}">${ch.emoji}</div><div class="ci"><div class="ct">${ch.label}</div><div class="cs">${ch.sub} · ${tot} Themen</div></div><div class="ca">›</div></div>`;
    c.onclick=()=>showTopics(ch.id); l.appendChild(c);
  });
})();
</script>
