<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pflegias Quiz">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#C8341A">
<title>Pflegias Quiz</title>
<style>
:root{
  --r:#C8341A;--rd:#A02810;--rl:#FEF0EC;
  --g:#2A7A38;--gl:#E8F5EA;
  --t:#0F0F0F;--ts:#555;--tl:#999;
  --bg:#F5F4F0;--card:#fff;
  --bd:#E8E5E0;--bds:#C8C4BC;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
  background:var(--bg);color:var(--t);font-size:16px;
  display:flex;flex-direction:column;max-width:480px;margin:0 auto;
}

/* SCREENS */
.sc{display:none;flex-direction:column;height:100%;position:absolute;inset:0;max-width:480px;margin:0 auto;}
.sc.on{display:flex;}

/* HEADER */
.hd{
  background:var(--r);
  padding-top:calc(var(--safe-top) + 14px);
  padding-bottom:14px;
  padding-left:16px;padding-right:16px;
  flex-shrink:0;
}
.hd-row{display:flex;align-items:center;gap:10px;}
.bk{background:rgba(255,255,255,.18);border:none;border-radius:50%;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;font-size:16px;flex-shrink:0;}
.hd-title{font-size:17px;font-weight:600;color:#fff;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hd-sub{font-size:11px;color:rgba(255,255,255,.7);margin-top:1px;}
.pbar{height:3px;background:rgba(255,255,255,.25);margin-top:10px;border-radius:2px;}
.pfill{height:100%;background:#fff;border-radius:2px;transition:width .35s;}

/* SCROLL BODY */
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* HOME HERO */
.home-hero{background:var(--r);padding:8px 16px 22px;}
.hero-row{display:flex;align-items:center;gap:14px;}
.hero-icon{width:56px;height:56px;background:rgba(255,255,255,.16);
  border-radius:16px;display:flex;align-items:center;justify-content:center;
  font-size:26px;flex-shrink:0;}
.hero-text h1{font-size:22px;font-weight:700;color:#fff;}
.hero-text p{font-size:12px;color:rgba(255,255,255,.72);margin-top:2px;}
.hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px;}
.hstat{background:rgba(255,255,255,.15);border-radius:10px;padding:10px 6px;text-align:center;}
.hstat-n{font-size:20px;font-weight:700;color:#fff;}
.hstat-l{font-size:10px;color:rgba(255,255,255,.7);margin-top:1px;line-height:1.2;}

/* PROGRESS RING */
.ring-wrap{display:flex;justify-content:center;padding:16px 0 8px;}
.ring-svg{width:100px;height:100px;}
.ring-bg{fill:none;stroke:#E8E5E0;stroke-width:8;}
.ring-fg{fill:none;stroke:var(--r);stroke-width:8;stroke-linecap:round;
  transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset .6s ease;}
.ring-txt{font-size:22px;font-weight:700;fill:var(--t);}
.ring-sub{font-size:10px;fill:var(--ts);}

/* CHAPTER CARDS */
.sec{padding:14px 14px 4px;font-size:11px;font-weight:600;color:var(--ts);
  text-transform:uppercase;letter-spacing:.06em;}
.cards{padding:0 14px;display:flex;flex-direction:column;gap:8px;padding-bottom:20px;}
.ch-card{background:var(--card);border-radius:14px;border:.5px solid var(--bd);
  overflow:hidden;cursor:pointer;transition:transform .1s;}
.ch-card:active{transform:scale(.98);}
.ch-top{display:flex;align-items:center;gap:12px;padding:14px 16px;}
.ch-dot{width:44px;height:44px;border-radius:12px;display:flex;
  align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.d1{background:#EDE9FE;} .d2{background:#FEF0EC;} .d3{background:#E8F5EA;} .d4{background:#FEF5E8;}
.ch-info{flex:1;}
.ch-title{font-size:14px;font-weight:600;}
.ch-sub{font-size:11px;color:var(--ts);margin-top:2px;}
.ch-arr{font-size:16px;color:var(--tl);}
.ch-prog{height:3px;background:var(--bg);margin:0 16px 12px;}
.ch-progfill{height:100%;background:var(--r);border-radius:2px;transition:width .4s;}

/* TOPIC LIST */
.topic-group{font-size:10px;font-weight:600;color:var(--ts);
  text-transform:uppercase;letter-spacing:.06em;padding:14px 14px 5px;}
.tlist{padding:0 14px;display:flex;flex-direction:column;gap:6px;}
.tc{background:var(--card);border-radius:10px;border:.5px solid var(--bd);
  padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;
  transition:transform .1s;}
.tc:active{transform:scale(.98);}
.t-ico{font-size:18px;flex-shrink:0;}
.t-info{flex:1;}
.t-title{font-size:13px;font-weight:600;}
.t-themes{font-size:11px;color:var(--ts);margin-top:2px;line-height:1.4;}
.t-badge{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.tbest{font-size:11px;font-weight:600;}
.tbest.perfect{color:var(--g);}
.tbest.good{color:#B05D0A;}
.tbest.poor{color:var(--r);}
.tbest.none{color:var(--tl);}
.t-check{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;}
.t-check.done{background:var(--gl);color:var(--g);}
.t-check.undone{background:var(--bg);color:var(--tl);border:.5px solid var(--bd);}

/* QUIZ */
.quiz-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px;}
.q-no{font-size:11px;font-weight:600;color:var(--tl);text-transform:uppercase;
  letter-spacing:.05em;margin-bottom:8px;}
.q-ctx{background:var(--rl);border-left:3px solid var(--r);border-radius:8px;
  padding:11px 13px;font-size:12px;color:#6B2D1A;line-height:1.55;margin-bottom:14px;}
.q-txt{font-size:17px;font-weight:600;line-height:1.45;margin-bottom:18px;}
.opts{display:flex;flex-direction:column;gap:9px;margin-bottom:16px;}
.op{background:var(--card);border-radius:10px;border:1.5px solid var(--bd);
  padding:13px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;
  text-align:left;width:100%;min-height:50px;transition:border-color .15s,background .15s;}
.op:active{transform:scale(.99);}
.op.sel{border-color:var(--r);background:var(--rl);}
.op.cor{border-color:var(--g);background:var(--gl);}
.op.wrg{border-color:#DC2626;background:#FEF2F2;}
.op.rcor{border-color:var(--g);background:var(--gl);}
.ol{width:26px;height:26px;border-radius:50%;background:var(--bg);
  border:1.5px solid var(--bds);display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;color:var(--ts);}
.op.sel .ol{background:var(--r);border-color:var(--r);color:#fff;}
.op.cor .ol{background:var(--g);border-color:var(--g);color:#fff;}
.op.wrg .ol{background:#DC2626;border-color:#DC2626;color:#fff;}
.op.rcor .ol{background:var(--g);border-color:var(--g);color:#fff;}
.ot{font-size:13px;line-height:1.45;color:var(--t);flex:1;}
.reveal{background:var(--card);border-radius:12px;border:.5px solid var(--bd);
  padding:14px;margin-bottom:16px;display:none;}
.reveal.vis{display:block;}
.rev-lbl{font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:5px;}
.rev-lbl.c{color:var(--g);}.rev-lbl.w{color:#DC2626;}
.rev-exp{font-size:13px;line-height:1.55;}
.q-actions{display:flex;flex-direction:column;gap:9px;
  padding-bottom:calc(20px + var(--safe-bot));}
.btn{background:var(--r);color:#fff;border:none;padding:16px 20px;
  border-radius:100px;font-size:16px;font-weight:600;cursor:pointer;width:100%;}
.btn:active{opacity:.88;}
.btn:disabled{background:var(--bds);cursor:default;}
.btn2{background:var(--card);color:var(--t);border:1.5px solid var(--bds);
  padding:14px 20px;border-radius:100px;font-size:14px;font-weight:600;
  cursor:pointer;width:100%;}
.btn2:active{background:var(--bg);}

/* RESULTS */
.res-hero{background:var(--r);padding-top:calc(var(--safe-top)+40px);
  padding-bottom:28px;text-align:center;padding-left:20px;padding-right:20px;}
.res-ring{width:96px;height:96px;border-radius:50%;
  background:rgba(255,255,255,.15);border:3.5px solid rgba(255,255,255,.35);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin:0 auto 14px;}
.res-score{font-size:30px;font-weight:700;color:#fff;}
.res-of{font-size:13px;color:rgba(255,255,255,.65);}
.res-title{font-size:21px;font-weight:700;color:#fff;}
.res-msg{font-size:13px;color:rgba(255,255,255,.78);margin-top:5px;}
.new-best{background:rgba(255,255,255,.2);border-radius:100px;
  display:inline-block;padding:4px 14px;font-size:12px;font-weight:600;
  color:#fff;margin-top:10px;}
.res-review{padding:14px;display:flex;flex-direction:column;gap:9px;}
.ri{background:var(--card);border-radius:10px;border:.5px solid var(--bd);padding:13px;}
.ri-badge{display:inline-block;font-size:10px;font-weight:600;
  padding:2px 8px;border-radius:100px;margin-bottom:5px;}
.ri-badge.c{background:var(--gl);color:var(--g);}
.ri-badge.w{background:#FEF2F2;color:#DC2626;}
.ri-q{font-size:12px;font-weight:600;margin-bottom:5px;line-height:1.4;}
.ri-a{font-size:11px;line-height:1.55;color:var(--ts);}
.res-actions{padding:12px 14px;display:flex;flex-direction:column;gap:9px;
  padding-bottom:calc(20px + var(--safe-bot));}

/* INSTALL BANNER */
.install-banner{background:#fff3cd;border:.5px solid #ffc107;
  margin:14px;border-radius:10px;padding:12px 14px;display:none;}
.install-banner.show{display:block;}
.ib-title{font-size:13px;font-weight:600;color:#856404;margin-bottom:4px;}
.ib-steps{font-size:12px;color:#856404;line-height:1.6;}
.ib-close{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:#856404;}

/* IMPORT/EXPORT */
.io-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 14px 8px;}
.btn-exp{background:#1A4D8C;color:#fff;border:none;padding:13px 10px;border-radius:100px;
  font-size:13px;font-weight:600;cursor:pointer;width:100%;display:flex;align-items:center;
  justify-content:center;gap:6px;}
.btn-exp:active{opacity:.85;}
.btn-imp{background:#fff;color:#1A4D8C;border:2px solid #1A4D8C;padding:12px 10px;
  border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;width:100%;
  display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-imp:active{background:#EAF0FA;}
.toast{position:fixed;bottom:calc(20px + var(--safe-bot));left:50%;transform:translateX(-50%);
  background:#0F0F0F;color:#fff;padding:10px 20px;border-radius:100px;font-size:13px;
  font-weight:500;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;
  white-space:nowrap;}
.toast.show{opacity:1;}
/* MISC */
.empty{text-align:center;padding:40px 20px;color:var(--ts);font-size:14px;}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<input type="file" id="imp-input" accept=".json" style="display:none" onchange="importFile(this)">

<!-- HOME SCREEN -->
<div class="sc on" id="s-home">
  <div class="home-hero" style="padding-top:calc(env(safe-area-inset-top,0px) + 14px);">
    <div class="hero-row">
      <div class="hero-icon">📚</div>

      <div class="hstat"><div class="hstat-n" id="stat-correct">0</div><div class="hstat-l">Richtige Antworten</div></div>
      <div class="hstat"><div class="hstat-n" id="stat-streak">0🔥</div><div class="hstat-l">Tage in Folge</div></div>
    </div>
  </div>
  <div class="body" id="home-body">
    <div class="install-banner" id="install-banner">
      <button class="ib-close" onclick="this.parentElement.style.display='none'">×</button>
      <div class="ib-title">📲 Als App installieren</div>
      <div class="ib-steps">
        iPhone: Tippe auf ↑ → „Zum Home-Bildschirm"<br>
        Android: Tippe auf ⋮ → „Zum Startbildschirm"
      </div>
    </div>
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 100 100">
        <circle class="ring-bg" cx="50" cy="50" r="42"/>
        <circle class="ring-fg" id="ring-fg" cx="50" cy="50" r="42"
          stroke-dasharray="263.9" stroke-dashoffset="263.9"/>
        <text class="ring-txt" x="50" y="46" text-anchor="middle" dominant-baseline="middle" id="ring-pct">0%</text>
        <text class="ring-sub" x="50" y="60" text-anchor="middle">Fortschritt</text>
      </svg>
    </div>
    <div id="home-chapters"></div>
    <div class="io-row">
      <button class="btn-exp" onclick="exportProgress()">📤 Exportieren</button>
      <button class="btn-imp" onclick="document.getElementById('imp-input').click()">📥 Importieren</button>
    </div>
    <div style="padding:0 14px 20px;">
      <button class="btn2" onclick="resetAll()">🗑 Fortschritt zurücksetzen</button>
    </div>
  </div>
</div>

<!-- TOPICS SCREEN -->
<div class="sc" id="s-topics">
  <div class="hd">
    <div class="hd-row">
      <button class="bk" onclick="go('s-home')">←</button>
      <div><div class="hd-title" id="top-title"></div>
      <div class="hd-sub" id="top-sub"></div></div>
    </div>
  </div>
  <div class="body" id="topics-body"></div>
</div>

<!-- QUIZ SCREEN -->
<div class="sc" id="s-quiz">
  <div class="hd">
    <div class="hd-row">
      <button class="bk" onclick="exitQuiz()">✕</button>
      <div style="flex:1;overflow:hidden;">
        <div class="hd-title" id="quiz-title"></div>
        <div class="hd-sub" id="quiz-sub"></div>
      </div>
    </div>
    <div class="pbar"><div class="pfill" id="pf" style="width:0%"></div></div>
  </div>
  <div class="quiz-body" id="quiz-body"></div>
</div>

<!-- RESULTS SCREEN -->
<div class="sc" id="s-results">
  <div class="body">
    <div class="res-hero">
      <div class="res-ring">
        <div class="res-score" id="r-score">0</div>
        <div class="res-of" id="r-of">von 5</div>
      </div>
      <div class="res-title" id="r-title"></div>
      <div class="res-msg" id="r-msg"></div>
      <div class="new-best" id="r-newbest" style="display:none">⭐ Neuer Rekord!</div>
    </div>
    <div class="res-review" id="res-review"></div>
    <div class="res-actions">
      <button class="btn" id="r-retry">Nochmal üben</button>
      <button class="btn2" onclick="go('s-home')">Startseite</button>
    </div>
  </div>
</div>

    {q:"Welche NANDA-Pflegediagnose ist bei Toms Mangelernährung passend?",x:"",o:["Chronischer Schmerz","Ernährungsimbalance: weniger als der Körperbedarf / untergewichtige Körpermasse","Sehbehinderung","Schlafstörung"],c:1,e:"NANDA: 'Ernährungsimbalance: weniger als der Körperbedarf' – Nährstoffaufnahme liegt unter dem metabolischen Bedarf. Ziele und Maßnahmen fokussieren auf Kalorienaufnahme und Schlucken."}

  enttaeuschung:[
    {q:"Was ist die Theorie der interpersonalen Beziehungen nach Hildegard Peplau?",x:"",o:["Pflegetheorie, die die heilsame Bedeutung der Pflegebeziehung betont (4 Phasen)","Kommunikationsmodell","Krankheitsentstehungstheorie","Qualitätsmessinstrument"],c:0,e:"Peplau (1952): 4 Phasen: 1. Orientierung, 2. Identifikation, 3. Nutzung, 4. Ablösung. Pflege als therapeutische interpersonale Beziehung."},
    {q:"Was ist der Expertenstandard Sturzprophylaxe?",x:"",o:["Pflegestandard zur Verhinderung von Stürzen durch Risikobewertung und Maßnahmen","Allgemeines Sicherheitskonzept","Medikamentenplan","Gesetzliche Regelung"],c:0,e:"DNQP: Sturzrisikoerfassung (z.B. Morse Fall Scale), individuelle Maßnahmen (Umgebungsanpassung, Hilfsmittel, Schulung), Evaluation. Ziel: Sturzrate senken."},
    {q:"Frau Amsel hat MS und einen Dauerkatheter. Was ist bei der Katheterpflege wichtig?",x:"",o:["Täglich wechseln","Strikte Asepsis, Meatal-Pflege, System geschlossen, Infektionszeichen beachten","1x/Woche spülen","Nur bei Schmerzen wechseln"],c:1,e:"Katheterpflege: aseptisch vorgehen, tägliche Meatal-Pflege, Drainagesystem geschlossen halten, ausreichend Flüssigkeit, Infektionszeichen beobachten (Fieber, trüber Urin). Ziel: CAUTI verhindern."},
    {q:"Was bedeutet Gesundheitsförderung im Berufsalltag für Pflegende?",x:"",o:["Nur eigene körperliche Fitness","Maßnahmen, die vor berufsbedingten Erkrankungen schützen: Ergonomie, Stressmanagement, psychische Gesundheit","Aufhören zu rauchen","Nur gesunde Ernährung"],c:1,e:"Betriebliche Gesundheitsförderung: Rückenschule, ergonomische Hilfsmittel, Stressprävention, Supervision, psychische Gesundheitsangebote. Eigenverantwortung und betriebliche Strukturen sind wichtig."},
    {q:"Welche Pflegetheorie beschreibt das Konzept der 'Caring'-Beziehung?",x:"",o:["AEDL-Modell (Krohwinkel)","Theorie von Jean Watson – Pflege als zwischenmenschliche Fürsorge","Roper-Logan-Tierney-Modell","Salutogenese nach Antonovsky"],c:1,e:"Jean Watson (Theory of Human Caring): Pflege als Fürsorgebeziehung mit 10 Caritas-Prozessen. Echtes empathisches Interesse am Menschen auf allen Ebenen (körperlich, geistig, spirituell)."}

  weitergehen:[
    {q:"Was bedeutet pAVK?",x:"",o:["Periphere arterielle Verschlusskrankheit – Durchblutungsstörung in den Extremitäten","Pneumonie mit aVersorgung","Partieller abdominaler Venenverschluss","Primäre Arthritis mit Vaskulitis"],c:0,e:"pAVK: Verengung der Extremitätenarterien durch Arteriosklerose. Symptome: Claudicatio intermittens (Schaufensterkrankheit), Ruheschmerzen, Nekrosen. Risikofaktoren: Rauchen, Diabetes, Hypertonie."},
    {q:"Was beschreibt die Ottawa-Charta (WHO 1986)?",x:"",o:["Ernährungsempfehlung der WHO","Internationales Dokument, das Gesundheitsförderung als Prozess zur Verbesserung der Gesundheitskontrolle definiert","Pflegestandard für chronische Erkrankungen","Europäisches Gesundheitsgesetz"],c:1,e:"Ottawa-Charta (1986): 5 Handlungsfelder zur Gesundheitsförderung. Gesundheit als positiver Begriff – nicht nur Abwesenheit von Krankheit."},
    {q:"Was unterscheidet Salutogenese von Pathogenese?",x:"",o:["Salutogenese fragt nach Entstehung von Gesundheit, Pathogenese nach Entstehung von Krankheit","Sie sind dasselbe","Salutogenese ist eine Therapieform","Pathogenese ist ein Pflegemodell"],c:0,e:"Antonovsky (1979): Salutogenese = 'Was hält Menschen gesund?'. Kohärenzgefühl (Verstehbarkeit, Handhabbarkeit, Bedeutsamkeit) ist das Kernkonzept."},
    {q:"Was ist bei der Schulung zur Blutdruckselbstmessung besonders wichtig?",x:"",o:["Gerät geben ohne Erklärung","Einmalig schriftlich informieren","Schrittweise anleiten, üben lassen, Rückfragen ermöglichen, Protokollführung erklären","Arzt soll messen"],c:2,e:"Patientenschulung: Gerät erklären, Technik zeigen, Ruhephase, beide Arme, Blutdrucktagebuch. Teach-back: Patient wiederholt was er verstanden hat."},
    {q:"Was umfasst die Tertiärprävention bei pAVK?",x:"",o:["Erkrankung durch Lebensstil verhindern","Früherkennung","Komplikationen verhindern und Rehabilitation: Gehtraining, Rauchstopp, Fußpflege, Wundversorgung","Impfungen"],c:2,e:"Tertiärprävention: Komplikationen und Verschlechterung verhindern. Bei pAVK: strukturiertes Gehtraining, Rauchstopp, Fußinspektion, Risikofaktoren einstellen, Wundversorgung."}

  festival:[
    {q:"Was ist ein Grand-mal-Anfall?",x:"",o:["Kurze Bewusstseinspause ohne Zuckungen","Plötzlicher Bewusstseinsverlust mit tonischer Phase (Steifheit) + klonischer Phase (rhythmische Zuckungen)","Einseitiger Krampf des Arms","Nur optische Phänomene"],c:1,e:"Grand-mal (generalisierter tonisch-klonischer Anfall): tonische Phase → klonische Phase → postiktale Erschöpfung. Erstmaßnahmen: Verletzungsschutz, Zeit stoppen, nichts in den Mund."},
    {q:"Was regelt § 203 StGB in Bezug auf Patientendaten?",x:"",o:["Dokumentationspflicht","Verbot, Patientendaten ohne Einwilligung weiterzugeben – Schweigepflicht für Heilberufe","Datenspeicherdauer","Patientenaufklärung vor Operationen"],c:1,e:"§ 203 StGB: Schweigepflicht für Ärzte, Pflegepersonal und andere Heilberufe. Keine Informationsweitergabe ohne Einwilligung. Ausnahmen: Meldepflichten, Notwehr."},
    {q:"Was ist ein EEG?",x:"",o:["Messung der Herzströme","Messung der elektrischen Hirnaktivität – wichtig bei Epilepsie-Diagnostik","Darstellung der Hirnstruktur","Laborwert im Blut"],c:1,e:"EEG: misst elektrische Gehirnaktivität über Kopf-Elektroden. Bei Epilepsie: charakteristische Muster (Spikes, Sharp waves). Hilft bei Diagnostik, Klassifikation, Therapieplanung."},
    {q:"Niklas' Vater reagiert wütend in der Notaufnahme. Wie reagieren Sie professionell?",x:"",o:["Ignorieren","Anbrüllen","Ruhig bleiben, Verständnis zeigen, sachlich informieren, deeskalieren","Sofort Sicherheitsdienst rufen"],c:2,e:"Deeskalierende Kommunikation: ruhige Stimme, Sicherheitsabstand, Verständnis für Sorge zeigen, klare sachliche Informationen. Wut entsteht oft aus Angst – Empathie hilft mehr als Konfrontation."},
    {q:"Was gilt bei der Informationsweitergabe an minderjährige Patienten bzw. ihre Eltern?",x:"",o:["Eltern haben immer uneingeschränktes Auskunftsrecht","Bei Minderjährigen entscheiden Sorgeberechtigte mit; ab einem bestimmten Reifegrad werden auch die Wünsche des Jugendlichen berücksichtigt","Minderjährige haben keine Rechte","Nur der Arzt entscheidet"],c:1,e:"Eltern mit Sorgerecht entscheiden bei Minderjährigen. Mit zunehmendem Reifegrad (ab ca. 14–16 Jahren) sind auch die Wünsche des Jugendlichen zu berücksichtigen. Einwilligungsfähigkeit ist individuell zu prüfen."}

  notaufnahme:[
    {q:"Was bedeutet das Manchester Triage System (MTS)?",x:"",o:["Behandlungsprotokoll für Herzinfarkt","Standardisiertes Ersteinschätzungssystem – Patienten werden nach Dringlichkeit in 5 Kategorien eingeteilt","Schmerzskala","Dokumentationssystem"],c:1,e:"MTS: 1. Sofort (rot), 2. Sehr dringend (orange, 10 Min.), 3. Dringend (gelb, 30 Min.), 4. Normal (grün, 90 Min.), 5. Nicht dringend (blau, 120 Min.). Priorisierung in der Notaufnahme."},
    {q:"Was sind typische Symptome einer akuten Pankreatitis?",x:"",o:["Kopfschmerzen und Schwindel","Gürtelförmige Oberbauchschmerzen, Übelkeit, Erbrechen, erhöhte Pankreas-Enzyme (Lipase, Amylase)","Brustschmerzen und Atemnot","Rückenschmerzen ohne Ausstrahlung"],c:1,e:"Akute Pankreatitis: starke gürtelförmige Schmerzen (Oberbauch → Rücken), Übelkeit, Erbrechen. Labor: stark erhöhte Lipase. Ursachen: Alkohol, Gallensteine."},
    {q:"Was versteht man unter einem septischen Schock?",x:"",o:["Schock durch Blutverlust","Lebensbedrohlicher Zustand mit Organversagen als Folge einer unkontrollierten Infektion mit Kreislaufversagen","Anaphylaktischer Schock durch Allergie","Schock durch Herzversagen"],c:1,e:"Septischer Schock = schwerste Sepsis-Form: persistierender Blutdruckabfall trotz Flüssigkeitsgabe, Vasopressorbedarf. Unkontrollierte Immunantwort → Multiorganversagen. Sofortige Intensivtherapie."},
    {q:"Warum ist Händedesinfektion in der Notaufnahme so wichtig?",x:"",o:["Hygiene ist dort nicht so wichtig","Händedesinfektion ist die wichtigste Maßnahme zur Verhinderung nosokomialer Infektionen","Händewaschen reicht","Handschuhe ersetzen Händedesinfektion"],c:1,e:"WHO: '5 Moments for Hand Hygiene'. Händedesinfektion effektiver als Händewaschen. Wichtigste Einzelmaßnahme zur Prävention nosokomialer Infektionen."},
    {q:"Herr Becker trinkt täglich Alkohol. Ein Entzug ohne Begleitung ist gefährlich, weil:",x:"",o:["Er einfach aufhören kann","Alkoholentzug lebensbedrohlich sein kann (Entzugssyndrom, Delirium tremens, Krampfanfälle)","Alkohol kein medizinisches Problem ist","Er mehr Willenskraft braucht"],c:1,e:"Alkoholentzug kann lebensbedrohlich sein: Zittern, Schwitzen, Halluzinationen, Krampfanfälle, Delirium tremens. Medizinisch begleiteter Entzug notwendig. Pflege: empathisch, nicht wertend."}

  kovac:[
    {q:"Thromboseprophylaxe basiert auf der Virchow-Trias. Welche 3 Faktoren sind das?",x:"",o:["Alter, Gewicht, Blutdruck","Verlangsamung des Blutflusses, Gefäßwandschäden, Gerinnungsveränderungen","Rauchen, Diabetes, Stress","Bewegungsmangel, Dehydration, Fieber"],c:1,e:"Virchow-Trias: 1. Verlangsamung des Blutflusses (Stase), 2. Gefäßwandschäden (Endothelschäden), 3. Gerinnungsveränderungen (Hyperkoagulabilität). Prophylaxe: Mobilisation, Kompression, Heparin."},
    {q:"Welche 5 Sterbephasen beschreibt Elisabeth Kübler-Ross?",x:"",o:["Verleugnung – Zorn – Verhandeln – Depression – Akzeptanz","Trauer – Wut – Akzeptanz – Stille – Frieden","Schock – Trauer – Heilung – Frieden – Tod","Verneinung – Aggression – Panik – Gleichmut – Ruhe"],c:0,e:"Kübler-Ross: 1. Verleugnung, 2. Zorn, 3. Verhandeln, 4. Depression, 5. Akzeptanz. Die Phasen sind nicht linear – Patienten können zwischen Phasen wechseln."},
    {q:"Wann ist eine Fixierung legal erlaubt?",x:"",o:["Immer wenn Patient unruhig ist","Nur mit richterlichem Beschluss – außer bei akuter Selbst- oder Fremdgefährdung als Notfallmaßnahme","Sie ist immer verboten","Wenn Angehörige zustimmen"],c:1,e:"§ 1906 BGB: FEM = schwerer Grundrechtseingriff. Richterlicher Beschluss erforderlich. Ausnahme: akute Notfallsituation (kurzzeitig, sofortige Meldung). Alternativen IMMER zuerst prüfen."},
    {q:"Was sind Prinzipien der feuchten Wundversorgung?",x:"",o:["Wunde austrocknen lassen","Wunde täglich mit H2O2 behandeln","Feuchtes Wundmilieu erhalten (Hydrokolloid, Alginate) – fördert Heilung bei chronischen Wunden","Sterilen Verband nie wechseln"],c:2,e:"Feuchte Wundversorgung: erhält physiologisches feuchtes Milieu, fördert Granulation und Epithelisierung, reduziert Schmerzen beim Verbandswechsel. Indiziert bei chronischen/komplexen Wunden."},
    {q:"Welche Zeichen sollten bei einem alkoholabhängigen Patienten beobachtet werden?",x:"",o:["Keine erkennbaren Zeichen","Zittern, Schwitzen, Reizbarkeit, Alkoholgeruch, Verharmlosung des Konsums, soziale Isolation","Nur körperliche Symptome","Immer offensichtliche Trunkenheit"],c:1,e:"Zeichen der Abhängigkeit: körperlich (Zittern, Schwitzen, rotes Gesicht, Leberveränderungen) und psychisch (Verharmlosung, Reizbarkeit, Isolation). Begegnen Sie empathisch und nicht wertend."}

  augenblick:[
    {q:"Was bedeutet Querschnittslähmung (Paraplegie) im Alltag?",x:"",o:["Vorübergehende Schwäche der Beine","Dauerhafter Verlust von Motorik und Sensibilität unterhalb der Läsionshöhe","Lähmung nur eines Arms","Nur Taubheitsgefühl"],c:1,e:"Paraplegie (Beine) / Tetraplegie (alle 4 Extremitäten): dauerhafter Ausfall von Motorik, Sensibilität, vegetativen Funktionen. Pflege: Dekubitusprophylaxe, Blasenmanagement, Mobilisation, psychische Unterstützung."},
    {q:"Was sind die 4 Prinzipien nach Beauchamp & Childress?",x:"",o:["Reinlichkeit, Ordnung, Disziplin, Fürsorge","Autonomie, Nicht-Schaden (non-maleficence), Fürsorge (beneficence), Gerechtigkeit","Ehrlichkeit, Kompetenz, Empathie, Respekt","Diagnose, Therapie, Prävention, Rehabilitation"],c:1,e:"Principism (Beauchamp & Childress): 1. Autonomie, 2. Nicht-Schaden, 3. Fürsorge/Wohltun, 4. Gerechtigkeit. Weltweit meistgenutztes Rahmenwerk der Medizinethik."},
    {q:"Was ist eine PTBS?",x:"",o:["Vorübergehende Traurigkeit","Psychische Erkrankung nach traumatischen Ereignissen mit Flashbacks, Vermeidungsverhalten, Übererregung","Persönlichkeitsstörung","Angststörung ohne erkennbaren Auslöser"],c:1,e:"PTBS: Wiedererleben (Flashbacks, Albträume), Vermeidung, kognitive/emotionale Veränderungen, Übererregung. Behandlung: traumafokussierte KVT, EMDR, ggf. Pharmakotherapie."},
    {q:"Was ist ein suprapubischer Blasenkatheter?",x:"",o:["Katheter durch die Harnröhre","Durch die Bauchdecke in die Blase eingeführter Katheter – weniger Infektionsrisiko, mehr Komfort","Nierenkatheter","Kurzzeitiger Notfallkatheter"],c:1,e:"Suprapubischer Katheter (SPK): durch Bauchdecke direkt in die Blase. Vorteile: geringeres Infektionsrisiko, bessere Hygiene, Langzeitkomfort. Nachteil: operativer Eingriff, Stomarandpflege nötig."},
    {q:"Was versteht man unter dem Krohwinkel-Modell in der Katastrophenpflege?",x:"",o:["Modell für den Alltagsbetrieb","Fördernde Prozesspflege: AEDL-Modell auch unter schwierigen Bedingungen anwenden – Ressourcen aktivieren und Autonomie erhalten","Krisenplan für Krankenhäuser","Modell für psychiatrische Pflege"],c:1,e:"Krohwinkel (fördernde Prozesspflege): AEDL-Modell fokussiert auf Ressourcen und Fähigkeiten. Auch in Katastrophensituationen: Patient aktiv einbeziehen, Autonomie so weit wie möglich erhalten."}

  seifert:[
    {q:"Welches Schmerzassessment ist bei Matteo (8 J., nicht verbal) geeignet?",x:"",o:["Numerische Rating-Skala (NRS)","Paediatric Pain Profile (PPP) – für Menschen, die sich nicht verbal äußern können","Wong-Baker FACES","Glasgow Coma Scale"],c:1,e:"PPP: Beobachtungsinstrument für Kinder/Jugendliche mit schwerer neurologischer Beeinträchtigung. 20 Verhaltensweisen (Gesichtsausdruck, Körperhaltung etc.) werden bewertet."},
    {q:"Was beschreibt das WHO-Schmerzschema?",x:"",o:["Stufenschema mit 3 Stufen zur medikamentösen Schmerztherapie (Nicht-Opioide → schwache Opioide → starke Opioide)","Bewertungssystem für Schmerzen","Chirurgisches Verfahren","Pflegassessmentinstrument"],c:0,e:"WHO-Stufenschema (1986): Stufe 1 = Nicht-Opioide, Stufe 2 = schwache Opioide ± Nicht-Opioid, Stufe 3 = starke Opioide ± Nicht-Opioid. Bei starken Schmerzen direkt auf Stufe 3."},
    {q:"Was ist ein Tracheostoma und warum wird es angelegt?",x:"",o:["Künstlicher Magenausgang","Operative Öffnung in der Luftröhre zur Sicherung der Atemwege bei Langzeitbeatmung oder Atemwegsverlegung","Magensonde","Nierenkatheter"],c:1,e:"Tracheostoma: chirurgisch angelegte Öffnung in der Luftröhre. Indikationen: Langzeitbeatmung, Atemwegsverlegung, schwere neurologische Erkrankungen. Pflege: Kanüle, Absaugen, Befeuchtung, Stomapflege."},
    {q:"Was sind die Krisenarten nach Cullberg?",x:"",o:["Es gibt nur eine Krisenart","Traumatische Krisen (akutes Ereignis) und Veränderungskrisen (Entwicklung) mit Phasen: Schock → Reaktion → Bearbeitung → Neuorientierung","Krisen enden immer in Heilung","Krisen brauchen keine Begleitung"],c:1,e:"Cullberg: Traumatische Krisen (plötzliches Ereignis) und Entwicklungskrisen (Lebensübergänge). Phasen: 1. Schockphase, 2. Reaktionsphase, 3. Bearbeitungsphase, 4. Neuorientierung."},
    {q:"Was ist eine PEG-Sonde und was sind Pflegeaspekte?",x:"",o:["Nasensonde zur Kurzzeiternährung","Perkutan endoskopisch gelegte Magensonde zur Langzeiternährung – Eintrittsstelle täglich inspizieren, spülen, Lage kontrollieren","Intravenöse Ernährungssonde","Ableitungssonde"],c:1,e:"PEG: Langzeiternährung durch Bauchdecke. Pflege: tägliche Inspektion auf Infektionszeichen, Scheibenrotation, Spülung vor/nach Nutzung, Lage-/Ballonkontrolle, Dokumentation."}

  sandkastenliebe:[
    {q:"Was ist ein Apoplex und welche Symptome zeigt das FAST-Schema?",x:"",o:["Herzerkrankung","Plötzliche Durchblutungsstörung des Gehirns: Face (Gesichtsschiefe), Arm (Schwäche), Speech (Sprache), Time (Notruf 112)","Lungenerkrankung","Krampfanfall"],c:1,e:"FAST: Face = Gesichtsschiefe, Arm = einseitige Schwäche, Speech = Sprachstörung, Time = sofort 112. Ursachen: Ischämie (80%) oder Hämorrhagie (20%). Lysetherapie innerhalb 4,5h."},
    {q:"Was ist Person-zentrierte Pflege bei Demenz nach Tom Kitwood?",x:"",o:["Verhaltensauffälligkeiten durch Medikamente reduzieren","Ansatz, der die Person mit Demenz als vollwertigen Menschen respektiert und Würde, Identität, Wohlbefinden ins Zentrum stellt","Rein aktivierende Pflegeform","Gedächtnistraining"],c:1,e:"Kitwood (Person-Centred Care, 1997): VIPS-Modell: Values (Wertschätzung), Individualized care, Perspective (Perspektive der Person), Social environment. Person mit Demenz = vollwertig."},
    {q:"Frau Kaufmann wird aggressiv wenn ihr Mann sie berührt. Was könnte die Ursache sein?",x:"",o:["Sie mag ihren Mann nicht mehr","Aggression kann Ausdruck von Angst, Schmerz oder Überforderung sein – Demenz verändert die Kommunikation","Sie ist eingebildet","Sie braucht stärkere Medikamente"],c:1,e:"Aggressives Verhalten bei Demenz = Ausdruck von Bedürfnissen: Schmerz, Angst, Überforderung, Würdeverletzung. Analyse: was geschah vorher? Maßnahmen: ruhige Umgebung, Validation, Biografie."},
    {q:"Herr Kaufmann hatte einen Sturz. Was gehört zur systematischen Wundbeobachtung?",x:"",o:["Nur die Größe","Lokalisation, Größe, Tiefe, Rand, Umgebung, Exsudat (Menge/Farbe/Geruch), Infektionszeichen, Granulation","Nur ob es blutet","Nur das Datum"],c:1,e:"Wundbeobachtung (TIME/MEASURE): Lokalisation, Ausdehnung, Rand, Umgebung, Exsudat, Infektionszeichen (Rötung, Schwellung, Wärme, Schmerz), Granulationsgrad. Wunddokumentation mit Foto."},
    {q:"Warum ist Sturzprophylaxe bei Herrn Kaufmann (91 J.) besonders wichtig?",x:"",o:["Nur in der Klinik wichtig","Ältere haben erhöhtes Sturzrisiko durch Gleichgewichtsstörungen, Muskelschwäche, Medikamente, Demenz – Folgen können lebensbedrohlich sein","Stürze bei Alten sind normal","Nur Aufgabe der Physiotherapie"],c:1,e:"Sturzrisiko steigt mit Alter. Folgen: Hüftfraktur, Immobilität, Pflegebedürftigkeit, Tod. Maßnahmen: Risikoerfassung (Morse Scale), Hilfsmittel, Umgebungsanpassung, Kraft-/Gleichgewichtstraining."}

  klara:[
    {q:"Was ist ein ethisches Dilemma in der Pflege?",x:"",o:["Technisches Problem","Situation, in der zwei moralisch gleichwertige aber unvereinbare Handlungsoptionen vorliegen","Konflikt zwischen Kollegen","Rechtsfrage"],c:1,e:"Ethisches Dilemma: zwei Werte kollidieren (z.B. Autonomie vs. Fürsorge). Lösung: Ethische Fallbesprechung, Prinzipien nach Beauchamp & Childress, Kasuistik."},
    {q:"Was ist die Pflege-Charta?",x:"",o:["Gehaltsreglement","Charta der Rechte pflegebedürftiger Menschen – sichert Würde, Selbstbestimmung, Privatheit (8 Artikel, BMFSFJ 2003)","Interne Krankenhausrichtlinie","Ausbildungsvertrag"],c:1,e:"Pflege-Charta: 8 Artikel zu Rechten pflegebedürftiger Menschen. Kernthemen: Würde, Selbstbestimmung, Privatsphäre, Rehabilitation, Teilhabe, spirituelle Begleitung."},
    {q:"Was beschreibt die Konfliktanalyse im Team?",x:"",o:["Analyse von Pflegefehlern","Strukturiertes Verfahren zur Identifikation von Konfliktursachen, Beteiligten und Lösungsoptionen","Mitarbeiterbewertung","Verfahren zur Personalbeurteilung"],c:1,e:"Konfliktanalyse: Konfliktart bestimmen (Sach-, Beziehungs-, Rollen-, Wertekonflikt), Beteiligte identifizieren, Eskalationsstufe (Glasl), Lösungsoptionen entwickeln."},
    {q:"Was bedeutet elterliches Sorgerecht im medizinischen Kontext?",x:"",o:["Eltern dürfen alles bis 18 entscheiden","Eltern entscheiden bei Minderjährigen – begrenzt durch das Kindeswohl","Pflegende entscheiden allein","Ärzte entscheiden ohne Eltern"],c:1,e:"Eltern mit Sorgerecht entscheiden über medizinische Maßnahmen bei Minderjährigen. Grenze: das Kindeswohl (§ 1666 BGB). Zunehmendem Reifegrad entsprechend werden Wünsche des Jugendlichen berücksichtigt."},
    {q:"Wie verhält man sich bei sozialen Konflikten im Pflegeteam professionell?",x:"",o:["Konflikte ignorieren","Sofort Vorgesetzte ohne Gespräch informieren","Direkt und respektvoll ansprechen, Ich-Botschaften, aktives Zuhören, ggf. Supervision oder Mediation","Kollegen bei Patienten kritisieren"],c:2,e:"Professioneller Umgang: Konflikte zeitnah direkt ansprechen, Ich-Botschaften statt Vorwürfe, aktives Zuhören, gemeinsam Lösungen suchen. Bei Eskalation: Führungskraft, Mediation, Supervision."}

  sander:[
    {q:"Was sind Parkinson-Kardinalsymptome?",x:"",o:["Gedächtnisverlust und Verwirrtheit","Akinese (Bewegungsarmut), Rigor (Steifheit), Ruhetremor, posturale Instabilität","Lähmung aller Extremitäten","Sehverlust und Kopfschmerzen"],c:1,e:"Parkinson-Kardinalsymptome: 1. Akinese/Bradykinese, 2. Rigor, 3. Ruhetremor, 4. Posturale Instabilität. Ursache: Dopaminmangel in der Substantia nigra."},
    {q:"Was ist die 6-R-Regel im Medikamentenmanagement?",x:"",o:["6 Regeln für die Dokumentation","Richtiger Patient, Medikament, Dosis, Weg (Route), Zeitpunkt, Dokumentation","6 Schritte der Pflegeplanung","Regeln für den Umgang mit BtM"],c:1,e:"6-R-Regel: Richtiger Patient · Richtiges Medikament · Richtige Dosis · Richtiger Weg (Route) · Richtiger Zeitpunkt · Richtige Dokumentation. Medikationssicherheit."},
    {q:"Wann beginnt Entlassungsmanagement?",x:"",o:["Am Tag der Entlassung","Nicht Aufgabe der Pflege","Möglichst früh nach Aufnahme","Nur bei chronisch kranken Patienten"],c:2,e:"DNQP-Expertenstandard: Entlassungsmanagement beginnt am Tag der Aufnahme: Entlassungsbedarf einschätzen, Patienten einbeziehen, externe Dienste koordinieren."},
    {q:"Was fördert Resilienz bei Pflegenden?",x:"",o:["Mehr Überstunden machen","Alles alleine bewältigen","Soziale Unterstützung, positive Selbstwahrnehmung, Problemlösekompetenz, Pausen, Work-Life-Balance","Alle Probleme ignorieren"],c:2,e:"Resilienz = psychische Widerstandsfähigkeit. Fördernd: soziale Netzwerke, positive Emotionen, Selbstwirksamkeit, Stressbewältigung, Humor, Sinnhaftigkeit. Supervision und Teamgespräche helfen."},
    {q:"Warum ist interprofessionelle Zusammenarbeit bei Herrn Sander wichtig?",x:"",o:["Nicht notwendig","Erhöht unnötig den Aufwand","Sichert ganzheitliche Versorgung: Arzt, Pflege, Physio, Sozialdienst, Ergo ergänzen sich und planen gemeinsam","Nur der Arzt entscheidet"],c:2,e:"Interprofessionell verbessert Ergebnisse, reduziert Fehler. Bei Parkinson: gemeinsame Zielplanung, regelmäßige Fallbesprechungen, SBAR-Kommunikation, klare Schnittstellenverantwortung."}

  patienten:[
    {q:"Was ist MRSA und welche Maßnahmen sind nötig?",x:"",o:["Ein Antibiotikum","Methicillin-resistenter Staphylococcus aureus – antibiotikaresistente Bakterie: Isolation, Schutzkleidung, Desinfektion","Ein Virus","Eine Pilzinfektion"],c:1,e:"MRSA: resistenter Staphylococcus aureus. Maßnahmen: Einzelzimmer, Schutzkittel, Handschuhe, MNS, Händedesinfektion, Flächendesinfektion. Patienten informieren und psychisch unterstützen."},
    {q:"Was regelt das Arbeitszeitgesetz (AZG)?",x:"",o:["Nur Urlaubsregelungen","Max. 8h/Tag (ausnahmsweise 10h), Pause nach 6h, 11h Ruhezeit zwischen Diensten, max. 48h/Woche","Nur das Gehalt","Nur die Weiterbildungspflicht"],c:1,e:"AZG: Max. 8h/Tag (bis 10h wenn Ausgleich), 30 Min. Pause nach 6h, mind. 11h Ruhezeit, max. 48h/Woche Durchschnitt. Pflegende sollten ihre Rechte kennen."},
    {q:"Was bedeutet Pflegequalität nach Donabedian?",x:"",o:["Freundlichkeit der Pflegeperson","Strukturqualität (Ausstattung), Prozessqualität (Durchführung) und Ergebnisqualität (Pflegeergebnisse)","Nur die Schnelligkeit","Anzahl der Patienten pro Pflegekraft"],c:1,e:"Donabedians Qualitätsmodell: Strukturqualität (Personal, Ausstattung, Organisation), Prozessqualität (Pflegeprozess, Standards), Ergebnisqualität (Patientenzufriedenheit, Komplikationsraten)."},
    {q:"Was versteht man unter Berufspolitik in der Pflege?",x:"",o:["Parteipolitik im Krankenhaus","Politisches Engagement für bessere Rahmenbedingungen, Professionalisierung und Anerkennung des Pflegeberufs","Internes Krankenhausmanagement","Dienstplanerstellung"],c:1,e:"Berufspolitik: Engagement in Berufsverbänden (DBfK, DPR), Mitwirkung an Gesetzgebung, Öffentlichkeitsarbeit, Weiterentwicklung von Standards, Einsatz für bessere Personalschlüssel."},
    {q:"Was umfasst Standardhygiene in der Pflege?",x:"",o:["Nur das Tragen von Handschuhen","5-Momente-Händehygiene (WHO), Schutzkleidung, Entsorgung, Flächendesinfektion, aseptisches Arbeiten nach RKI-Empfehlungen","Nur Putzen","Nur Patientendusche"],c:1,e:"Standardhygiene gilt für ALLE Patienten: WHO 5-Momente-Händehygiene, Schutzkleidung, kontaminierte Materialien entsorgen, Flächendesinfektion. RKI-Empfehlungen und Hygienepläne sind verbindlich."}

  nika:[
    {q:"Was ist Muskeldystrophie Duchenne und was ist pflegerisch wichtig?",x:"",o:["Nierenerkrankung","Genetische Muskelerkrankung mit progredientem Schwund – Beatmungsunterstützung, Mobilisation, Kontrakturprophylaxe, Atemtherapie essenziell","Erkrankung des Nervensystems","Herzerkrankung"],c:1,e:"Duchenne: X-chromosomal, fast ausschließlich Jungen. Progredienter Muskelschwund → Rollstuhlabhängigkeit, Ateminsuffizienz. Pflege: Atemtherapie, NIV/Tracheostoma, Kontrakturprophylaxe, Dekubitusprophylaxe."},
    {q:"Was regelt das Infektionsschutzgesetz (IfSG)?",x:"",o:["Behandlung von Infektionskrankheiten","Meldepflichten bei bestimmten Infektionskrankheiten, Schutzmaßnahmen, Verhütung zum Schutz der Bevölkerung","Impfpflicht für Pflegende","Quarantäne bei jeder Erkältung"],c:1,e:"IfSG: Meldepflichten (Tuberkulose, EHEC, Masern, COVID-19), Tätigkeitsverbote, Schutzmaßnahmen. Krankenhäuser und Pflegeeinrichtungen haben besondere Meldepflichten ans Gesundheitsamt."},
    {q:"Was ist beim endotrachealen Absaugen zu beachten?",x:"",o:["Keine besondere Vorbereitung nötig","Steriles Vorgehen, geeigneter Katheter, max. 15 Sek., O₂-Gabe vorher, SpO₂ und HF beobachten, dokumentieren","So oft absaugen wie möglich","Handschuhe reichen als Schutz"],c:1,e:"ETA: Indikation prüfen, sterile Handschuhe/Katheter, O₂-Vorgabe, max. 15 Sek., SpO₂/HF monitoren, Sekret dokumentieren (Farbe, Konsistenz). Komplikationen: Hypoxie, Herzrhythmusstörungen."},
    {q:"Was bedeutet Immunsuppression für die Pflege?",x:"",o:["Stärkung des Immunsystems","Geschwächtes Immunsystem – erhöhte Infektionsgefahr erfordert konsequente Hygiene und Infektionsschutz","Eine Allergie","Eine Autoimmunerkrankung"],c:1,e:"Immunsuppression = geschwächtes Immunsystem (Erkrankung, Kortison, Chemotherapie). Maßnahmen: konsequente Händedesinfektion, Isolierung, Keimquellen meiden, Infektionszeichen früh erkennen."},
    {q:"Warum ist das Thema Kindeswohlgefährdung bei Nika relevant?",x:"",o:["Wegen schulischer Probleme","Schwerstkranke Kinder sind besonders vulnerabel – ihr Wohl muss aktiv geschützt werden, auch ihr Selbstbestimmungsrecht","Weil ihre Eltern nachlässig sind","Wegen gefährlicher Aktivitäten"],c:1,e:"Nika hat das Recht auf Selbstbestimmung und Teilhabe. Kindeswohlgefährdung kann auch durch Überprotektion entstehen. Pflegende achten darauf, dass Nikes Wünsche respektiert werden."}

  einmalwar:[
    {q:"Was ist eine Tracheotomie und welche Pflege braucht das Tracheostoma?",x:"",o:["Herzoperation","Chirurgische Öffnung der Luftröhre – Pflege: Kanülenpflege, Absaugen, Befeuchtung, Stomapflege","Augenoperation","Magenoperation"],c:1,e:"Tracheotomie: Luftröhrenschnitt zur Atemwegssicherung. Pflege: Absaugen, Kanülenwechsel, Befeuchtung, Stomarandpflege, Kanülenfixierung, ggf. Sprechventil."},
    {q:"Was ist Qualitätsmanagement in der Pflege?",x:"",o:["Bewertung der Pflegepersonen","Systematisches Verfahren zur Sicherung und Verbesserung der Pflegequalität (Standards, Audits, Pflegeindikatoren, Beschwerdemanagement)","Nur ein Dokumentationssystem","Nur für Krankenhäuser"],c:1,e:"QM: Qualitätsstandards definieren, Prozesse standardisieren, interne Audits, externe Prüfungen (MDK), Pflegeindikatoren erfassen, Ergebnisse auswerten. Ziel: kontinuierliche Qualitätsverbesserung."},
    {q:"Was bietet die ambulante Langzeitpflege?",x:"",o:["Nur Körperpflege","Körperpflege, Behandlungspflege, hauswirtschaftliche Versorgung, Beratungsbesuche, Pflegesachleistungen (SGB XI), Verhinderungspflege","Nur stationäre Versorgung","Nur medizinische Leistungen"],c:1,e:"Ambulante Pflegedienste: Grundpflege, Behandlungspflege (§ 37 SGB V), hauswirtschaftliche Hilfen, Beratungsbesuche (§ 37 Abs.3 SGB XI). Finanzierung über SGB XI und SGB V."},
    {q:"Was bedeutet interprofessionelle Zusammenarbeit in der Kinderpflege?",x:"",o:["Nur Arzt und Pflege","Zusammenspiel von Pflege, Medizin, Therapie, Sozialdienst, Schule und Familie zur ganzheitlichen Versorgung","Pflegende arbeiten allein","Nur Eltern sind zuständig"],c:1,e:"Interprofessionell in der Kinderpflege: gemeinsame Ziele, regelmäßige Fallbesprechungen, Schnittstellenmanagement (Schule/Kita), Familie als Teammitglied. Alle teilen Dokumentation."},
    {q:"Wie wird Pflege in Deutschland finanziert?",x:"",o:["Vollständig kostenlos","SGB XI (Pflegekassen), SGB V (Krankenversicherung), SGB XII (Sozialhilfe) und Eigenmittel","Nur durch den Staat","Pflegebedürftige zahlen alles selbst"],c:1,e:"Finanzierung: SGB XI = Pflegekassen (nach Pflegegrad). SGB V = Behandlungspflege. Eigenbeteiligung = Unterkunft/Verpflegung in Heimen. Bei Bedürftigkeit: SGB XII. Pflege ist eine Teilkaskoversicherung."}

  muell:[
    {q:"Was ist das TIME-Konzept in der Wundversorgung?",x:"",o:["Ein einfaches Wundpflaster","Systematischer Ansatz: T=Tissue (Wundgrund), I=Infection/Inflammation, M=Moisture, E=Edge (Wundrand)","Chirurgisches Verfahren","Nur für chronische Wunden"],c:1,e:"TIME: T = Tissue (Debridement), I = Infection/Inflammation (Infektionskontrolle), M = Moisture balance (Feuchtigkeitsmanagement), E = Edge (Wundrandpflege). Systematische Versorgung verbessert Heilungsrate."},
    {q:"Herr Johansson hat Diabetes Typ 2 und schlechte Blutzuckereinstellung. Welches Wundheilungsrisiko hat er?",x:"",o:["Kein Risiko","Erhöhtes Risiko durch Polyneuropathie, Mikro-/Makroangiopathie und geschwächtes Immunsystem","Verringertes Risiko","Nur wenn er Insulin spritzt"],c:1,e:"Diabetes erhöht Wundheilungsrisiko: Polyneuropathie (fehlende Schmerzwahrnehmung), Angiopathie (schlechte Durchblutung), Immunsuppression (Infektanfälligkeit). Regelmäßige Fußinspektion essenziell."},
    {q:"Wie wird EBN in der Wundversorgung angewendet?",x:"",o:["Eigenblut-Nährsubstrat","Wundversorgung auf Basis aktueller Forschungsevidenz, Patientenpräferenzen und klinischer Expertise wählen","Ein Wundpflaster","Ein Verbandstandard"],c:1,e:"EBN in der Wundversorgung: Leitlinien (ICW, AWMF) konsultieren, systematische Reviews, Erfahrungswissen, Patientenpräferenzen. Feuchte Wundversorgung ist evidenzbasiert bei chronischen Wunden."},
    {q:"Was ist wichtig beim Entlassungsmanagement mit komplexer Wundversorgung?",x:"",o:["Einfach nach Hause entlassen","Strukturierte Vorbereitung: ambulanten Wundversorger organisieren, schulen, Hilfsmittel beschaffen, Nachsorgetermine, Pflegedienst informieren","Patient organisiert selbst","Arzt macht Entlassung allein"],c:1,e:"Entlassungsmanagement: frühzeitig ambulante Wundversorgung (Pflegedienst/Wundexperte) organisieren, Wunddokumentation mitgeben, Patienten/Angehörige einweisen, Versorgungsmaterialien rezeptieren, Nachsorgetermine."},
    {q:"Was ist 'professionelles Pflegehandeln'?",x:"",o:["Nach Gewohnheit allein handeln","Pflegeentscheidungen auf Basis von Forschungswissen, klinischer Expertise und Patientenwünschen treffen sowie das eigene Handeln kritisch reflektieren","Nur tun was der Arzt sagt","So schnell wie möglich arbeiten"],c:1,e:"Professionell: EBN + klinische Erfahrung + Patientenpräferenzen + Ethik. Selbstreflexion, Fehlerkultur und lebenslanges Lernen sind Merkmale professioneller Pflegepraxis."}

  fruehstueck:[
    {q:"Was ist Amyotrophe Lateralsklerose (ALS)?",x:"",o:["Herzerkrankung","Progrediente neurodegenerative Erkrankung mit Untergang der Motoneuronen – zunehmender Muskelschwund und Lähmungen","Demenzerkrankung","Rückenmarkserkrankung"],c:1,e:"ALS: Degeneration oberer und unterer Motoneuronen. Symptome: Muskelschwund, Lähmungen, Schluck-/Sprachstörungen, Ateminsuffizienz. Kognition meist erhalten. Pflege: Atemtherapie, Tracheostoma, Kommunikationshilfen, PEG."},
    {q:"Auszubildende Marie darf endotrachéal absaugen. Was gilt rechtlich?",x:"",o:["Auszubildende dürfen alles selbstständig","Auszubildende dürfen Vorbehaltsaufgaben nur unter Aufsicht – Praxisanleiterin ist verantwortlich","Keine Regeln für Auszubildende","Absaugen ist keine Vorbehaltsgabe"],c:1,e:"Vorbehaltstätigkeiten (§ 4 PflBG): nur examinierte Pflegefachkräfte eigenverantwortlich oder Auszubildende unter Aufsicht. Praxisanleitende verantworten Anleitung, Begleitung, Überwachung."},
    {q:"Was bedeutet 'Nicht-Schaden' (non-maleficence) nach Beauchamp & Childress?",x:"",o:["Alles tun was dem Patienten nützt","Handlungen unterlassen, die dem Patienten schaden; bei unvermeidlichen Risiken: Nutzen-Risiko-Abwägung","Immer teurere Therapie wählen","Patientenwünsche ablehnen"],c:1,e:"Non-maleficence: Schadensvermeidung als ethisches Grundprinzip. In der Pflege: keine unnötig schmerzhaften Maßnahmen, Risikomanagement, korrekte Medikamentengabe, Fehlermeldekultur."},
    {q:"Wofür sind Pflegende rechtlich verantwortlich?",x:"",o:["Für alles im Krankenhaus","Für ihr eigenverantwortliches Handeln: strafrechtlich, zivilrechtlich und berufsrechtlich","Nur Ärzte tragen Verantwortung","Pflegende haben keine Eigenverantwortung"],c:1,e:"Pflegende tragen eigenständige rechtliche Verantwortung: Strafrecht (§ 223 ff. StGB), Zivilrecht (Schadensersatz), Berufsrecht. Delegation begründet keine vollständige Verantwortungsabgabe."},
    {q:"Was sind Prinzipien der Praxisanleitung (4-Stufen-Methode)?",x:"",o:["Auszubildende beobachten nur","Erläutern → Vormachen → Nachmachen lassen (begleitet) → selbstständig üben mit Reflexion","Auszubildende lernen nur durch Fehler","Praxisanleitung ist nicht geregelt"],c:1,e:"4-Stufen-Methode: 1. Erläutern (Vorgespräch), 2. Vormachen (Demonstration), 3. Nachmachen (begleitet), 4. Selbstständig üben + Nachbesprechung. Praxisanleitende müssen qualifiziert sein."}

  heisser:[
    {q:"Welche Auswirkungen hat der Klimawandel auf Pflege?",x:"",o:["Keine Auswirkungen","Mehr Hitzewellen erhöhen Sterberisiko älterer Menschen; Pflegende müssen hitzebedingte Erkrankungen erkennen und präventiv handeln","Nur die Umwelt ist betroffen","Nur in Ländern mit Extremklima"],c:1,e:"Klimawandel & Pflege: Hitzewellen → erhöhte Mortalität bei Älteren/Chronischkranken (Dehydration, Kreislapskollaps). Maßnahmen: Flüssigkeitsversorgung, Kühlmaßnahmen, Medikamentenlagerung bei Hitze."},
    {q:"Was ist kollegiale Beratung (Intervision)?",x:"",o:["Gespräch mit dem Vorgesetzten","Strukturierte Form der Selbstreflexion im Team ohne externe Leitung – Kollegen beraten sich gegenseitig","Supervision durch externe Fachkraft","Feedbackgespräch mit dem Patienten"],c:1,e:"Intervision: Kollegen beraten sich strukturiert (Fallgeberin, Beratergruppe, Moderator). Vorteile: kein Vorgesetzter, offene Atmosphäre, praxisnah. Fördert Reflexionsfähigkeit und Teamentwicklung."},
    {q:"Wie arbeitet man professionell mit pflegenden Angehörigen?",x:"",o:["Angehörige aus der Pflege ausschließen","Als Partner einbeziehen: Ressourcen anerkennen, entlasten, informieren, schulen und psychisch unterstützen","Alle Pflege sollen Angehörige übernehmen","Angehörige haben keine Kompetenz"],c:1,e:"Pflegende Angehörige sind oft belastet. Professionell: Ressourcen anerkennen, bei Überforderung entlasten (Kurzzeitpflege, Schulung), emotionale Unterstützung, über Angebote informieren."},
    {q:"Was beschreibt 'Pflege im gesellschaftlichen Wandel'?",x:"",o:["Pflege hat sich nicht verändert","Demographischer Wandel, Fachkräftemangel, Digitalisierung, Migration, veränderte Familienstrukturen und steigende Pflegebedürftigkeit prägen die Pflege","Pflege wird einfacher","Nur Technik verändert die Pflege"],c:1,e:"Gesellschaftlicher Wandel: mehr Pflegebedürftige, Fachkräftemangel, Akademisierung, Digitalisierung (Pflegeroboter, Telemedizin), kulturelle Vielfalt, veränderte Rollen- und Familienstrukturen."},
    {q:"Was sind Hauptstressfaktoren in der Pflegearbeit?",x:"",o:["Nur schwierige Patienten","Zeitdruck, Personalmangel, emotionale Belastung, ethische Konflikte, körperliche Belastung, mangelnde Wertschätzung","Nur Nachtdienste","Nur Dokumentation"],c:1,e:"Berufsstress: Zeitdruck/Personalmangel, emotionale Belastung (Tod, Leid), körperliche Belastung, moralischer Distress, schlechte Work-Life-Balance. Betriebliche Gesundheitsförderung und Führungsverhalten mindern Stress."}

  koerper:[
    {q:"Kai (18 J.) spritzt sich heimlich Insulin. Was ist der ethische Kern?",x:"",o:["Er darf das als Volljähriger ohne Einschränkung","Konflikt zwischen Autonomie (Selbstbestimmung) und Fürsorge/Nicht-Schaden","Er bricht nur eine Hausordnung","Rein medizinisches Problem"],c:1,e:"Ethischer Konflikt: Autonomieprinzip (Kai entscheidet über seinen Körper) vs. Fürsorge/Nicht-Schaden (falsche Insulingabe lebensgefährlich). Lösung: offenes respektvolles Gespräch, Risiken besprechen, gemeinsam Optionen suchen."},
    {q:"Was ist Delegation in der Pflege?",x:"",o:["Alles selbst durchführen","Übertragung einer Aufgabe von der verantwortlichen Pflegekraft auf eine andere Person – mit Anleitung und Kontrolle","Aufgaben einfach abgeben","Nur Ärzte können delegieren"],c:1,e:"Delegation: examinierte Pflegefachkraft überträgt Aufgaben an Hilfskräfte/Auszubildende. Voraussetzungen: Aufgabe delegierbar, Person geeignet, Anleitung erfolgt, Kontrolle bleibt beim Delegierenden."},
    {q:"Was bedeutet inter- und intraprofessionelles Handeln?",x:"",o:["Nur interne Teambesprechungen","Interprofessionell: Zusammenarbeit mit anderen Berufsgruppen. Intraprofessionell: Zusammenarbeit innerhalb der Pflegeberufe","Nur Arztaufgaben","Pflege arbeitet allein"],c:1,e:"Interprofessionell: Pflege + Medizin + Psychologie + Sozialdienst + Therapie. Intraprofessionell: Pflegefachkräfte + Helfer + Azubis koordinieren sich. Beide verbessern Versorgungsqualität."},
    {q:"Was sind ethische Reflexionsprozesse in schwierigen Pflegesituationen?",x:"",o:["Intuitives Entscheiden","Strukturierte Auseinandersetzung: Situationserfassung, Werteabwägung, Prinzipienabwägung (Beauchamp & Childress), Konsensfindung im Team","Arztentscheidung abwarten","Alles mit dem Patienten allein besprechen"],c:1,e:"Ethische Reflexion: Situation beschreiben, Beteiligte identifizieren, Werte erfassen, Optionen abwägen, Konsequenzen bedenken, Entscheidung im Team/mit Patient. Ethikkomitees unterstützen."},
    {q:"Was ist Kindeswohlgefährdung bei einem 18-Jährigen?",x:"",o:["Mit 18 gibt es das nicht mehr","Kindeswohlgefährdung gilt bis 18 Jahre; mit 18 ist Kai volljährig – sein Selbstbestimmungsrecht gilt vollständig","Eltern bestimmen bis 21","Nur bei Kleinkindern"],c:1,e:"Kindeswohlgefährdung (legal): gilt für Minderjährige bis 18. Kai ist 18 = volljährig → Selbstbestimmungsrecht vollständig. Keine Zwangsmaßnahmen; Aufklärung und Motivation statt Kontrolle."}

  konrad:[
    {q:"Wie geht man professionell mit Alkohol im Pflegeheim um?",x:"",o:["Alkohol grundsätzlich verboten","Maßvoller Genuss kann akzeptiert sein; bei Missbrauch: empathisch ansprechen, Arzt einbeziehen, kein Moralisieren","Immer so viel wie gewünscht","Nicht Aufgabe der Pflege"],c:1,e:"Professioneller Umgang: individuelle Abwägung (Lebensqualität vs. Gesundheit), bewertungsfreie Haltung, Hausarzt einbeziehen, bei Abhängigkeit: Beratung und Suchtberatung anbieten, keine Zwangsmaßnahmen."},
    {q:"Was regelt gesetzliche Betreuung nach § 1896 BGB?",x:"",o:["Freiwillige Familienunterstützung","Gerichtlich angeordnete Unterstützung für Personen, die ihre Angelegenheiten nicht mehr regeln können – Betreuer handelt im Interesse der Person","Zwangsunterbringung","Entmündigung"],c:1,e:"§ 1896 BGB: keine Entmündigung! Betreuer handelt im Wohl der betreuten Person, nicht gegen ihren Willen. Selbstbestimmung bleibt erhalten, soweit möglich."},
    {q:"Welches ethische Prinzip ist bei Herrn Konrads Bier-Wunsch am relevantesten?",x:"",o:["Non-maleficence: Trinken verboten","Autonomie: Herr Konrad hat das Recht, solche Entscheidungen selbst zu treffen","Gerechtigkeit: alle müssen gleich behandelt werden","Benefizienz: maximales Wohlbefinden herstellen"],c:1,e:"Autonomieprinzip: Herr Konrad hat das Recht über sein eigenes Leben zu entscheiden – auch wenn es nicht optimal gesund ist. Voraussetzung: Einwilligungsfähigkeit. Pflege informiert und berät, bevormundet nicht."},
    {q:"Was fördert professionelle Konfliktbewältigung im Team?",x:"",o:["Konflikte ignorieren","Direktes Ansprechen, Ich-Botschaften, aktives Zuhören, gemeinsam Lösungen suchen, Mediation bei Eskalation","Immer Vorgesetzte einschalten","Kollegen öffentlich kritisieren"],c:1,e:"Konfliktbewältigung: frühes Intervenieren, direkt und respektvoll ansprechen, Ich-Botschaften, aktives Zuhören, Lösungen suchen. Bei Eskalation: Führungskraft, Mediation oder Supervision."},
    {q:"Was bedeutet persönliche Gesunderhaltung für Pflegende?",x:"",o:["Nur Schutzkleidung tragen","Aktive Maßnahmen für eigene physische und psychische Gesundheit: Ergonomie, Stressmanagement, Bewegung, Pausen, soziale Kontakte, gesunde Ernährung","Nur Arbeitszeiten einhalten","Nur Händewaschen"],c:1,e:"Gesunderhaltung in der Pflege: körperlich (Ergonomie, Impfungen, Schlaf), psychisch (Stressmanagement, Supervision, Pausen, Abgrenzung), sozial (Kollegenunterstützung, Hobbys). Resilienz schützt vor Burnout."}

  team:[

/* ============================
   STORAGE
   ============================ */
const KEY='pflegias_v2';
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{};}catch(e){return {};}}
function save(d){try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){}}

function getProgress(){return load();}
function saveTopicResult(id,score,total){
  const d=load();
  if(!d[id])d[id]={best:0,attempts:0,lastDate:'',totalCorrect:0,totalAnswered:0};
  const wasNewBest=score>d[id].best;
  d[id].best=Math.max(d[id].best,score);
  d[id].attempts=(d[id].attempts||0)+1;
  d[id].lastDate=new Date().toISOString().slice(0,10);
  d[id].totalCorrect=(d[id].totalCorrect||0)+score;
  d[id].totalAnswered=(d[id].totalAnswered||0)+total;
  // Streak
  const today=new Date().toISOString().slice(0,10);
  const yd=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(d._lastActive===today){/* same day */}
  else if(d._lastActive===yd){d._streak=(d._streak||0)+1;}
  else{d._streak=1;}
  d._lastActive=today;
  save(d);
  return wasNewBest;
}
function resetAll(){if(confirm('Wirklich alles zurücksetzen?')){localStorage.removeItem(KEY);renderHome();showToast('Fortschritt zurückgesetzt');}}

/* ============================
   EXPORT / IMPORT
   ============================ */
function exportProgress(){
  const d=load();
  const allTopics=CH.flatMap(c=>c.groups.flatMap(g=>g.topics));
  const done=allTopics.filter(t=>d[t.id]&&d[t.id].best>=3).length;
  const payload={
    version:2,
    exportDate:new Date().toISOString().slice(0,10),
    streak:d._streak||0,
    topicsDone:done,
    progress:d
  };
  const json=JSON.stringify(payload,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='pflegias_fortschritt_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ Fortschritt exportiert!');
}

function importFile(input){
  const file=input.files[0];
  if(!file){return;}
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const parsed=JSON.parse(e.target.result);
      // accept both raw progress object and wrapped export format
      const data=parsed.progress||parsed;
      if(typeof data!=='object'||Array.isArray(data)){
        throw new Error('Ungültiges Format');
      }
      // merge with existing (keep best scores)
      const existing=load();
      const allTopics=CH.flatMap(c=>c.groups.flatMap(g=>g.topics));
      const topicIds=new Set(allTopics.map(t=>t.id));
      const merged={...existing};
      Object.keys(data).forEach(k=>{
        if(k.startsWith('_')){
          // meta fields: keep higher streak
          if(k==='_streak') merged._streak=Math.max(existing._streak||0,data[k]||0);
          else merged[k]=data[k];
        } else if(topicIds.has(k)){
          // topic data: merge keeping best scores
          if(!merged[k]){
            merged[k]=data[k];
          } else {
            merged[k]={
              best:Math.max(merged[k].best||0,data[k].best||0),
              attempts:(merged[k].attempts||0)+(data[k].attempts||0),
              lastDate:merged[k].lastDate>data[k].lastDate?merged[k].lastDate:data[k].lastDate,
              totalCorrect:(merged[k].totalCorrect||0)+(data[k].totalCorrect||0),
              totalAnswered:(merged[k].totalAnswered||0)+(data[k].totalAnswered||0),
            };
          }
        }
      });
      save(merged);
      renderHome();
      showToast('✅ Fortschritt importiert & zusammengeführt!');
    } catch(err){
      showToast('❌ Fehler beim Importieren: '+err.message);
    }
    // reset input so same file can be selected again
    input.value='';
  };
  reader.readAsText(file);
}

function showToast(msg,dur=2800){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),dur);
}

/* ============================
   ROUTING
   ============================ */
let curCh=null,curTopic=null,qs=[],qi=0,ans=[],sel=null,revealed=false;
function go(id,fn){
  document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  if(fn)fn();
}

/* ============================
   HOME
   ============================ */
function renderHome(){
  const prog=getProgress();
  const allTopics=CH.flatMap(c=>c.groups.flatMap(g=>g.topics));
  const totalTopics=allTopics.length;
  const done=allTopics.filter(t=>prog[t.id]&&prog[t.id].best>=3).length;
  const totalCorrect=allTopics.reduce((s,t)=>s+(prog[t.id]?.totalCorrect||0),0);
  const streak=prog._streak||0;
  document.getElementById('stat-done').textContent=done;
  document.getElementById('stat-total').textContent=totalTopics;
  document.getElementById('stat-correct').textContent=totalCorrect;
  document.getElementById('stat-streak').textContent=streak+'🔥';
  const pct=Math.round((done/totalTopics)*100);
  const circ=263.9;
  document.getElementById('ring-fg').style.strokeDashoffset=circ-(circ*pct/100);
  document.getElementById('ring-pct').textContent=pct+'%';

  const container=document.getElementById('home-chapters');
  container.innerHTML='<div class="sec">Kapitel wählen</div>';
  const cards=document.createElement('div');cards.className='cards';
  CH.forEach(ch=>{
    const chTopics=ch.groups.flatMap(g=>g.topics);
    const chDone=chTopics.filter(t=>prog[t.id]&&prog[t.id].best>=3).length;
    const chPct=Math.round((chDone/chTopics.length)*100);
    const card=document.createElement('div');card.className='ch-card';
    card.innerHTML=`
      <div class="ch-top">
        <div class="ch-dot ${ch.cls}">${ch.emoji}</div>
        <div class="ch-info">
          <div class="ch-title">${ch.label}</div>
          <div class="ch-sub">${ch.sub} · ${chDone}/${chTopics.length} abgeschlossen</div>
        </div>
        <div class="ch-arr">›</div>
      </div>
      <div class="ch-prog"><div class="ch-progfill" style="width:${chPct}%"></div></div>`;
    card.onclick=()=>showTopics(ch);
    cards.appendChild(card);
  });
  container.appendChild(cards);
  // show install banner if not standalone
  if(!window.navigator.standalone&&!window.matchMedia('(display-mode: standalone)').matches){
    document.getElementById('install-banner').classList.add('show');
  }
}

/* ============================
   TOPICS
   ============================ */
function showTopics(ch){
  curCh=ch;
  document.getElementById('top-title').textContent=ch.label;
  document.getElementById('top-sub').textContent=ch.sub;
  const prog=getProgress();
  const body=document.getElementById('topics-body');body.innerHTML='';
  ch.groups.forEach(g=>{
    const gt=document.createElement('div');gt.className='topic-group';gt.textContent=g.name;
    body.appendChild(gt);
    const tl=document.createElement('div');tl.className='tlist';
    g.topics.forEach(t=>{
      const p=prog[t.id];const best=p?.best||0;const attempts=p?.attempts||0;
      const total=(DB[t.id]||[]).length||5;
      const pctBest=best&&total?Math.round((best/total)*100):0;
      let cls='none',lbl='–';
      if(best>=total){cls='perfect';lbl='⭐ '+best+'/'+total;}
      else if(best>=Math.ceil(total*0.6)){cls='good';lbl='👍 '+best+'/'+total;}
      else if(best>0){cls='poor';lbl=best+'/'+total;}
      const isDone=best>=3;
      const tc=document.createElement('div');tc.className='tc';
      tc.innerHTML=`
        <div class="t-ico">${t.emoji}</div>
        <div class="t-info">
          <div class="t-title">${t.title}</div>
          <div class="t-themes">${t.themes}</div>
        </div>
        <div class="t-badge">
          <div class="tbest ${cls}">${lbl}</div>
          <div class="t-check ${isDone?'done':'undone'}">${isDone?'✓':'○'}</div>
        </div>`;
      tc.onclick=()=>startQuiz(t);
      tl.appendChild(tc);
    });
    body.appendChild(tl);
  });
  go('s-topics');
}

/* ============================
   QUIZ
   ============================ */
function shuffle(a){let ar=[...a];for(let i=ar.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ar[i],ar[j]]=[ar[j],ar[i]];}return ar;}

function startQuiz(topic){
  curTopic=topic;
  const raw=DB[topic.id]||[];
  if(!raw.length){alert('Keine Fragen für dieses Thema.');return;}
  qs=shuffle(raw);qi=0;ans=[];
  document.getElementById('quiz-title').textContent=topic.title;
  document.getElementById('quiz-sub').textContent=topic.themes.split(' · ').slice(0,2).join(' · ');
  document.getElementById('pf').style.width='0%';
  go('s-quiz');
  renderQ();
}
function exitQuiz(){curCh?showTopics(curCh):go('s-home',renderHome);}

function renderQ(){
  const q=qs[qi];sel=null;revealed=false;
  document.getElementById('pf').style.width=(qi/qs.length*100)+'%';
  const shuffled=shuffle(q.o.map((t,i)=>({t,orig:i})));
  const corNew=shuffled.findIndex(o=>o.orig===q.c);
  const body=document.getElementById('quiz-body');
  body.innerHTML=`
    <div class="q-no">Frage ${qi+1} von ${qs.length}</div>
    ${q.x?`<div class="q-ctx">${q.x}</div>`:''}
    <div class="q-txt">${q.q}</div>
    <div class="opts" id="oc">
      ${shuffled.map((o,i)=>`
        <button class="op" onclick="pick(this,${i},${corNew})">
          <span class="ol">${'ABCD'[i]}</span>
          <span class="ot">${o.t}</span>
        </button>`).join('')}
    </div>
    <div class="reveal" id="rv">
      <div class="rev-lbl" id="rl"></div>
      <div class="rev-exp" id="re"></div>
    </div>
    <div class="q-actions">
      <button class="btn" id="cb" onclick="confirm_(${corNew},${JSON.stringify(qs[qi].e).replace(/</g,'&lt;')})" disabled>Antwort bestätigen</button>
    </div>`;
  body.scrollTop=0;
}

function pick(el,i,correct){
  if(revealed)return;sel=i;
  document.querySelectorAll('.op').forEach((e,j)=>e.classList.toggle('sel',j===i));
  document.getElementById('cb').disabled=false;
}

window._confData={};
function confirm_(correct,expJson){
  if(sel===null||revealed)return;revealed=true;
  const exp=expJson;
  const ok=sel===correct;
  const opts=document.querySelectorAll('.op');
  const selTxt=opts[sel].querySelector('.ot').textContent;
  const corTxt=opts[correct].querySelector('.ot').textContent;
  ans.push({q:qs[qi].q,ok,selTxt,corTxt,exp});
  opts.forEach((e,i)=>{
    e.classList.remove('sel');
    if(i===correct)e.classList.add(ok&&i===sel?'cor':'rcor');
    if(i===sel&&!ok)e.classList.add('wrg');
  });
  const rv=document.getElementById('rv');rv.classList.add('vis');
  const rl=document.getElementById('rl');const re=document.getElementById('re');
  rl.className='rev-lbl '+(ok?'c':'w');
  rl.textContent=ok?'✓ Richtig!':'✗ Falsch – Richtig: '+corTxt;
  re.textContent=exp;
  const cb=document.getElementById('cb');cb.disabled=false;
  const last=qi===qs.length-1;
  cb.textContent=last?'Ergebnis ansehen →':'Nächste Frage →';
  cb.onclick=last?showResults:()=>{qi++;renderQ();};
}

/* ============================
   RESULTS
   ============================ */
function showResults(){
  const total=qs.length;const score=ans.filter(a=>a.ok).length;
  const pct=Math.round((score/total)*100);
  const isNewBest=saveTopicResult(curTopic.id,score,total);
  document.getElementById('r-score').textContent=score;
  document.getElementById('r-of').textContent='von '+total;
  document.getElementById('r-newbest').style.display=isNewBest?'inline-block':'none';
  const[t,m]=pct>=80?['⭐ Ausgezeichnet!','Du bist bereit für die Prüfung!']:
              pct>=60?['👍 Gut gemacht!','Noch ein paar Wiederholungen!']:
                      ['📖 Weiter üben!','Schau dir die Erklärungen an.'];
  document.getElementById('r-title').textContent=t;
  document.getElementById('r-msg').textContent=m;
  document.getElementById('res-review').innerHTML=ans.map((a,i)=>`
    <div class="ri">
      <div class="ri-badge ${a.ok?'c':'w'}">${a.ok?'✓ Richtig':'✗ Falsch'}</div>
      <div class="ri-q">F${i+1}: ${a.q}</div>
      <div class="ri-a">
        ${!a.ok?`<span style="color:#DC2626">Deine Antwort: ${a.selTxt}</span><br>`:''}
        <span style="color:#2A7A38">Richtig: ${a.corTxt}</span><br><br>
        <span>${a.exp}</span>
      </div>
    </div>`).join('');
  document.getElementById('r-retry').onclick=()=>startQuiz(curTopic);
  go('s-results');
}

/* ============================
   INIT
   ============================ */
renderHome();
</script>
